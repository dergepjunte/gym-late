<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GymLate</title>

  <!-- Leaflet (map picker for gym location) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f0e9da" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0e0903" media="(prefers-color-scheme: dark)">

  <!-- iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GymLate">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Segoe UI', sans-serif;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      background: #f0e9da;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0e0903; }
    }

    /* ── THEME ───────────────────────────────────────────────── */
    :root {
      --glass-bg:     rgba(255,255,255,0.22);
      --glass-border: rgba(255,255,255,0.55);
      --glass-top:    rgba(255,255,255,0.85);
      --glass-shadow: rgba(160,110,20,0.10);
      --glass-inner:  rgba(255,255,255,0.55);
      --glass-sheen:  rgba(255,255,255,0.45);

      --input-bg:     rgba(255,255,255,0.45);
      --input-border: rgba(255,255,255,0.72);

      --text-1: rgba(0,0,0,0.85);
      --text-2: rgba(0,0,0,0.50);
      --text-3: rgba(0,0,0,0.28);

      --accent:       #facc15;
      --accent-2:     #f59e0b;
      --accent-text:  #b45309;
      --on-accent:    #422006;
      --accent-glow:  rgba(245,158,11,0.35);
      --accent-light: rgba(245,158,11,0.12);
      --red:          #ef4444;
      --red-light:    rgba(239,68,68,0.12);
      --green:        #22c55e;
      --gold:         #f59e0b;

      --divider:  rgba(0,0,0,0.07);
      --blur: 14px;
      --r-xl: 28px; --r-lg: 20px; --r-md: 14px; --r-sm: 10px;
      --bg: #f0e9da;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --glass-bg:     rgba(255,255,255,0.045);
        --glass-border: rgba(255,255,255,0.11);
        --glass-top:    rgba(255,255,255,0.22);
        --glass-shadow: rgba(0,0,0,0.50);
        --glass-inner:  rgba(255,255,255,0.09);
        --glass-sheen:  rgba(255,255,255,0.09);

        --input-bg:     rgba(255,255,255,0.09);
        --input-border: rgba(255,255,255,0.15);

        --text-1: rgba(255,255,255,0.93);
        --text-2: rgba(255,255,255,0.52);
        --text-3: rgba(255,255,255,0.28);

        --accent:       #facc15;
        --accent-2:     #f59e0b;
        --accent-text:  #fbbf24;
        --on-accent:    #422006;
        --accent-glow:  rgba(251,191,36,0.30);
        --accent-light: rgba(251,191,36,0.14);
        --red:          #f87171;
        --red-light:    rgba(248,113,113,0.14);
        --green:        #4ade80;
        --gold:         #fbbf24;

        --divider: rgba(255,255,255,0.08);
        --bg: #0e0903;
      }
    }

    /* Scoreboard type — mirrors the app's rounded display/heading fonts */
    .landing-title, .header-title, .streak-hero-num, .stat-val, .sa-num,
    .recap-name, .cal-month-label, .modal-title, .checkin-time-num,
    .success-title, .chest-msg {
      font-family: ui-rounded, 'SF Pro Rounded', -apple-system, system-ui, sans-serif;
    }

    /* ── GLASS (liquid glass) ────────────────────────────────── */
    /* Soft color orbs behind everything — the translucency needs
       something to refract, otherwise glass looks flat. */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(42% 34% at 18% 10%, rgba(245,158,11,.20), transparent 70%),
        radial-gradient(38% 30% at 86% 26%, rgba(251,113,133,.08), transparent 70%),
        radial-gradient(46% 38% at 55% 95%, rgba(251,146,60,.10), transparent 70%);
    }
    @media (prefers-color-scheme: dark) {
      body::before {
        background:
          radial-gradient(42% 34% at 18% 10%, rgba(251,191,36,.18), transparent 70%),
          radial-gradient(38% 30% at 86% 26%, rgba(244,114,182,.09), transparent 70%),
          radial-gradient(46% 38% at 55% 95%, rgba(249,115,22,.11), transparent 70%);
      }
    }
    .glass {
      background:
        linear-gradient(155deg, var(--glass-sheen) 0%, rgba(255,255,255,0) 45%),
        var(--glass-bg);
      backdrop-filter: blur(var(--blur)) saturate(2.2);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(2.2);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-top);
      box-shadow:
        0 8px 32px var(--glass-shadow),
        inset 0 1px 0 var(--glass-inner),
        inset 1px 0 0 rgba(255,255,255,.08),
        inset 0 -16px 30px -20px var(--glass-sheen);
    }

    /* ── SCREENS ─────────────────────────────────────────────── */
    /* Page scroll is locked — the tab panes scroll instead. This keeps
       the bottom nav truly fixed on iOS (no rubber-band displacement). */
    html, body { overflow: hidden; height: 100%; overscroll-behavior: none; }
    .screen {
      position: relative; z-index: 1;
      height: 100dvh;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      display: flex; flex-direction: column; align-items: center;
    }
    #screen-app { overflow: hidden; }
    .hidden { display: none !important; }
    .screen.hidden { display: none; }

    /* ── LANDING ─────────────────────────────────────────────── */
    #screen-landing {
      justify-content: center;
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    }
    .landing-hero { text-align: center; margin-bottom: 32px; }
    .landing-icon { font-size: 60px; line-height: 1; margin-bottom: 12px; }
    .landing-title {
      font-size: 46px; font-weight: 900; letter-spacing: -1.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .landing-sub { font-size: 15px; color: var(--text-2); margin-top: 6px; line-height: 1.4; max-width: 320px; margin-left:auto; margin-right:auto; }
    .landing-features {
      display: flex; justify-content: center; gap: 10px;
      width: 100%; max-width: 420px; margin-bottom: 22px;
    }
    .landing-feature {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 7px;
      text-align: center; padding: 12px 4px; border-radius: var(--r-lg);
      background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(8px);
    }
    .landing-feature-ico {
      width: 34px; height: 34px; border-radius: 10px;
      background: var(--accent-light); color: var(--accent-text);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .landing-feature-txt { font-size: 11.5px; font-weight: 600; color: var(--text-2); line-height: 1.3; }
    .landing-card { width: 100%; max-width: 420px; border-radius: var(--r-xl); padding: 24px 20px; }
    .landing-btn-hint { font-size: 12px; color: var(--text-3); text-align: center; margin: 7px 0 2px; line-height: 1.35; }
    .landing-admin-tools { margin-top: 14px; display: grid; gap: 10px; }
    .landing-admin-note { font-size: 12px; color: var(--text-3); text-align: center; line-height: 1.35; }
    .btn-admin {
      background: rgba(239,68,68,.10);
      color: var(--red);
      border: 1.5px solid rgba(239,68,68,.24);
      box-shadow: none;
    }
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 14px 0; color: var(--text-3); font-size: 13px; font-weight: 500;
    }
    .or-divider::before,.or-divider::after { content:''; flex:1; height:1px; background:var(--divider); }

    /* ── APP ─────────────────────────────────────────────────── */
    #screen-app { justify-content: flex-start; }
    .app-inner { width: 100%; max-width: 500px; padding: 0 16px; display: flex; flex-direction: column; flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; scrollbar-width: none; -ms-overflow-style: none; }
    .app-inner::-webkit-scrollbar { display: none; }

    /* ── HEADER ──────────────────────────────────────────────── */
    .header {
      padding: calc(env(safe-area-inset-top) + 14px) 0 10px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .header-title {
      font-size: 30px; font-weight: 900; letter-spacing: 5px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0; cursor: pointer; user-select: none;
    }

    /* ── NOTIF PRIMER ────────────────────────────────────────── */
    .notif-primer {
      position: fixed; inset: 0; z-index: 520;
      display: flex; align-items: center; justify-content: center;
      padding: calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 24px);
      background: rgba(0,0,0,.65);
    }
    .notif-primer.hidden { display: none; }
    .notif-primer-card {
      background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border); border-radius: 28px;
      padding: 32px 28px 28px; max-width: 360px; width: 100%; text-align: center;
    }
    .notif-primer-icon {
      width: 72px; height: 72px; border-radius: 18px;
      background: rgba(245,158,11,.13); display: inline-flex;
      align-items: center; justify-content: center; margin-bottom: 20px;
    }
    .notif-primer-icon svg { width: 36px; height: 36px; color: var(--accent-2); }
    .notif-primer-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: var(--text-1); }
    .notif-primer-body { font-size: 14px; color: var(--text-2); line-height: 1.6; margin-bottom: 24px; }
    .notif-primer-enable {
      width: 100%; padding: 15px; border-radius: 14px; border: none;
      font-family: inherit; font-size: 15px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #422006; cursor: pointer; margin-bottom: 10px;
      transition: opacity .15s;
    }
    .notif-primer-enable:active { opacity: .8; }
    .notif-primer-later {
      background: none; border: none; font-family: inherit;
      font-size: 13px; color: var(--text-3); cursor: pointer; padding: 6px;
    }
    .admin-badge {
      display: inline-block;
      font-size: 10px; font-weight: 700; letter-spacing: .6px;
      background: rgba(239,68,68,.12); color: var(--red);
      border: 1px solid rgba(239,68,68,.25);
      padding: 1px 7px; border-radius: 20px; margin-top: 3px;
    }
    .admin-badge.hidden { display: none; }

    /* ── GROUP PILL ──────────────────────────────────────────── */
    .group-pill {
      display: flex; align-items: center; gap: 8px;
      border-radius: 40px; padding: 7px 14px;
      margin: 10px auto 16px; width: fit-content; max-width: 100%;
    }
    .pill-name { font-size: 13px; font-weight: 700; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
    .pill-dot  { font-size: 10px; color: var(--text-3); }
    /* Muted: the invite code is metadata, not an action to chase */
    .pill-code-btn {
      background: var(--glass-inner); border: 1px solid var(--glass-border); color: var(--text-2);
      font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
      padding: 3px 10px; border-radius: 20px; cursor: pointer; font-family: inherit;
      transition: transform .15s, opacity .15s, color .15s, border-color .15s;
    }
    .pill-code-btn:hover { color: var(--accent-text); border-color: var(--accent-2); }
    .pill-code-btn:active { transform: scale(.92); opacity: .7; }
    .pill-copy-hint { font-size: 11px; color: var(--text-3); white-space: nowrap; }
    .pill-switch-btn {
      background: none; border: none; color: var(--text-2); cursor: pointer;
      display: flex; align-items: center; padding: 2px 4px; border-radius: 6px;
      transition: color .15s;
    }
    .pill-switch-btn:hover { color: var(--accent-text); }
    /* Group switcher modal */
    .group-list-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--divider); cursor: pointer;
    }
    .group-list-item:last-child { border-bottom: none; }
    .group-list-icon {
      width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
      background: var(--accent-light); display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .group-list-name { font-size: 15px; font-weight: 700; color: var(--text-1); }
    .group-list-code { font-size: 12px; color: var(--text-2); font-family: monospace; letter-spacing: 1px; }
    .group-list-active { color: var(--accent-text); font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; margin-left: auto; }
    .group-switcher-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
    /* Inline card variant: the card has no own padding, so the rows bring it */
    #groups-card .group-list-item { padding: 12px 16px; }
    .groups-inline-actions { display: flex; gap: 10px; margin-top: 10px; }
    .groups-inline-actions .btn { flex: 1; font-size: 13px; padding: 10px 8px; }

    /* ── SECTION LABEL ───────────────────────────────────────── */
    .sec-label {
      font-size: 12px; font-weight: 600; letter-spacing: .6px;
      text-transform: uppercase; color: var(--text-3); margin: 24px 0 8px 4px;
    }

    /* ── STATS ───────────────────────────────────────────────── */
    .stat-row { display: flex; gap: 10px; }
    .stat-card { flex:1; border-radius: var(--r-lg); padding: 18px 14px 16px; text-align: center; }
    .stat-val { font-size: 34px; font-weight: 900; letter-spacing:-1px; color: var(--text-1); line-height:1; }
    .stat-val.red { color: var(--red); }
    .stat-lbl { font-size: 12px; color: var(--text-2); margin-top: 4px; font-weight: 500; }
    /* Dashboard variant: one quiet strip — this is history, not a call to action */
    .stat-strip { display:flex; border-radius:var(--r-lg); }
    .stat-cell { flex:1; padding:13px 12px 12px; text-align:center; }
    .stat-cell + .stat-cell { border-left:1px solid var(--divider); }
    .stat-strip .stat-val { font-size:24px; font-weight:800; letter-spacing:-.5px; }
    .stat-strip .stat-lbl { font-size:11px; margin-top:3px; }

    /* ── CARD ────────────────────────────────────────────────── */
    .card { border-radius: var(--r-xl); overflow: hidden; }

    /* ── DAY GROUP (week tab) ────────────────────────────────── */
    .day-group { border-radius: var(--r-lg); overflow: hidden; margin-top: 10px; }
    .day-group:first-child { margin-top: 0; }
    .day-group-label { font-size:11px; font-weight:700; letter-spacing:.7px; text-transform:uppercase; color:var(--text-3); padding:10px 18px 6px; }

    /* ── ENTRIES ─────────────────────────────────────────────── */
    .entry { display: flex; align-items: center; gap: 12px; padding: 11px 18px; border-bottom: 1px solid var(--divider); }
    .entry:last-child { border-bottom: none; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent-light); display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--accent-text);
      flex-shrink: 0; border: 1.5px solid var(--glass-border);
    }
    .entry-info { flex:1; min-width:0; }
    .entry-name { font-size:15px; font-weight:600; color:var(--text-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .entry-meta { font-size:12px; color:var(--text-2); margin-top:1px; }
    .late-badge {
      font-size:13px; font-weight:700; color:var(--red);
      background:var(--red-light); padding:4px 10px; border-radius:20px;
      white-space:nowrap; border:1px solid rgba(239,68,68,.18);
    }
    .skip-badge {
      font-size:13px; font-weight:700; color:var(--gold);
      background:rgba(245,158,11,.12); padding:4px 10px; border-radius:20px;
      white-space:nowrap; border:1px solid rgba(245,158,11,.28);
    }
    .streak-badge {
      font-size:11px; font-weight:800; color:var(--gold); letter-spacing:.3px;
      background:rgba(245,158,11,.12); border:1px solid rgba(245,158,11,.28);
      padding:2px 9px; border-radius:20px; white-space:nowrap; flex-shrink:0;
      text-transform:uppercase;
    }
    .freeze-badge {
      font-size:11px; font-weight:700; color:#60a5fa; letter-spacing:.2px;
      background:rgba(96,165,250,.1); border:1px solid rgba(96,165,250,.22);
      padding:2px 8px; border-radius:20px; white-space:nowrap; flex-shrink:0;
    }
    /* Weekday picker */
    .day-picker { display:flex; gap:5px; justify-content:space-between; margin:8px 0 4px; }
    .day-btn {
      flex:1; padding:7px 0; border-radius:8px; border:1.5px solid var(--glass-border);
      background:var(--glass-inner); font-size:12px; font-weight:600;
      color:var(--text-2); cursor:pointer; transition:background .15s, color .15s, border-color .15s;
    }
    .day-btn.active { background:var(--accent); color:var(--on-accent); border-color:var(--accent-2); }
    .avail-lock-info {
      font-size:12px; color:var(--text-2); margin-top:4px;
      padding:7px 10px; background:rgba(255,255,255,.08); border-radius:8px;
    }
    .settings-section {
      margin-bottom:16px;
      background: linear-gradient(155deg, var(--glass-sheen) 0%, rgba(255,255,255,0) 45%), var(--glass-bg);
      backdrop-filter: blur(var(--blur)) saturate(2.2);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(2.2);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-top);
      box-shadow: 0 4px 20px var(--glass-shadow);
      border-radius: 18px;
      padding: 16px;
    }
    .settings-section-title { font-size:12px; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px; }
    .notif-row { display:flex; align-items:center; justify-content:space-between; padding:4px 0; }
    .notif-time-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0 0; }
    .notif-quiet-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    .notif-row-label { font-size:14px; color:var(--text-1); }
    .notif-time-input { font-size:14px; font-weight:600; padding:5px 10px; border-radius:10px; border:1.5px solid var(--glass-border); background:var(--glass-inner); color:var(--text-1); font-family:inherit; }
    .notif-member-row { display:flex; align-items:center; gap:10px; padding:6px 0; cursor:pointer; }
    .notif-member-row input[type=checkbox] { width:18px; height:18px; accent-color:var(--accent); cursor:pointer; }
    .notif-member-name { font-size:14px; color:var(--text-1); }
    /* Chest modal */
    .chest-reveal { text-align:center; padding:8px 0; }
    .chest-icon { font-size:64px; display:block; margin-bottom:12px; animation:w-pop .5s cubic-bezier(.34,1.56,.64,1) both; }
    .chest-msg  { font-size:22px; font-weight:800; margin-bottom:6px; }
    .chest-sub  { font-size:14px; color:var(--text-2); }
    .skip-chip {
      display:inline-flex; align-items:center; gap:5px;
      font-size:13px; font-weight:600; color:var(--gold);
      background:rgba(245,158,11,.10); border:1px solid rgba(245,158,11,.22);
      padding:3px 10px; border-radius:20px;
    }
    /* Compact status row — deliberately quieter than the streak hero above it */
    .streak-hero.checkin-time-hero {
      background:rgba(245,158,11,.07);
      padding:10px 14px; gap:10px; margin-bottom:12px;
      border-radius:var(--r-lg);
    }
    .checkin-time-icon { font-size:18px; width:24px; flex-shrink:0; text-align:center; line-height:1; }
    .checkin-time-num { color:var(--accent-text); }
    .checkin-time-hero .streak-hero-num { font-size:17px; font-weight:800; letter-spacing:0; }
    .checkin-time-hero .streak-hero-lbl { font-size:12px; }
    .checkin-time-hero .streak-hero-hint { color:var(--accent-text); font-weight:600; cursor:pointer; }
    .checkin-time-editor {
      display:flex; align-items:center; gap:10px; flex:1;
    }
    .checkin-time-input {
      font-size:15px; font-weight:700; padding:6px 10px; border-radius:10px;
      border:1.5px solid var(--glass-border); background:var(--glass-inner);
      color:var(--text-1); font-family:inherit;
    }
    .checkin-time-save-btn {
      padding:8px 16px; border-radius:10px; border:none; font-family:inherit;
      font-size:14px; font-weight:700; color:var(--on-accent); background:var(--accent);
      cursor:pointer; -webkit-tap-highlight-color:transparent;
    }
    /* Mode toggle (Late / Skip) */
    .mode-toggle { display:flex; gap:4px; background:var(--glass-inner); border-radius:12px; padding:4px; margin-bottom:18px; }
    .mode-btn {
      flex:1; padding:9px; border-radius:9px; border:none; font-family:inherit;
      font-size:14px; font-weight:600; cursor:pointer; color:var(--text-2);
      background:transparent; transition:background .2s, color .2s;
    }
    .mode-btn.active { background:var(--glass-bg); color:var(--text-1); box-shadow:0 1px 4px var(--glass-shadow); }
    /* Reason chips */
    .reason-chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
    .reason-chip {
      padding:8px 14px; border-radius:20px; border:1.5px solid var(--glass-border);
      background:var(--glass-inner); font-size:14px; font-weight:500;
      color:var(--text-1); cursor:pointer; font-family:inherit;
      transition:border-color .15s, background .15s, transform .1s;
    }
    .reason-chip.sel { border-color:var(--accent-2); background:var(--accent-light); color:var(--accent-text); }
    .reason-chip:active { transform:scale(.94); }
    .icon-btn {
      width:30px; height:30px; border-radius:50%; border:none;
      background:var(--red-light); color:var(--red); cursor:pointer; font-size:16px;
      display:flex; align-items:center; justify-content:center;
      transition:transform .15s; flex-shrink:0; font-family:inherit;
    }
    .icon-btn:active { transform:scale(.88); }
    .icon-btn.edit-entry-btn { background:var(--accent-light); color:var(--accent-text); font-size:14px; margin-right:6px; }

    /* ── EMPTY ───────────────────────────────────────────────── */
    .empty { text-align:center; padding:36px 24px; }
    .empty-ico { font-size:40px; margin-bottom:8px; }
    .empty-txt { font-size:15px; color:var(--text-2); font-weight:500; }
    .empty-sub { font-size:13px; color:var(--text-3); margin-top:4px; }

    /* ── TAB PANE ────────────────────────────────────────────── */
    .tab-pane { display:none; padding-bottom:calc(96px + min(env(safe-area-inset-bottom), 24px)); }
    .tab-pane.active { display:block; }

    /* ── FAB ─────────────────────────────────────────────────── */
    #fab {
      position:fixed; bottom:calc(86px + min(env(safe-area-inset-bottom), 24px));
      right:max(16px, calc(50vw - 234px));
      width:58px; height:58px; border-radius:50%; border:none;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      color:var(--on-accent); font-size:28px; cursor:pointer;
      box-shadow:0 6px 24px var(--accent-glow), 0 2px 8px rgba(0,0,0,.2);
      transition:transform .2s cubic-bezier(.34,1.56,.64,1);
      z-index:20; display:flex; align-items:center; justify-content:center;
    }
    #fab:active { transform:scale(.88); }
    #fab.hidden { display:none; }

    /* ── TOP NAV (desktop) ──────────────────────────────────── */
    .nav-top { display:none; width:100%; padding:6px 0 10px; }
    .nav-top .nav-bar { border-radius:var(--r-xl); }

    /* ── BOTTOM NAV — floating pill ─────────────────────────── */
    .bottom-nav {
      position:fixed;
      bottom:calc(10px + min(env(safe-area-inset-bottom), 24px));
      left:50%; transform:translateX(-50%);
      width:calc(100% - 32px); max-width:468px;
      z-index:30;
    }
    .nav-bar {
      display:flex; border-radius:999px; padding:5px; gap:0;
      position:relative; overflow:hidden;
      box-shadow:0 6px 28px rgba(0,0,0,.22),0 1px 6px rgba(0,0,0,.12);
    }
    .nav-btn {
      flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
      padding:9px 4px; border:none; background:transparent; border-radius:999px;
      cursor:pointer; font-family:inherit;
      position:relative; z-index:1;
    }
    .nav-btn.active { background:transparent; }
    /* Sliding active-indicator pill */
    .nav-indicator {
      position:absolute; top:5px; bottom:5px; left:0;
      border-radius:999px;
      background:var(--glass-inner);
      box-shadow:0 1px 4px var(--glass-shadow);
      pointer-events:none;
      will-change:transform,width;
      transition:transform .32s cubic-bezier(.34,1.56,.64,1),width .32s cubic-bezier(.34,1.56,.64,1);
    }
    @media (prefers-reduced-motion:reduce) { .nav-indicator { transition:none; } }
    .nav-ico { font-size:22px; color:var(--text-2); transition:transform .25s cubic-bezier(.34,1.56,.64,1),color .2s; }
    .nav-btn.active .nav-ico { transform:scale(1.12) translateY(-1px); color:var(--accent-text); }
    .nav-lbl { font-size:11px; font-weight:500; color:var(--text-2); transition:color .2s,font-weight .15s; }
    .nav-btn.active .nav-lbl { color:var(--accent-text); font-weight:700; }

    /* ── CALENDAR ────────────────────────────────────────────── */
    .cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; padding:4px 0; }
    .cal-nav-btn { background:none; border:none; font-size:24px; font-weight:300; color:var(--text-1); cursor:pointer; padding:6px 16px; border-radius:var(--r-md); transition:background .15s; font-family:inherit; user-select:none; }
    .cal-nav-btn:active { background:var(--glass-inner); }
    .cal-month-label { font-size:17px; font-weight:700; color:var(--text-1); text-align:center; flex:1; }
    .cal-weekdays { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; }
    .cal-wd { text-align:center; font-size:11px; font-weight:600; color:var(--text-3); padding:4px 0; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
    .cal-cell { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:10px; }
    .cal-has-entries { cursor:pointer; transition:opacity .15s; }
    .cal-has-entries:active { opacity:.65; }
    .cal-today { box-shadow:0 0 0 1.5px var(--accent); }
    .cal-cell.cal-late  { outline:2.5px dashed rgba(239,68,68,.85); outline-offset:-2px; }
    .cal-cell.cal-attend-only { outline:1.5px solid rgba(34,197,94,.65); outline-offset:-1.5px; }
    .cal-today .cal-day-num { font-weight:900; color:var(--accent-text); }
    .cal-day-num { font-size:13px; font-weight:500; color:var(--text-1); line-height:1; }
    .cal-dot { display:block; font-size:9px; line-height:1.3; margin-top:1px; }
    .cal-dot-late { color:rgba(239,68,68,.95); }
    .cal-dot-skip { color:var(--gold); }
    .cal-dot-attend { color:rgba(34,197,94,.9); font-size:11px; }
    .cal-dot-miss { color:rgba(255,255,255,.2); font-size:14px; }
    .cal-rest-past { background:rgba(148,163,184,.10); }
    .cal-rest-past .cal-day-num { text-decoration:line-through; opacity:.55; }
    .cal-dot-rest { color:var(--text-3); font-size:11px; opacity:.5; }
    .attend-badge { display:inline-flex; align-items:center; font-size:13px; font-weight:700; color:#22c55e; background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.28); padding:4px 10px; border-radius:20px; }

    /* Scroll-snap for weekly recap — container-based (iOS-safe) */
    #week-recap {
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: y mandatory;
      /* pane is the scroll parent now: viewport minus header+pill+nav overlay */
      height: calc(100dvh - 250px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      border-radius: 16px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    #week-recap::-webkit-scrollbar { display: none; width: 0; height: 0; }
    .week-block {
      scroll-snap-align: start;
      scroll-snap-stop: always;
      min-height: 100%;
      margin-bottom: 0;
      padding-bottom: 24px;
    }

    /* Recap extra cards */
    .recap-divider { border:none; border-top:1px solid rgba(255,255,255,.08); margin:4px 0; }
    .recap-trend { padding:10px 18px 14px; }
    .recap-trend-lbl { font-size:11px; font-weight:700; color:var(--text-3); letter-spacing:.8px; text-transform:uppercase; margin-bottom:8px; }
    .trend-bars { display:flex; align-items:flex-end; gap:4px; height:80px; }
    .trend-col { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; height:100%; justify-content:flex-end; }
    .trend-bar { width:100%; border-radius:4px 4px 0 0; min-height:2px; transition:height .4s ease; }
    .trend-bar.trend-real { background:rgba(239,68,68,.7); }
    .trend-bar.trend-ghost { background:rgba(255,255,255,.1); height:2px !important; border-radius:2px; }
    .trend-day-lbl { font-size:9px; font-weight:600; color:var(--text-3); }
    .recap-compare { display:flex; align-items:center; gap:10px; padding:10px 18px; }
    .recap-compare-arrow { font-size:16px; font-weight:800; flex-shrink:0; }
    .recap-compare-delta { font-size:13px; font-weight:700; }
    .recap-compare-verdict { font-size:12px; color:var(--text-3); margin-top:1px; }
    .recap-positive { padding:10px 18px 14px; display:flex; flex-direction:column; gap:10px; }
    .recap-pos-row { display:flex; align-items:center; gap:10px; }
    .recap-pos-icon { font-size:18px; flex-shrink:0; }
    .recap-pos-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .recap-pos-info { flex:1; min-width:0; }
    .recap-pos-label { font-size:11px; color:var(--text-3); font-weight:600; }
    .recap-pos-name { font-size:13px; font-weight:700; }
    .recap-pos-meta { font-size:12px; color:var(--text-3); margin-left:auto; flex-shrink:0; }

    /* Desktop overrides */
    @media (hover:hover) and (pointer:fine) {
      .bottom-nav { display:none; }
      .nav-top { display:block; }
      #week-recap { overflow:visible; height:auto; scroll-snap-type:none; }
      .week-block { min-height:auto; margin-bottom:22px; }
      .tab-pane { padding-bottom:32px; }
      #fab { bottom:32px; }
    }

    /* ════════════════════════════════════════════════════════ */
    /*  DESKTOP FULL LAYOUT  (landscape / wide screen)         */
    /* ════════════════════════════════════════════════════════ */
    @media (hover:hover) and (pointer:fine) and (min-width:860px) {
      html, body { overflow: hidden; height: 100%; }

      /* ── App screen ── */
      #screen-app { padding: 0; width: 100%; max-width: 100%; align-items: stretch; }

      .app-inner {
        max-width: 100%; padding: 0;
        display: grid;
        grid-template-areas:
          "hdr hdr"
          "sidebar main"
          "sidebar main";
        grid-template-columns: 280px 1fr;
        grid-template-rows: 56px 1fr;
        height: 100svh; overflow: hidden;
      }

      /* ── Header: compact horizontal bar ── */
      .header {
        grid-area: hdr;
        padding: 0 20px 0 16px;
        display: flex; align-items: center; gap: 12px;
        border-bottom: 1px solid var(--divider);
        background: var(--glass-inner);
        backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        text-align: left; flex-direction: row;
      }
      .header-title { flex: 1; }
      .admin-badge { margin: 0; }
      .my-profile-btn { position: static; transform: none; }

      /* ── Left sidebar (group-pill + vertical nav) ── */
      .group-pill {
        grid-area: sidebar; align-self: start;
        margin: 12px 12px 0; width: auto; max-width: none;
      }
      .group-pill .pill-name { max-width: 200px; flex-shrink: 0; }
      /* The copy hint is touch guidance — on desktop it only adds text noise */
      .group-pill .pill-copy-hint { display: none; }
      .nav-top {
        grid-area: sidebar; align-self: start;
        display: flex; flex-direction: column;
        padding: 64px 12px 12px;
        width: 280px;
      }
      .nav-top .nav-bar {
        flex-direction: column; border-radius: var(--r-xl); padding: 6px; gap: 2px;
      }
      .nav-top .nav-btn {
        flex-direction: row; justify-content: flex-start; gap: 10px;
        padding: 11px 14px; border-radius: var(--r-md);
      }
      .nav-top .nav-btn .nav-ico { font-size: 18px; }
      .nav-top .nav-btn .nav-lbl {
        font-size: 14px; font-weight: 600; color: var(--text-1); display: inline !important;
      }
      .nav-top .nav-btn.active .nav-lbl { color: var(--accent-text); }
      .nav-top .nav-indicator { display: none; }

      /* ── Main content area: week/history panes ── */
      #pane-week, #pane-history, #pane-recap {
        grid-area: main;
        overflow-y: auto; padding: 16px 24px 40px;
        height: calc(100svh - 56px);
      }

      /* ── People pane: right panel overlay within main ── */
      #pane-people {
        display: block !important;
        position: fixed; top: 56px; right: 0;
        width: 300px; height: calc(100svh - 56px);
        overflow-y: auto; padding: 16px 20px;
        border-left: 1px solid var(--divider);
        background: var(--glass-inner);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        z-index: 5;
      }
      /* Push main content left of people panel */
      #pane-week, #pane-history, #pane-recap { margin-right: 300px; }

      #week-recap { max-height: none; }

      /* FAB stays fixed, just reposition */
      #fab { bottom: 24px; right: 316px; }

      /* Modals: wider on desktop */
      .modal { max-width: 560px; }
      #mset-map-container { height: 220px; }
    }

    /* ── HISTORY: LAYOUT ─────────────────────────────────────── */

    .recap-hero {
      padding: 22px 18px 18px; text-align: center;
      border-bottom: 1px solid var(--divider);
      position: relative; overflow: hidden;
    }
    .recap-trophy-wrap { margin-bottom: 8px; }
    .recap-trophy { font-size: 44px; display: inline-block; }
    .recap-name  { font-size: 20px; font-weight: 800; color: var(--text-1); }
    .recap-role  { font-size: 13px; color: var(--text-2); margin-top: 3px; }

    .rank-row {
      display:flex; align-items:center; gap:12px;
      padding:12px 18px; border-bottom:1px solid var(--divider);
      position: relative;
    }
    .rank-row:last-child { border-bottom:none; }
    .rank-no { font-size:20px; width:30px; text-align:center; flex-shrink:0; }

    /* Gold shimmer strip */
    .rank-row.rank-gold::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(251,191,36,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── PEOPLE ──────────────────────────────────────────────── */
    .person-row {
      display:flex; align-items:center; gap:12px;
      padding:11px 18px; border-bottom:1px solid var(--divider);
    }
    .person-row:last-child { border-bottom:none; }
    .person-name { flex:1; font-size:15px; font-weight:600; color:var(--text-1); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    .add-person-card { border-radius:var(--r-xl); padding:16px 18px; margin-top:10px; }
    .add-row { display:flex; gap:10px; margin-top:12px; }
    .leave-section { margin-top: 12px; }
    .leave-btn {
      width:100%; padding:14px; border-radius:var(--r-md); border:none;
      font-family:inherit; font-size:15px; font-weight:600; cursor:pointer;
      color:var(--red); background:var(--red-light); border:1.5px solid rgba(239,68,68,.2);
      transition:transform .15s, opacity .15s;
    }
    .leave-btn:active { transform:scale(.96); opacity:.8; }

    /* ── ADMIN PANEL (Shortcuts-style page) ─────────────────── */
    .admin-grid {
      display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 4px;
    }
    .admin-tile {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; padding: 16px 12px 14px; border-radius: 16px;
      cursor: pointer; font-family: inherit;
      background: var(--glass-inner); border: 1px solid var(--glass-border);
      transition: transform .15s, opacity .15s; width: 100%;
    }
    .admin-tile:active { transform: scale(.94); opacity: .8; }
    .admin-tile-glyph {
      width: 44px; height: 44px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .admin-tile-glyph svg { width: 22px; height: 22px; }
    .admin-tile-title {
      font-size: 12px; font-weight: 700; color: var(--text-1);
      text-align: center; line-height: 1.3;
    }
    .admin-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: .7px;
      text-transform: uppercase; color: var(--text-3); margin: 20px 0 10px;
    }
    .admin-exit-tile {
      width: 100%; padding: 14px; border-radius: 14px; border: none;
      font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
      background: var(--red-light); color: var(--red);
      border: 1.5px solid rgba(239,68,68,.3);
      transition: transform .15s, opacity .15s; margin-top: 8px;
    }
    .admin-exit-tile:active { transform: scale(.96); opacity: .8; }
    .admin-coords { font-size: 11px; color: var(--text-3); margin-top: 12px; word-break: break-all; }

    /* ── MODALS ──────────────────────────────────────────────── */
    .overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.35);
      backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
      z-index:100; display:flex; align-items:flex-end; justify-content:center;
      padding:0 12px calc(12px + env(safe-area-inset-bottom));
      opacity:0; pointer-events:none; transition:opacity .25s ease;
    }
    .overlay.open { opacity:1; pointer-events:all; }
    .modal {
      width:100%; max-width:500px; border-radius:var(--r-xl); padding:28px 22px 22px;
      transform:translateY(50px) scale(.96);
      transition:transform .35s cubic-bezier(.34,1.56,.64,1);
      max-height:88svh; overflow-y:auto; -webkit-overflow-scrolling:touch;
    }
    .overlay.open .modal { transform:translateY(0) scale(1); }
    .modal-title { font-size:20px; font-weight:800; letter-spacing:-.4px; color:var(--text-1); margin-bottom:20px; }
    .modal-sub   { font-size:14px; color:var(--text-2); margin-top:-14px; margin-bottom:20px; }

    .form-grp { margin-bottom:14px; }
    .form-lbl {
      display:block; font-size:12px; font-weight:600;
      color:var(--text-2); text-transform:uppercase; letter-spacing:.4px; margin-bottom:6px;
    }
    .form-ctrl {
      width:100%; padding:13px 14px; border-radius:var(--r-md);
      border:1.5px solid var(--input-border); background:var(--input-bg);
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      font-size:16px; font-weight:500; color:var(--text-1);
      font-family:inherit; outline:none; -webkit-appearance:none; appearance:none;
      transition:border-color .2s, box-shadow .2s;
    }
    .form-ctrl:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }
    @media (prefers-color-scheme: dark) { .form-ctrl { color-scheme:dark; } }
    .select-wrap { position:relative; }
    .select-wrap::after { content:'▾'; position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--text-2); pointer-events:none; font-size:13px; }
    .modal-row { display:flex; gap:10px; margin-bottom:14px; }
    .modal-row .form-grp { flex:1; margin-bottom:0; }
    .modal-btns { display:flex; gap:10px; margin-top:20px; }

    /* ── BUTTONS ─────────────────────────────────────────────── */
    .btn {
      flex:1; padding:15px; border-radius:var(--r-md); border:none;
      font-family:inherit; font-size:16px; font-weight:700; cursor:pointer;
      transition:transform .15s, opacity .15s;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn:active { transform:scale(.94); opacity:.85; }
    .btn-xl  { padding:17px; font-size:17px; border-radius:var(--r-lg); }
    .btn-primary { background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:var(--on-accent); box-shadow:0 4px 16px var(--accent-glow); }
    .btn-ghost   { background:var(--glass-bg); color:var(--text-1); border:1.5px solid var(--glass-border); backdrop-filter:blur(8px); }
    .btn-full    { width:100%; flex:none; }

    /* ── INTERACTION FEEDBACK (hover / disabled / focus) ─────── */
    @media (hover:hover) {
      .btn:hover { transform:translateY(-1px); }
      .btn-primary:hover { box-shadow:0 6px 22px var(--accent-glow); filter:brightness(1.06); }
      .btn-ghost:hover { background:var(--glass-inner); }
      #fab:hover { transform:scale(1.06); }
      .reason-chip:hover:not(.sel) { border-color:var(--accent); }
      .mode-btn:hover:not(.active) { color:var(--text-1); }
      .day-btn:hover:not(.active) { border-color:var(--accent); color:var(--text-1); }
      .icon-btn:hover { transform:scale(1.08); }
      .admin-btn:hover { transform:translateY(-1px); }
      .cal-nav-btn:hover { background:var(--glass-inner); }
      .nav-btn:hover:not(.active) .nav-ico, .nav-btn:hover:not(.active) .nav-lbl { color:var(--text-1); }
      .leave-btn:hover { opacity:.85; }
      .overlay-btn-primary:hover { transform:translateY(-1px); box-shadow:0 10px 32px rgba(0,0,0,.35); }
      .overlay-btn-ghost:hover { background:rgba(255,255,255,.22); }
      .copy-code-btn:hover, .checkin-time-save-btn:hover { filter:brightness(1.06); }
    }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .btn:disabled { transform:none; box-shadow:none; }
    .btn:disabled:active { transform:none; opacity:.45; }
    button:focus-visible, .btn:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }

    /* ── SUCCESS MODAL ───────────────────────────────────────── */
    .success-check { font-size:48px; text-align:center; margin-bottom:8px; }
    .success-title { font-size:22px; font-weight:800; color:var(--text-1); text-align:center; }
    .success-sub   { font-size:14px; color:var(--text-2); text-align:center; margin-top:4px; }
    .code-boxes { display:flex; gap:8px; justify-content:center; margin:22px 0 10px; }
    .code-char {
      width:44px; height:52px; display:flex; align-items:center; justify-content:center;
      font-size:22px; font-weight:900;
      color:var(--accent-text); background:var(--accent-light); border:2px solid var(--accent-2); border-radius:12px;
    }
    .copy-code-btn {
      width:100%; padding:13px; border-radius:var(--r-md);
      border:1.5px solid var(--accent-2); background:var(--accent-light); color:var(--accent-text);
      font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;
      transition:transform .15s; margin-bottom:10px;
    }
    .copy-code-btn:active { transform:scale(.96); }

    /* ── JOIN CODE INPUT ─────────────────────────────────────── */
    .code-input { text-align:center; font-size:30px; font-weight:900; letter-spacing:8px; text-transform:uppercase; }

    /* ── TOAST ───────────────────────────────────────────────── */
    .toast {
      position:fixed; bottom:calc(100px + env(safe-area-inset-bottom));
      left:50%; transform:translateX(-50%) translateY(16px);
      background:rgba(0,0,0,0.82); color:white;
      padding:10px 20px; border-radius:20px;
      font-size:14px; font-weight:600; z-index:999; opacity:0; pointer-events:none;
      transition:opacity .22s, transform .22s; white-space:nowrap; backdrop-filter:blur(12px);
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── Notification Bubble ────────────────────────────────── */
    .notif-bubble {
      position: fixed;
      bottom: calc(88px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(24px);
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px 12px 12px; border-radius: 50px;
      min-width: 260px; max-width: calc(100vw - 32px);
      z-index: 480; opacity: 0; pointer-events: none;
      transition: opacity .3s, transform .38s cubic-bezier(.34,1.56,.64,1);
      cursor: pointer;
    }
    .notif-bubble.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }
    .notif-glyph {
      width: 44px; height: 44px; flex-shrink: 0; border-radius: 50%;
      background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .notif-body { flex: 1; min-width: 0; }
    .notif-t1 { font-size: 14px; font-weight: 800; color: var(--text-1); line-height: 1.2; }
    .notif-t2 { font-size: 12px; color: var(--text-2); margin-top: 2px; }
    .notif-x {
      background: none; border: none; color: var(--text-2); cursor: pointer;
      font-size: 18px; padding: 4px 2px; flex-shrink: 0;
      font-family: inherit; line-height: 1; opacity: .7;
    }
    .replay-hint-chip {
      position: fixed;
      bottom: calc(88px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(16px);
      padding: 10px 20px; border-radius: 50px;
      font-size: 13px; font-weight: 600; color: var(--accent-text);
      z-index: 479; opacity: 0; pointer-events: none;
      transition: opacity .22s, transform .22s; white-space: nowrap;
      cursor: pointer; border: none; font-family: inherit; display: none;
    }
    .replay-hint-chip.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }

    /* ── Full-page slides ───────────────────────────────────── */
    .fullpage {
      position: fixed; inset: 0; z-index: 200;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.25,.46,.45,.94);
      background: var(--bg); overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .fullpage.open { transform: translateX(0); }
    .fullpage-bar {
      position: sticky; top: 0; z-index: 1;
      display: flex; align-items: center; gap: 8px;
      padding: calc(env(safe-area-inset-top) + 14px) 16px 14px;
      background: var(--bg); border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .fullpage-back {
      display: flex; align-items: center; gap: 4px;
      background: none; border: none; font-family: inherit;
      font-size: 16px; font-weight: 700; color: var(--accent-text);
      cursor: pointer; padding: 4px 6px 4px 0; flex-shrink: 0;
    }
    .fullpage-bar-title {
      flex: 1; font-size: 17px; font-weight: 700; color: var(--text-1);
      text-align: center; margin-right: 36px;
    }
    .fullpage-inner {
      padding: 24px 20px; max-width: 520px; margin: 0 auto;
    }
    /* Keep chest / success / recovery overlays above fullpages */
    #modal-chest, #modal-success, #modal-recovery-code { z-index: 300; }

    /* ── LOADING ─────────────────────────────────────────────── */
    .loading-screen {
      position:fixed; inset:0; z-index:200;
      display:flex; align-items:center; justify-content:center;
      background: #f0e9da;
    }
    @media (prefers-color-scheme: dark) { .loading-screen { background: #09060f; } }
    .loading-screen.hidden { display:none; }
    .spinner {
      width:40px; height:40px;
      border:3px solid var(--accent-light); border-top-color:var(--accent);
      border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════════════════════ */
    /*  RECAP ANIMATIONS                                         */
    /* ══════════════════════════════════════════════════════════ */

    /* Card slides up */
    @keyframes week-card-in {
      from { opacity:0; transform:translateY(36px) scale(.97); }
      to   { opacity:1; transform:translateY(0)    scale(1);   }
    }
    .anim-week { animation: week-card-in .55s cubic-bezier(.34,1.4,.64,1) both; }

    /* Section label fades */
    @keyframes fade-up {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .anim-fade-up { animation: fade-up .35s ease-out both; }

    /* Trophy entrance — overshoot bounce */
    @keyframes trophy-pop {
      0%  { transform:scale(0) rotate(-25deg); opacity:0; }
      55% { transform:scale(1.30) rotate(8deg); opacity:1; }
      72% { transform:scale(0.85) rotate(-4deg); }
      86% { transform:scale(1.08) rotate(2deg); }
      100%{ transform:scale(1)    rotate(0deg); }
    }
    .anim-trophy { animation: trophy-pop .75s cubic-bezier(.34,1.4,.64,1) both; }

    /* Floating idle loop after entrance */
    @keyframes trophy-float {
      0%,100% { transform:translateY(0)    rotate(0deg); }
      30%     { transform:translateY(-5px) rotate(-3deg); }
      70%     { transform:translateY(-3px) rotate(3deg); }
    }
    .anim-trophy.done { animation: trophy-float 3.5s ease-in-out 1s infinite; }

    /* Name flies in from left */
    @keyframes name-in {
      from { opacity:0; transform:translateX(-28px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .anim-name { animation: name-in .45s cubic-bezier(.34,1.3,.64,1) both; }

    /* Rank rows slide in from left, staggered */
    @keyframes rank-in {
      from { opacity:0; transform:translateX(-30px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .anim-rank { animation: rank-in .4s cubic-bezier(.34,1.4,.64,1) both; }

    /* Gold row pulse */
    @keyframes gold-pulse {
      0%,100% { box-shadow: none; }
      50%     { box-shadow: inset 0 0 0 9999px rgba(251,191,36,0.08), 0 0 16px rgba(251,191,36,0.25); }
    }
    .rank-row.rank-gold { animation: gold-pulse 1.8s ease-in-out both; }

    /* ── CONFETTI ────────────────────────────────────────────── */
    @keyframes confetti-fall {
      0%   { transform:translateY(-6px) rotate(var(--cr)); opacity:1; }
      75%  { opacity: 1; }
      100% { transform:translateY(130px) rotate(calc(var(--cr) + var(--cr2))); opacity:0; }
    }
    .cbit {
      position:absolute; pointer-events:none; top:-6px;
      animation: confetti-fall var(--cd) ease-in var(--cdelay) forwards;
    }

    /* ── ENTRY SLIDE-IN ──────────────────────────────────────── */
    @keyframes entry-in {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .animate { animation: entry-in .3s cubic-bezier(.34,1.56,.64,1) both; }

    /* Error */
    .error-msg { font-size:13px; color:var(--red); margin-top:6px; font-weight:500; text-align:center; min-height:18px; }

    /* ── AVATAR CIRCLE ───────────────────────────────────────── */
    .avatar-circle {
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; border:1.5px solid rgba(255,255,255,0.22);
      font-size:20px; width:40px; height:40px;
    }
    .avatar-circle.lg  { width:72px;  height:72px;  font-size:36px; border-width:2px; }
    .avatar-circle.xl  { width:84px;  height:84px;  font-size:42px; border-width:2.5px; }

    /* ── AVATAR PICKER ───────────────────────────────────────── */
    .avatar-preview-wrap { text-align:center; margin-bottom:18px; }
    .emoji-grid {
      display:grid; grid-template-columns:repeat(6,1fr); gap:7px; margin-top:6px;
    }
    .emoji-cell {
      aspect-ratio:1; border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:20px; cursor:pointer; border:2px solid transparent;
      background:var(--glass-inner); transition:transform .15s, border-color .15s;
    }
    .emoji-cell.sel { border-color:var(--accent); transform:scale(1.18); }
    .emoji-cell:active { transform:scale(.92); }
    .avatar-upload-wrap { text-align:center; margin:0 0 8px; }
    .btn-upload-photo { background:none; border:1px solid var(--accent-2); color:var(--accent-text); font-size:13px; cursor:pointer; padding:5px 14px; border-radius:20px; transition:opacity .15s; }
    .btn-upload-photo:active { opacity:.6; }
    .btn-upload-photo:disabled { opacity:.45; cursor:not-allowed; }
    .avatar-upload-msg { font-size:12px; text-align:center; margin-bottom:6px; min-height:16px; }
    .avatar-circle img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; }

    .color-grid {
      display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-top:6px;
    }
    .color-dot {
      aspect-ratio:1; border-radius:50%; cursor:pointer;
      border:3px solid transparent; box-shadow:0 2px 6px rgba(0,0,0,.22);
      transition:transform .15s, border-color .15s;
    }
    .color-dot.sel  { border-color:white; transform:scale(1.2); }
    .color-dot:active { transform:scale(.9); }

    /* ── RECOVERY CODE BOXES ─────────────────────────────────── */
    .rc-row { display:flex; gap:8px; justify-content:center; margin:20px 0 10px; }
    .rc-box {
      padding:10px 14px; border-radius:12px;
      background:var(--accent-light); border:2px solid var(--accent-2);
      font-size:17px; font-weight:900; color:var(--accent-text);
      letter-spacing:4px; font-family:monospace;
    }

    /* ── PROFILE VIEW ────────────────────────────────────────── */
    .pv-avatar-wrap  { text-align:center; margin-bottom:12px; }
    .pv-name         { font-size:22px; font-weight:800; color:var(--text-1); text-align:center; }
    .pv-badge        {
      display:inline-block; margin-top:4px; margin-bottom:4px;
      font-size:11px; font-weight:700; letter-spacing:.4px;
      background:var(--accent-light); color:var(--accent-text);
      border:1px solid rgba(245,158,11,.28); padding:2px 8px; border-radius:20px;
    }
    .rc-blur-wrap { position:relative; margin-bottom:6px; }
    .rc-blur {
      font-family:monospace; font-size:16px; font-weight:700;
      padding:12px 14px; background:var(--input-bg);
      border:1.5px solid var(--input-border); border-radius:var(--r-md);
      letter-spacing:3px; filter:blur(5px); cursor:pointer; user-select:none;
      transition:filter .25s;
    }
    .rc-blur.revealed { filter:none; }
    .rc-reveal-btn {
      position:absolute; right:10px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; font-size:16px; opacity:.55;
      padding:4px; line-height:1;
    }

    /* ── TOGGLE LINK ─────────────────────────────────────────── */
    .toggle-link {
      background:none; border:none; color:var(--accent-text);
      font-size:13px; font-weight:600; cursor:pointer;
      font-family:inherit; text-decoration:underline; padding:4px; opacity:.8;
    }
    .toggle-link:active { opacity:1; }

    /* ── MY PROFILE BTN ──────────────────────────────────────── */
    .my-profile-btn {
      position:absolute; right:0; top:calc(env(safe-area-inset-top) + 10px);
      width:44px; height:44px; border-radius:50%;
      border:3.5px solid rgba(255,255,255,0.38);
      box-shadow: 0 0 0 1px rgba(245,158,11,0.25);
      display:none; align-items:center; justify-content:center;
      font-size:22px; cursor:pointer; transition:transform .15s;
      font-family:inherit; background:transparent; color:var(--text-1);
    }
    .my-profile-btn.visible { display:flex; }
    .my-profile-btn:active { transform:scale(.88); }

    /* ── INVITE SECTION ──────────────────────────────────────── */
    .invite-card { border-radius:var(--r-xl); padding:16px 18px; margin-top:10px; text-align:center; }
    .invite-hint { font-size:13px; color:var(--text-2); margin-bottom:12px; }

    /* ══════════════════════════════════════════════════════════ */
    /*  WRAPPED  — Spotify-style fullscreen weekly story         */
    /* ══════════════════════════════════════════════════════════ */
    .wrapped {
      position: fixed; inset: 0; z-index: 500;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      overscroll-behavior: none;
      -webkit-user-select: none; user-select: none;
    }
    .wrapped.hidden { display: none; }

    /* Progress segments (top) */
    .w-prog {
      position: absolute; left: 12px; right: 12px;
      top: calc(env(safe-area-inset-top) + 10px);
      display: flex; gap: 5px; z-index: 20; pointer-events: none;
    }
    .w-seg {
      flex: 1; height: 3px; border-radius: 3px;
      background: rgba(255,255,255,0.28); overflow: hidden;
    }
    .w-fill { height: 100%; width: 0%; background: rgba(255,255,255,0.9); }

    /* Skip / close button */
    .w-skip {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 16px);
      right: 16px; z-index: 30;
      background: rgba(255,255,255,0.18);
      border: none; color: white;
      width: 36px; height: 36px; border-radius: 50%;
      font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: background .15s;
    }
    .w-skip:active { background: rgba(255,255,255,0.32); }

    /* Tap zones */
    .w-tap-l,.w-tap-r { position: absolute; top: 0; bottom: 0; z-index: 10; }
    .w-tap-l { left:  0; width: 33%; }
    .w-tap-r { right: 0; width: 67%; }

    /* Stage — full screen, no overflow */
    .w-stage { position: absolute; inset: 0; }

    /* Individual slide */
    .w-slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: calc(env(safe-area-inset-top) + 68px) 32px calc(env(safe-area-inset-bottom) + 52px);
      overflow: hidden;
    }
    /* Specular highlight overlay */
    .w-slide::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 25% 15%, rgba(255,255,255,0.12) 0%, transparent 55%);
      pointer-events: none; z-index: 1;
    }
    .w-slide > * { position: relative; z-index: 2; }

    /* ── Slide transitions ── */
    @keyframes w-in  { from{opacity:0;transform:scale(1.06)} to{opacity:1;transform:scale(1)} }
    @keyframes w-out { from{opacity:1;transform:scale(1)}    to{opacity:0;transform:scale(.94)} }
    .w-in  { animation: w-in  .3s cubic-bezier(.25,.46,.45,.94) both; }
    .w-out { animation: w-out .22s ease-in both; }

    /* ── Element animations ── */
    @keyframes w-pop {
      0%  { opacity:0; transform:scale(0.3) rotate(-6deg); }
      60% { opacity:1; transform:scale(1.10) rotate(2deg); }
      80% { transform:scale(0.93); }
      100%{ opacity:1; transform:scale(1) rotate(0); }
    }
    @keyframes w-rise {
      from { opacity:0; transform:translateY(36px); filter:blur(6px); }
      to   { opacity:1; transform:translateY(0);    filter:blur(0); }
    }
    @keyframes w-fade { from{opacity:0} to{opacity:1} }
    @keyframes w-shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-14px)}
      40%{transform:translateX(10px)}  60%{transform:translateX(-8px)}
      80%{transform:translateX(5px)}
    }

    .w-pop  { animation: w-pop  .6s cubic-bezier(.34,1.56,.64,1) both; }
    .w-rise { animation: w-rise .5s cubic-bezier(.25,.46,.45,.94) both; }
    .w-fade { animation: w-fade .4s ease both; }

    /* ── Typography ── */
    .w-group {
      font-size: 13px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
      text-align: center; margin-bottom: 8px;
    }
    .w-label {
      font-size: clamp(14px,4.5vw,18px); font-weight: 600; letter-spacing: 1px;
      text-transform: uppercase; color: rgba(255,255,255,0.6);
      text-align: center;
    }
    .w-headline {
      font-size: clamp(60px,20vw,104px); font-weight: 900; line-height: .9;
      color: white; text-align: center; letter-spacing: -3px; font-style: italic;
    }
    .w-headline-md {
      font-size: clamp(42px,13vw,72px); font-weight: 900; line-height: .95;
      color: white; text-align: center; letter-spacing: -2px; font-style: italic;
    }
    .w-number {
      font-size: clamp(88px,30vw,172px); font-weight: 900; line-height: .85;
      color: white; text-align: center; letter-spacing: -5px;
      font-style: italic; font-variant-numeric: tabular-nums;
    }
    .w-sub {
      font-size: clamp(22px,7vw,34px); font-weight: 700; letter-spacing: -.5px;
      color: rgba(255,255,255,0.75); text-align: center;
    }
    .w-name {
      font-size: clamp(44px,14vw,80px); font-weight: 900; letter-spacing: -2px;
      color: white; text-align: center; line-height: 1; font-style: italic;
      word-break: break-word;
    }
    .w-emoji { font-size: clamp(52px,17vw,96px); text-align: center; line-height: 1.1; }
    .w-divider { width: 44px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.25); margin: 14px auto; }
    .w-gap-xs { height: 8px; }
    .w-gap-sm { height: 14px; }
    .w-gap    { height: 24px; }
    .w-gap-lg { height: 40px; }

    /* ── Ranking rows inside wrapped ── */
    .w-ranks { width: 100%; max-width: 360px; }
    .w-rank-row {
      display: flex; align-items: center; gap: 14px;
      padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .w-rank-row:last-child { border-bottom: none; }
    .w-medal { font-size: 22px; width: 28px; flex-shrink: 0; }
    .w-rank-name { flex: 1; font-size: 18px; font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .w-rank-mins { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.6); white-space: nowrap; }

    /* ── End-card close button ── */
    .w-btn-close {
      background: white; color: #1a0030;
      border: none; font-family: inherit;
      font-size: 17px; font-weight: 800; letter-spacing: -.3px;
      padding: 18px 52px; border-radius: 40px; cursor: pointer;
      transition: transform .18s, box-shadow .18s;
      box-shadow: 0 8px 28px rgba(0,0,0,.4);
    }
    .w-btn-close:active { transform: scale(.94); }

    /* ══════════════════════════════════════════════════════════ */
    /*  DAILY HYPE + GEO PROMPT overlays (reuse wrapped pattern) */
    /* ══════════════════════════════════════════════════════════ */
    .fullscreen-overlay {
      position: fixed; inset: 0; z-index: 500;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overscroll-behavior: none;
      -webkit-user-select: none; user-select: none;
      padding: calc(env(safe-area-inset-top) + 32px) 32px calc(env(safe-area-inset-bottom) + 40px);
    }
    .fullscreen-overlay.hidden { display: none; }
    #daily-hype  { background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%); }
    #geo-prompt  { background: linear-gradient(135deg, #16a34a 0%, #0891b2 100%); }

    .overlay-icon  { font-size: 72px; line-height: 1; animation: w-pop .6s cubic-bezier(.34,1.56,.64,1) both; }
    .overlay-title { font-size: clamp(28px,9vw,48px); font-weight: 900; color: white; text-align: center;
                     letter-spacing: -1px; margin-top: 20px; line-height: 1.1;
                     animation: w-rise .5s .1s cubic-bezier(.25,.46,.45,.94) both; }
    .overlay-sub   { font-size: clamp(15px,4vw,20px); color: rgba(255,255,255,.75); text-align: center;
                     margin-top: 12px; font-weight: 500; line-height: 1.4;
                     animation: w-rise .5s .18s cubic-bezier(.25,.46,.45,.94) both; }
    .overlay-btns  { display: flex; gap: 12px; margin-top: 36px; flex-wrap: wrap; justify-content: center;
                     animation: w-fade .4s .3s both; }
    .overlay-btn-primary {
      background: white; color: #1a0030; border: none; font-family: inherit;
      font-size: 17px; font-weight: 800; padding: 16px 40px; border-radius: 40px; cursor: pointer;
      transition: transform .18s, box-shadow .18s; box-shadow: 0 8px 28px rgba(0,0,0,.3);
    }
    .overlay-btn-primary:active { transform: scale(.94); }
    .overlay-btn-ghost {
      background: rgba(255,255,255,.15); color: white; border: 1.5px solid rgba(255,255,255,.35);
      font-family: inherit; font-size: 17px; font-weight: 700; padding: 16px 32px; border-radius: 40px;
      cursor: pointer; transition: background .18s;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .overlay-btn-ghost:active { background: rgba(255,255,255,.25); }

    .dh-time-picker { display:flex; flex-direction:column; align-items:center; gap:12px; margin-top:28px;
                       animation: w-fade .4s .24s both; }

                      background:rgba(255,255,255,.15); color:#fff; font-family:inherit;

                        animation: w-fade .4s .24s both; }

    .dh-time-display-val { font-size:40px; font-weight:900; color:#fff; letter-spacing:-1px; }

    #late-anim { background: radial-gradient(circle at 50% 40%, #b91c1c 0%, #450a0a 60%, #1a0303 100%); z-index:520; }
    .la-icon-wrap { position:relative; width:120px; height:120px; display:flex; align-items:center; justify-content:center; }
    .la-glow { position:absolute; inset:-20px; border-radius:50%; background:radial-gradient(circle, rgba(248,113,113,.55) 0%, rgba(248,113,113,0) 70%);
               animation: sa-glow-pulse 1.6s ease-in-out infinite; }
    .la-icon { font-size:72px; line-height:1; animation: sa-pop .6s cubic-bezier(.34,1.56,.64,1) both; }

    /* ══════════════════════════════════════════════════════════ */
    /*  STREAK HERO (startseite) + STREAK ANIMATION (duolingo)   */
    /* ══════════════════════════════════════════════════════════ */
    .streak-hero {
      display:flex; align-items:center; flex-wrap:wrap; gap:14px;
      padding:18px 18px 16px; border-radius:var(--r-xl); margin-bottom:14px;
      cursor:pointer; -webkit-tap-highlight-color:transparent;
    }
    .streak-flame { width:54px; height:54px; flex-shrink:0; }
    .streak-flame .flame-grey { fill:#9ca3af; opacity:.45; }
    .streak-flame .flame-lit  { opacity:0; transition:opacity .4s; }
    .streak-hero.lit .streak-flame .flame-lit  { opacity:1; }
    .streak-hero.lit .streak-flame .flame-grey { opacity:0; }
    .streak-hero.lit .streak-flame {
      filter:drop-shadow(0 0 10px rgba(249,115,22,.65));
      animation:flame-flicker 2.4s ease-in-out infinite;
    }
    @keyframes flame-flicker {
      0%,100% { transform:scale(1); filter:drop-shadow(0 0 8px rgba(249,115,22,.55)); }
      50%     { transform:scale(1.08); filter:drop-shadow(0 0 15px rgba(251,146,60,.9)); }
    }
    .streak-hero-info { display:flex; align-items:baseline; gap:8px; }
    .streak-hero-num { font-size:46px; font-weight:900; letter-spacing:-1.5px; line-height:1; color:var(--text-2); transition:color .3s; font-variant-numeric:tabular-nums; }
    .streak-hero.lit .streak-hero-num { color:#f97316; }
    .streak-hero-lbl { font-size:14px; font-weight:600; color:var(--text-2); }
    .streak-hero-hint { margin-left:auto; font-size:12px; color:var(--accent-text); font-weight:700; text-align:right; max-width:42%; line-height:1.3; }
    /* The one loud element on the dashboard: a full-width CTA while today's
       check-in is open, a calm green confirmation once it's done. */
    #streak-hero .streak-hero-hint {
      flex-basis:100%; max-width:none; margin-left:0;
      text-align:center; padding:14px; border-radius:var(--r-md);
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      color:#fff; font-size:15px; font-weight:800; letter-spacing:-.2px;
      box-shadow:0 4px 18px var(--accent-glow);
      transition:transform .15s, box-shadow .15s, filter .15s;
    }
    #streak-hero:active .streak-hero-hint { transform:scale(.97); }
    #streak-hero.lit .streak-hero-hint {
      background:rgba(34,197,94,.10); color:var(--green);
      border:1px solid rgba(34,197,94,.22); box-shadow:none;
      font-size:13px; font-weight:700; padding:9px 12px;
    }
    @media (hover:hover) {
      #streak-hero:not(.lit):hover .streak-hero-hint { filter:brightness(1.07); box-shadow:0 6px 24px var(--accent-glow); }
    }
    @keyframes streak-extend-pulse {
      0%   { transform:scale(1); }
      35%  { transform:scale(1.18); filter:drop-shadow(0 0 22px rgba(249,115,22,.9)); }
      100% { transform:scale(1); }
    }
    .streak-hero.lit.just-extended .streak-flame {
      animation:streak-extend-pulse .55s cubic-bezier(.34,1.56,.64,1) forwards,
                flame-flicker 2.4s ease-in-out 0.55s infinite;
    }
    @media (prefers-reduced-motion:reduce) {
      .streak-hero.lit .streak-flame { animation:none; }
      .streak-hero.lit.just-extended .streak-flame { animation:none; }
      #streak-hero .streak-hero-hint { transition:none; }
    }

    #streak-anim {
      background:radial-gradient(circle at 50% 40%, #7c2d12 0%, #2a0e02 55%, #140601 100%);
      z-index:520;
    }
    .sa-flame-wrap { position:relative; width:140px; height:140px; }
    .sa-flame-wrap svg { position:absolute; inset:0; width:100%; height:100%; }
    .sa-flame-wrap { animation:sa-pop .65s cubic-bezier(.18,1.5,.4,1) both; }
    @keyframes sa-pop {
      0%   { transform:scale(0) rotate(-14deg); }
      70%  { transform:scale(1.18) rotate(3deg); }
      100% { transform:scale(1) rotate(0); }
    }
    .sa-flame-grey path { fill:#9ca3af; opacity:.5; }
    .sa-flame-lit { opacity:0; animation:sa-ignite .5s .55s ease-out forwards; }
    @keyframes sa-ignite { to { opacity:1; } }
    .sa-flame-lit.on { animation:none; opacity:1; }
    .sa-glow {
      position:absolute; inset:-40px; border-radius:50%; pointer-events:none;
      background:radial-gradient(circle, rgba(251,146,60,.55) 0%, transparent 65%);
      opacity:0; animation:sa-glow-in .6s .55s ease-out forwards, sa-glow-pulse 2s 1.2s ease-in-out infinite;
    }
    @keyframes sa-glow-in    { to { opacity:1; } }
    @keyframes sa-glow-pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.15); } }
    .sa-num {
      font-size:clamp(72px,22vw,110px); font-weight:900; color:#fff; line-height:1;
      margin-top:26px; letter-spacing:-2px;
      text-shadow:0 0 40px rgba(249,115,22,.6);
      animation:w-rise .5s .7s cubic-bezier(.25,.46,.45,.94) both;
    }
    .sa-lbl {
      font-size:clamp(17px,5vw,24px); font-weight:700; color:rgba(255,255,255,.85);
      margin-top:8px; text-align:center;
      animation:w-rise .5s .85s cubic-bezier(.25,.46,.45,.94) both;
    }
    .sa-btn-wrap { margin-top:40px; animation:w-fade .4s 1.15s both; }

    /* ── Leaflet map in settings ── */
    #mset-map-section { margin-top: 16px; }
    #mset-map-container { height: 160px; border-radius: 12px; overflow: hidden; margin: 10px 0; }
    .mset-radius-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
    .mset-radius-row label { font-size: 13px; color: var(--text-2); flex: 1; }
    .mset-radius-row input[type=range] { flex: 2; }
    .mset-radius-val { font-size: 13px; font-weight: 700; color: var(--text-1); min-width: 48px; text-align: right; }
    /* Geo toggle */
    .geo-toggle-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; }
    .geo-toggle-label { font-size:14px; color:var(--text-1); }
    .toggle-switch { position:relative; display:inline-block; width:46px; height:26px; flex-shrink:0; }
    .toggle-switch input { opacity:0; width:0; height:0; position:absolute; }
    .toggle-slider { position:absolute; inset:0; background:var(--c-muted,#94a3b8); border-radius:26px; cursor:pointer; transition:.22s; }
    .toggle-slider::before { content:''; position:absolute; height:20px; width:20px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.22s; box-shadow:0 1px 3px rgba(0,0,0,.3); }
    .toggle-switch input:checked + .toggle-slider { background:var(--c-primary,#f59e0b); }
    .toggle-switch input:checked + .toggle-slider::before { transform:translateX(20px); }
    .mset-geo-hint { font-size:12px; opacity:.6; text-align:center; margin-top:6px; min-height:1em; }
.beta-badge { display:inline-block; font-size:9px; font-weight:700; letter-spacing:.05em; color:var(--accent-text); background:var(--accent-light); border:1px solid rgba(245,158,11,.28); border-radius:5px; padding:1px 5px; vertical-align:middle; text-transform:uppercase; }
    .mset-locate-btn { font-size: 13px; color: var(--accent-text); background: none; border: none; font-family: inherit;
                       cursor: pointer; padding: 4px 0; text-decoration: underline; }

    /* ── Gym days chips in profile view ── */
    .pv-gym-days { margin: 10px 0 4px; }
    .pv-gym-days-lbl { font-size: 12px; color: var(--text-2); font-weight: 600; letter-spacing: .4px;
                       text-transform: uppercase; margin-bottom: 6px; }
    .pv-day-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .pv-day-chip { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
                   background: var(--accent-light); color: var(--accent-text);
                   border: 1px solid rgba(245,158,11,.28); }

    /* ── Admin user edit modal ── */
    #modal-admin-user .modal { max-height: 90svh; overflow-y: auto; }
    .admin-user-section-title { font-size: 12px; font-weight: 700; letter-spacing: .5px;
                                text-transform: uppercase; color: var(--text-2); margin: 16px 0 8px; }
    .admin-number-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
    .admin-number-row label { font-size: 14px; color: var(--text-1); flex: 1; }
    .admin-number-input { width: 70px; padding: 8px; border-radius: 8px; border: 1px solid var(--divider);
                          background: var(--card); color: var(--text-1); font-family: inherit;
                          font-size: 16px; font-weight: 700; text-align: center; }

    /* ── Admin debug panel extras ── */
  </style>
</head>

//  DATE HELPERS
// ════════════════════════════════════════════════════════
const pad = n => String(n).padStart(2,'0');
function todayStr() { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fmtShort(s){ return new Date(s+'T12:00').toLocaleDateString(navigator.language,{day:'numeric',month:'short'}); }
function fmtFull(s) { return new Date(s+'T12:00').toLocaleDateString(navigator.language,{weekday:'short',day:'numeric',month:'short'}); }
function addDays(dateStr, n) {
  const d = new Date(dateStr+'T12:00'); d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function mondayOf(s) {
  const d=new Date(s+'T12:00'), day=d.getDay()||7; d.setDate(d.getDate()-day+1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function sundayOf(m) {
  const d=new Date(m+'T12:00'); d.setDate(d.getDate()+6);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

const api = {
  async req(method, path, body) {
    const opts = { method, headers:{'Content-Type':'application/json'} };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch('/api'+path, opts);
    const d   = await res.json();
    if (!res.ok) { const e=new Error(d.error||'error'); e.status=res.status; throw e; }
    return d;
  },
  verifyAdmin:   (pw)      => api.req('POST', '/admin/verify', {password:pw}),
  createGroup:   (n,gd)   => api.req('POST', '/groups', {name:n, gym_days:gd}),
  patchGroup:    (id,d)   => api.req('PATCH', `/groups/${id}`, d),
  createTestGroup:p       => api.req('POST', '/test-group', {password:p}),
  joinGroup:      c       => api.req('POST', '/groups/join', {code:c}),
  getGroup:       id      => api.req('GET',  `/groups/${id}`),
  addMember:     (g,n)    => api.req('POST',   `/groups/${g}/members`, {name:n}),
  delMember:     (g,n)    => api.req('DELETE', `/groups/${g}/members/${encodeURIComponent(n)}`),
  addEntry:      (g,d)    => api.req('POST',   `/groups/${g}/entries`, d),
  delEntry:      (g,e,pw) => api.req('DELETE', `/groups/${g}/entries/${e}`, pw ? {adminPassword:pw} : undefined),
  patchEntry:    (g,e,d,pw) => api.req('PATCH',  `/groups/${g}/entries/${e}`, {...d, adminPassword:pw}),
  registerUser:  (g,d)    => api.req('POST',   `/groups/${g}/users`, d),
  loginUser:     (g,d)    => api.req('POST',   `/groups/${g}/users/login`, d),
  updateUser:    (g,u,d)  => api.req('PATCH',  `/groups/${g}/users/${u}`, d),
  kickUser:      (g,u,d)  => api.req('DELETE', `/groups/${g}/users/${u}`, d),
  testPush:      (type)   => api.req('POST', '/admin/test-push', { userId: userProfile?.userId, groupId: group?.id, adminPassword, type }),
  setCheckinTime:(g,d)    => api.req('POST',   `/groups/${g}/checkin-time`, d),
};

function loadAllGroups() { try { return JSON.parse(localStorage.getItem('gymGroups') || '[]'); } catch { return []; } }
function saveAllGroups(arr) { localStorage.setItem('gymGroups', JSON.stringify(arr)); }

function saveGroup(g) {
  group = {id:g.id, code:g.code, name:g.name};
  localStorage.setItem('gymGroup', JSON.stringify(group));
  // Keep a registry of all joined groups
  const all = loadAllGroups();
  const idx = all.findIndex(x => x.id === g.id);
  if (idx >= 0) all[idx] = {...all[idx], name: g.name, code: g.code};
  else all.push(group);
  saveAllGroups(all);
}
function loadGroup()  { try { group=JSON.parse(localStorage.getItem('gymGroup')||'null'); } catch { group=null; } }
function clearGroup() {
  // Remove from the all-groups list and clear active
  if (group) {
    const all = loadAllGroups().filter(x => x.id !== group.id);
    saveAllGroups(all);
  }
  group=null; data=null; localStorage.removeItem('gymGroup');
}

function saveUser(gid, u) { userProfile=u; localStorage.setItem('gymUser_'+gid, JSON.stringify(u)); }
function loadUser(gid)    { try { userProfile=JSON.parse(localStorage.getItem('gymUser_'+gid)||'null'); } catch { userProfile=null; } }
function clearUser(gid)   { userProfile=null; localStorage.removeItem('gymUser_'+gid); }
