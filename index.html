<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GymLate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Segoe UI', sans-serif;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── THEME ───────────────────────────────────────────────── */
    :root {
      --blob1: #c084fc; --blob2: #67e8f9; --blob3: #f9a8d4; --blob4: #86efac;
      --bg-base: #f5f0ff;

      --glass-bg:     rgba(255,255,255,0.28);
      --glass-border: rgba(255,255,255,0.55);
      --glass-top:    rgba(255,255,255,0.78);
      --glass-shadow: rgba(80,30,160,0.10);
      --glass-inner:  rgba(255,255,255,0.55);

      --input-bg:     rgba(255,255,255,0.38);
      --input-border: rgba(255,255,255,0.65);

      --text-1: rgba(0,0,0,0.85);
      --text-2: rgba(0,0,0,0.50);
      --text-3: rgba(0,0,0,0.28);

      --accent:       #7c3aed;
      --accent-2:     #a855f7;
      --accent-glow:  rgba(124,58,237,0.35);
      --accent-light: rgba(124,58,237,0.12);
      --red:          #ef4444;
      --red-light:    rgba(239,68,68,0.12);
      --green:        #22c55e;

      --divider:  rgba(0,0,0,0.06);
      --blur: 28px;
      --r-xl: 28px; --r-lg: 20px; --r-md: 14px; --r-sm: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --blob1: #6b21a8; --blob2: #164e63; --blob3: #9d174d; --blob4: #14532d;
        --bg-base: #0d0618;

        --glass-bg:     rgba(255,255,255,0.06);
        --glass-border: rgba(255,255,255,0.11);
        --glass-top:    rgba(255,255,255,0.18);
        --glass-shadow: rgba(0,0,0,0.55);
        --glass-inner:  rgba(255,255,255,0.07);

        --input-bg:     rgba(255,255,255,0.08);
        --input-border: rgba(255,255,255,0.14);

        --text-1: rgba(255,255,255,0.93);
        --text-2: rgba(255,255,255,0.52);
        --text-3: rgba(255,255,255,0.28);

        --accent:       #a78bfa;
        --accent-2:     #c4b5fd;
        --accent-glow:  rgba(167,139,250,0.30);
        --accent-light: rgba(167,139,250,0.14);
        --red:          #f87171;
        --red-light:    rgba(248,113,113,0.14);
        --green:        #4ade80;

        --divider: rgba(255,255,255,0.07);
      }
    }

    /* ── BACKGROUND ──────────────────────────────────────────── */
    .bg {
      position: fixed; inset: 0;
      background: var(--bg-base);
      z-index: 0; overflow: hidden;
    }
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(70px); will-change: transform;
    }
    .b1{width:450px;height:450px;background:var(--blob1);top:-120px;right:-100px;opacity:.65;animation:f1 15s ease-in-out infinite}
    .b2{width:380px;height:380px;background:var(--blob2);bottom:5%;left:-100px;opacity:.55;animation:f2 18s ease-in-out infinite}
    .b3{width:280px;height:280px;background:var(--blob3);top:35%;right:10%;opacity:.50;animation:f3 12s ease-in-out infinite}
    .b4{width:220px;height:220px;background:var(--blob4);bottom:20%;right:30%;opacity:.40;animation:f4 20s ease-in-out infinite}
    @keyframes f1{0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(-30px,25px) scale(1.06)} 70%{transform:translate(18px,-12px) scale(.94)}}
    @keyframes f2{0%,100%{transform:translate(0,0) scale(1)} 35%{transform:translate(25px,-35px) scale(1.09)} 65%{transform:translate(-12px,22px) scale(.93)}}
    @keyframes f3{0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-22px,32px) scale(1.12)}}
    @keyframes f4{0%,100%{transform:translate(0,0) scale(1)} 30%{transform:translate(18px,-20px) scale(1.08)} 70%{transform:translate(-10px,15px) scale(.95)}}

    /* ── GLASS ───────────────────────────────────────────────── */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur)) saturate(1.9) brightness(1.05);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(1.9) brightness(1.05);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-top);
      box-shadow: 0 4px 30px var(--glass-shadow), inset 0 1px 0 var(--glass-inner);
    }

    /* ── SCREENS ─────────────────────────────────────────────── */
    .screen {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center;
    }
    .screen.hidden { display: none; }

    /* ── LANDING ─────────────────────────────────────────────── */
    #screen-landing {
      justify-content: center;
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    }

    .landing-hero {
      text-align: center;
      margin-bottom: 32px;
    }
    .landing-icon { font-size: 56px; line-height: 1; margin-bottom: 10px; }
    .landing-title {
      font-size: 44px; font-weight: 900; letter-spacing: -1.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .landing-sub { font-size: 15px; color: var(--text-2); margin-top: 4px; }

    .landing-card {
      width: 100%; max-width: 420px;
      border-radius: var(--r-xl);
      padding: 24px 20px;
    }

    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 14px 0;
      color: var(--text-3); font-size: 13px; font-weight: 500;
    }
    .or-divider::before,.or-divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--divider);
    }

    /* ── APP SCREEN ──────────────────────────────────────────── */
    #screen-app {
      justify-content: flex-start;
    }

    .app-inner {
      width: 100%; max-width: 500px;
      padding: 0 16px;
      display: flex; flex-direction: column;
    }

    /* ── HEADER ──────────────────────────────────────────────── */
    .header {
      padding: calc(env(safe-area-inset-top) + 48px) 0 10px;
      text-align: center;
    }
    .header-icon { font-size: 40px; line-height: 1; margin-bottom: 4px; }
    .header-title {
      font-size: 34px; font-weight: 900; letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── GROUP PILL ──────────────────────────────────────────── */
    .group-pill {
      display: flex; align-items: center; gap: 8px;
      border-radius: 40px;
      padding: 7px 14px;
      margin: 10px auto 16px;
      width: fit-content; max-width: 100%;
    }
    .pill-name {
      font-size: 13px; font-weight: 700;
      color: var(--text-1);
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 150px;
    }
    .pill-dot { font-size: 10px; color: var(--text-3); }
    .pill-code-btn {
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      color: var(--accent);
      font-size: 13px; font-weight: 800;
      letter-spacing: 2px;
      padding: 3px 10px; border-radius: 20px;
      cursor: pointer; font-family: inherit;
      transition: transform .15s, opacity .15s;
    }
    .pill-code-btn:active { transform: scale(.92); opacity: .7; }
    .pill-copy-hint {
      font-size: 11px; color: var(--text-3);
    }

    /* ── SECTION LABEL ───────────────────────────────────────── */
    .sec-label {
      font-size: 12px; font-weight: 600; letter-spacing: .6px;
      text-transform: uppercase; color: var(--text-3);
      margin: 16px 0 7px 4px;
    }

    /* ── STATS ───────────────────────────────────────────────── */
    .stat-row { display: flex; gap: 10px; }
    .stat-card {
      flex: 1; border-radius: var(--r-lg);
      padding: 18px 14px 16px; text-align: center;
    }
    .stat-val {
      font-size: 34px; font-weight: 900; letter-spacing: -1px;
      color: var(--text-1); line-height: 1;
    }
    .stat-val.red { color: var(--red); }
    .stat-lbl { font-size: 12px; color: var(--text-2); margin-top: 4px; font-weight: 500; }

    /* ── CARD ────────────────────────────────────────────────── */
    .card { border-radius: var(--r-xl); overflow: hidden; }

    /* ── ENTRIES ─────────────────────────────────────────────── */
    .entry {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 18px;
      border-bottom: 1px solid var(--divider);
    }
    .entry:last-child { border-bottom: none; }

    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--accent);
      flex-shrink: 0; border: 1.5px solid var(--glass-border);
    }
    .entry-info { flex: 1; min-width: 0; }
    .entry-name {
      font-size: 15px; font-weight: 600; color: var(--text-1);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .entry-meta { font-size: 12px; color: var(--text-2); margin-top: 1px; }

    .late-badge {
      font-size: 13px; font-weight: 700; color: var(--red);
      background: var(--red-light); padding: 4px 10px;
      border-radius: 20px; white-space: nowrap;
      border: 1px solid rgba(239,68,68,.18);
    }
    .icon-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: none; background: var(--red-light);
      color: var(--red); cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s; flex-shrink: 0; font-family: inherit;
    }
    .icon-btn:active { transform: scale(.88); }

    /* ── EMPTY ───────────────────────────────────────────────── */
    .empty { text-align: center; padding: 36px 24px; }
    .empty-ico { font-size: 40px; margin-bottom: 8px; }
    .empty-txt { font-size: 15px; color: var(--text-2); font-weight: 500; }
    .empty-sub { font-size: 13px; color: var(--text-3); margin-top: 4px; }

    /* ── TAB PANE ────────────────────────────────────────────── */
    .tab-pane { display: none; padding-bottom: calc(110px + env(safe-area-inset-bottom)); }
    .tab-pane.active { display: block; }

    /* ── FAB ─────────────────────────────────────────────────── */
    #fab {
      position: fixed;
      bottom: calc(88px + env(safe-area-inset-bottom));
      right: max(16px, calc(50vw - 234px));
      width: 58px; height: 58px; border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white; font-size: 28px; line-height: 1;
      cursor: pointer;
      box-shadow: 0 6px 24px var(--accent-glow), 0 2px 8px rgba(0,0,0,.2);
      transition: transform .2s cubic-bezier(.34,1.56,.64,1);
      z-index: 20; display: flex; align-items: center; justify-content: center;
    }
    #fab:active { transform: scale(.88); }
    #fab.hidden { display: none; }

    /* ── BOTTOM NAV ──────────────────────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 500px;
      padding: 8px 16px calc(10px + env(safe-area-inset-bottom));
      z-index: 30;
    }
    .nav-bar { display: flex; border-radius: var(--r-xl); padding: 6px; gap: 2px; }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px; padding: 8px 4px;
      border: none; background: transparent; border-radius: var(--r-md);
      cursor: pointer; font-family: inherit; transition: background .2s;
    }
    .nav-btn.active { background: var(--glass-inner); }
    .nav-ico { font-size: 22px; transition: transform .2s; }
    .nav-btn.active .nav-ico { transform: scale(1.1); }
    .nav-lbl { font-size: 11px; font-weight: 500; color: var(--text-2); }
    .nav-btn.active .nav-lbl { color: var(--accent); font-weight: 700; }

    /* ── HISTORY ─────────────────────────────────────────────── */
    .week-block { margin-bottom: 20px; }
    .recap-hero {
      padding: 18px 18px 14px; text-align: center;
      border-bottom: 1px solid var(--divider); margin-bottom: 0;
    }
    .recap-trophy { font-size: 32px; margin-bottom: 4px; }
    .recap-name { font-size: 17px; font-weight: 800; color: var(--text-1); }
    .recap-role { font-size: 13px; color: var(--text-2); margin-top: 2px; }
    .rank-row {
      display: flex; align-items: center;
      gap: 12px; padding: 11px 18px;
      border-bottom: 1px solid var(--divider);
    }
    .rank-row:last-child { border-bottom: none; }
    .rank-no { font-size: 20px; width: 30px; text-align: center; flex-shrink: 0; }

    /* ── PEOPLE ──────────────────────────────────────────────── */
    .person-row {
      display: flex; align-items: center;
      gap: 12px; padding: 11px 18px;
      border-bottom: 1px solid var(--divider);
    }
    .person-row:last-child { border-bottom: none; }
    .person-name {
      flex: 1; font-size: 15px; font-weight: 600; color: var(--text-1);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .add-person-card { border-radius: var(--r-xl); padding: 16px 18px; margin-top: 10px; }
    .add-row { display: flex; gap: 10px; margin-top: 12px; }

    .leave-section { margin-top: 20px; }
    .leave-btn {
      width: 100%; padding: 14px;
      border-radius: var(--r-md); border: none; font-family: inherit;
      font-size: 15px; font-weight: 600; cursor: pointer;
      color: var(--red);
      background: var(--red-light);
      border: 1.5px solid rgba(239,68,68,.2);
      transition: transform .15s, opacity .15s;
    }
    .leave-btn:active { transform: scale(.96); opacity: .8; }

    /* ── MODALS ──────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      z-index: 100;
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0 12px calc(12px + env(safe-area-inset-bottom));
      opacity: 0; pointer-events: none;
      transition: opacity .25s ease;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      width: 100%; max-width: 500px;
      border-radius: var(--r-xl); padding: 28px 22px 22px;
      transform: translateY(50px) scale(.96);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    }
    .overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-title {
      font-size: 20px; font-weight: 800; letter-spacing: -.4px;
      color: var(--text-1); margin-bottom: 20px;
    }
    .modal-sub {
      font-size: 14px; color: var(--text-2); margin-top: -14px; margin-bottom: 20px;
    }

    .form-grp { margin-bottom: 14px; }
    .form-lbl {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-2); text-transform: uppercase; letter-spacing: .4px;
      margin-bottom: 6px;
    }
    .form-ctrl {
      width: 100%; padding: 13px 14px;
      border-radius: var(--r-md);
      border: 1.5px solid var(--input-border);
      background: var(--input-bg);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      font-size: 16px; font-weight: 500; color: var(--text-1);
      font-family: inherit; outline: none; -webkit-appearance: none; appearance: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-ctrl:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    @media (prefers-color-scheme: dark) { .form-ctrl { color-scheme: dark; } }

    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾'; position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text-2); pointer-events: none; font-size: 13px;
    }

    .modal-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .modal-row .form-grp { flex: 1; margin-bottom: 0; }

    .modal-btns { display: flex; gap: 10px; margin-top: 20px; }

    /* ── BUTTONS ─────────────────────────────────────────────── */
    .btn {
      flex: 1; padding: 15px; border-radius: var(--r-md);
      border: none; font-family: inherit;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: transform .15s, opacity .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { transform: scale(.94); opacity: .85; }
    .btn-xl { padding: 17px; font-size: 17px; border-radius: var(--r-lg); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .btn-ghost {
      background: var(--glass-bg); color: var(--text-1);
      border: 1.5px solid var(--glass-border);
      backdrop-filter: blur(8px);
    }
    .btn-full { width: 100%; flex: none; }

    /* ── SUCCESS MODAL (group created) ───────────────────────── */
    .success-check { font-size: 48px; text-align: center; margin-bottom: 8px; }
    .success-title { font-size: 22px; font-weight: 800; color: var(--text-1); text-align: center; }
    .success-sub { font-size: 14px; color: var(--text-2); text-align: center; margin-top: 4px; }

    .code-boxes {
      display: flex; gap: 8px; justify-content: center;
      margin: 22px 0 10px;
    }
    .code-char {
      width: 44px; height: 52px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900;
      color: var(--accent); background: var(--accent-light);
      border: 2px solid var(--accent); border-radius: 12px;
    }

    .copy-code-btn {
      width: 100%; padding: 13px;
      border-radius: var(--r-md); border: 1.5px solid var(--accent);
      background: var(--accent-light); color: var(--accent);
      font-size: 15px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      transition: transform .15s;
      margin-bottom: 10px;
    }
    .copy-code-btn:active { transform: scale(.96); }

    /* ── JOIN CODE INPUT ─────────────────────────────────────── */
    .code-input {
      text-align: center; font-size: 30px; font-weight: 900;
      letter-spacing: 8px; text-transform: uppercase;
    }

    /* ── TOAST ───────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: calc(100px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(16px);
      background: rgba(0,0,0,0.82); color: white;
      padding: 10px 20px; border-radius: 20px;
      font-size: 14px; font-weight: 600;
      z-index: 999; opacity: 0; pointer-events: none;
      transition: opacity .22s, transform .22s;
      white-space: nowrap; backdrop-filter: blur(12px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── LOADING ─────────────────────────────────────────────── */
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--accent-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-screen {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-base);
    }
    .loading-screen.hidden { display: none; }

    /* ── ANIMATIONS ──────────────────────────────────────────── */
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate { animation: slide-up .3s cubic-bezier(.34,1.56,.64,1) both; }

    .error-msg {
      font-size: 13px; color: var(--red); margin-top: 6px;
      font-weight: 500; text-align: center; min-height: 18px;
    }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg">
  <div class="blob b1"></div><div class="blob b2"></div>
  <div class="blob b3"></div><div class="blob b4"></div>
</div>

<!-- Loading -->
<div class="loading-screen" id="loading">
  <div class="spinner"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════════════════════ -->
<!--  LANDING SCREEN                                       -->
<!-- ══════════════════════════════════════════════════════ -->
<div class="screen hidden" id="screen-landing">
  <div class="landing-hero">
    <div class="landing-icon">🏋️</div>
    <h1 class="landing-title">GymLate</h1>
    <p class="landing-sub" id="ls-sub"></p>
  </div>
  <div class="landing-card glass">
    <button class="btn btn-primary btn-xl btn-full" id="btn-show-create">
      <span>✦</span><span id="ls-create-lbl"></span>
    </button>
    <div class="or-divider"><span id="ls-or"></span></div>
    <button class="btn btn-ghost btn-xl btn-full" id="btn-show-join">
      <span>🔑</span><span id="ls-join-lbl"></span>
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════ -->
<!--  APP SCREEN                                           -->
<!-- ══════════════════════════════════════════════════════ -->
<div class="screen hidden" id="screen-app">
  <div class="app-inner">

    <!-- Header -->
    <div class="header">
      <div class="header-icon">🏋️</div>
      <h1 class="header-title">GymLate</h1>
    </div>

    <!-- Group pill -->
    <div class="group-pill glass" id="group-pill">

function detectLang() {
  return (navigator.language || '').toLowerCase().startsWith('de') ? 'de' : 'en';
}
const T = TRANSLATIONS[detectLang()];

// ════════════════════════════════════════════════════════
//  DATE HELPERS
// ════════════════════════════════════════════════════════
const pad = n => String(n).padStart(2, '0');

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function fmtShort(s) {
  return new Date(s + 'T12:00').toLocaleDateString(navigator.language, { day:'numeric', month:'short' });
}
function fmtFull(s) {
  return new Date(s + 'T12:00').toLocaleDateString(navigator.language, { weekday:'short', day:'numeric', month:'short' });
}

function mondayOf(dateStr) {
  const d = new Date(dateStr + 'T12:00');
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function sundayOf(mon) {
  const d = new Date(mon + 'T12:00');
  d.setDate(d.getDate() + 6);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

// ════════════════════════════════════════════════════════
//  API CLIENT
// ════════════════════════════════════════════════════════
const api = {
  async req(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch('/api' + path, opts);
    const data = await res.json();
    if (!res.ok) { const e = new Error(data.error || 'error'); e.status = res.status; throw e; }
    return data;
  },
  createGroup:  name   => api.req('POST', '/groups', { name }),
  joinGroup:    code   => api.req('POST', '/groups/join', { code }),
  getGroup:     id     => api.req('GET',  `/groups/${id}`),
  addMember:    (gid, name) => api.req('POST',   `/groups/${gid}/members`, { name }),
  delMember:    (gid, name) => api.req('DELETE', `/groups/${gid}/members/${encodeURIComponent(name)}`),
  addEntry:     (gid, data) => api.req('POST',   `/groups/${gid}/entries`, data),
  delEntry:     (gid, eid)  => api.req('DELETE', `/groups/${gid}/entries/${eid}`),
};

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let group = null;   // { id, code, name }
let data  = null;   // { id, code, name, people, entries }
let pollTimer = null;

function saveGroup(g) {
  group = { id: g.id, code: g.code, name: g.name };
  localStorage.setItem('gymGroup', JSON.stringify(group));
}
function loadGroup() {
  try { group = JSON.parse(localStorage.getItem('gymGroup') || 'null'); } catch { group = null; }
}
function clearGroup() {
  group = null; data = null;
  localStorage.removeItem('gymGroup');
}

// ════════════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]||'').join('').toUpperCase().slice(0,2) || '?';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function copyToClipboard(text) {
  navigator.clipboard?.writeText(text).then(() => showToast(T.toastCopied))
    .catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); showToast(T.toastCopied); } catch{}
      document.body.removeChild(ta);
    });
}

// ════════════════════════════════════════════════════════
//  RENDER: WEEK
// ════════════════════════════════════════════════════════
function renderWeek() {
  if (!data) return;
  const mon = mondayOf(todayStr());
  const sun = sundayOf(mon);
  const entries = data.entries.filter(e => e.date >= mon && e.date <= sun);

  const totalMins = entries.reduce((s, e) => s + e.mins, 0);
  const countEl = document.getElementById('s-count');
  const minsEl  = document.getElementById('s-mins');
  countEl.textContent = entries.length;
  minsEl.textContent  = totalMins;
  countEl.classList.toggle('red', entries.length > 0);

  const emptyEl = document.getElementById('week-empty');
  const listEl  = document.getElementById('week-list');

  if (!entries.length) { emptyEl.style.display = ''; listEl.innerHTML = ''; return; }
  emptyEl.style.display = 'none';
  listEl.innerHTML = entries.map((e, i) => `
    <div class="entry animate" style="animation-delay:${i*40}ms">
      <div class="avatar">${esc(initials(e.person))}</div>
      <div class="entry-info">
        <div class="entry-name">${esc(e.person)}</div>
        <div class="entry-meta">${fmtFull(e.date)}</div>
      </div>
      <div class="late-badge">${e.mins} ${T.minsShort}</div>
      <button class="icon-btn del-entry-btn" data-id="${esc(e.id)}" data-gid="${esc(data.id)}">×</button>
    </div>`).join('');
}

// ════════════════════════════════════════════════════════
//  RENDER: HISTORY
// ════════════════════════════════════════════════════════
function renderHistory() {
  if (!data) return;
  const currentMon = mondayOf(todayStr());
  const weeks = {};
  data.entries.forEach(e => {
    const mon = mondayOf(e.date);
    if (mon === currentMon) return;
    (weeks[mon] = weeks[mon] || []).push(e);
  });

  const root = document.getElementById('history-root');
  const sortedWeeks = Object.keys(weeks).sort().reverse();

  if (!sortedWeeks.length) {
    root.innerHTML = `<div class="card glass"><div class="empty">
      <div class="empty-ico">📭</div>
      <div class="empty-txt">${esc(T.emptyHistory)}</div>
    </div></div>`;
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  root.innerHTML = sortedWeeks.map(mon => {
    const sun = sundayOf(mon);
    const ps = {};
    weeks[mon].forEach(e => {
      ps[e.person] = ps[e.person] || { count:0, mins:0 };
      ps[e.person].count++; ps[e.person].mins += e.mins;
    });
    const sorted = Object.entries(ps).sort((a,b) => b[1].mins - a[1].mins || b[1].count - a[1].count);
    const [topName] = sorted[0];
    return `
      <div class="week-block animate">
        <div class="sec-label">${T.weekRange(mon, sun)}</div>
        <div class="card glass">
          <div class="recap-hero">
            <div class="recap-trophy">🏆</div>
            <div class="recap-name">${esc(topName)}</div>
            <div class="recap-role">${esc(T.lateKing)}</div>
          </div>
          ${sorted.map(([name, st], i) => `
            <div class="rank-row">
              <div class="rank-no">${medals[i] || (i+1)+'.'}</div>
              <div class="avatar">${esc(initials(name))}</div>
              <div class="entry-info">
                <div class="entry-name">${esc(name)}</div>
                <div class="entry-meta">${T.timesLate(st.count)}</div>
              </div>
              <div class="late-badge">${st.mins} ${T.minsShort}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════════
//  RENDER: PEOPLE
// ════════════════════════════════════════════════════════
function renderPeople() {
  if (!data) return;
  const emptyEl = document.getElementById('people-empty');
  const listEl  = document.getElementById('people-list');
  if (!data.people.length) {
    emptyEl.style.display = ''; listEl.innerHTML = ''; return;
  }
  emptyEl.style.display = 'none';
  listEl.innerHTML = data.people.map((name, i) => `
    <div class="person-row animate" style="animation-delay:${i*30}ms">
      <div class="avatar">${esc(initials(name))}</div>
      <div class="person-name">${esc(name)}</div>
      <button class="icon-btn del-person-btn" data-name="${esc(name)}" data-gid="${esc(data.id)}">×</button>
    </div>`).join('');
}

// ════════════════════════════════════════════════════════
//  RENDER: PILL
// ════════════════════════════════════════════════════════
function renderPill() {
  if (!data) return;
  document.getElementById('pill-name').textContent = data.name;
  document.getElementById('pill-code').textContent = data.code;
  document.getElementById('pill-hint').textContent = T.pillHint;
}

function renderAll() {
  renderPill(); renderWeek(); renderHistory(); renderPeople();
}

// ════════════════════════════════════════════════════════
//  POLLING
// ════════════════════════════════════════════════════════
async function refresh() {
  if (!group) return;
  try {
    data = await api.getGroup(group.id);
    renderAll();
  } catch(e) {
    if (e.status === 404) { clearGroup(); showScreen('landing'); stopPolling(); }
  }
}

function startPolling() {
  stopPolling();
  pollTimer = setInterval(refresh, 8000);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ════════════════════════════════════════════════════════
//  JOIN GROUP FLOW
// ════════════════════════════════════════════════════════
async function enterGroup(g) {
  saveGroup(g);
  showLoading(true);
  try {
    data = await api.getGroup(g.id);
  } catch(e) {
    clearGroup(); showLoading(false); showScreen('landing'); return;
  }
  showLoading(false);
  applyI18n();
  renderAll();
  startPolling();
  showScreen('app');
}

  document.getElementById('fab').classList.toggle('hidden', name === 'people');
}
document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

  set('nav-history',       T.navHistory);
  set('nav-people',        T.navPeople);
  set('lbl-week',          T.lblWeek);
  set('lbl-history',       T.lblHistory);
  set('lbl-people',        T.lblPeople);
  set('s-count-lbl',       T.sCountLbl);
  set('s-mins-lbl',        T.sMinLbl);
  set('empty-week-txt',    T.emptyWeek);
  set('empty-people-txt',  T.emptyPeople);
  set('empty-people-sub',  T.emptyPeopleSub);
  set('add-person-btn',    T.addPerson);
  set('leave-btn',         T.leaveGroup);
  set('mc-title',          T.mcTitle);
  set('mc-lbl-name',       T.mcLblName);
  set('mc-cancel',         T.mcCancel);
  set('mc-submit',         T.mcSubmit);
  set('ms-title',          T.msTitle);
  set('ms-sub',            T.msSub);
  set('ms-copy',           T.msCopy);
  set('ms-continue',       T.msContinue);
  set('mj-title',          T.mjTitle);
  set('mj-sub',            T.mjSub);
  set('mj-lbl',            T.mjLbl);
  set('mj-cancel',         T.mjCancel);
  set('mj-submit',         T.mjSubmit);
  set('ml-title',          T.mlTitle);
  set('ml-lbl-person',     T.mlLblPerson);
  set('ml-lbl-date',       T.mlLblDate);
  set('ml-lbl-mins',       T.mlLblMins);
  set('ml-cancel',         T.mlCancel);
  set('ml-save',           T.mlSave);
  const np = document.getElementById('new-name');
  if (np) np.placeholder = T.namePlaceholder;
}

// ════════════════════════════════════════════════════════
//  MODAL: CREATE GROUP
// ════════════════════════════════════════════════════════
document.getElementById('btn-show-create').addEventListener('click', () => {
  document.getElementById('mc-name').value = '';
  document.getElementById('mc-error').textContent = '';
  openOverlay('modal-create');
  setTimeout(() => document.getElementById('mc-name').focus(), 350);
});
document.getElementById('mc-cancel').addEventListener('click', () => closeOverlay('modal-create'));
document.getElementById('modal-create').addEventListener('click', e => { if(e.target === e.currentTarget) closeOverlay('modal-create'); });

document.getElementById('mc-submit').addEventListener('click', async () => {
  const name = document.getElementById('mc-name').value.trim();
  if (!name) { document.getElementById('mc-error').textContent = T.errGroupName; return; }
  document.getElementById('mc-submit').disabled = true;
  try {
    const g = await api.createGroup(name);
    closeOverlay('modal-create');
    // Show success modal
    document.getElementById('ms-code-boxes').innerHTML =
      g.code.split('').map(c => `<div class="code-char">${esc(c)}</div>`).join('');
    document.getElementById('ms-copy').onclick = () => copyToClipboard(g.code);
    document.getElementById('ms-continue').onclick = () => { closeOverlay('modal-success'); enterGroup(g); };
    openOverlay('modal-success');
  } catch {
    document.getElementById('mc-error').textContent = T.errServer;
  } finally {
    document.getElementById('mc-submit').disabled = false;
  }
});
document.getElementById('mc-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('mc-submit').click();
});

// ════════════════════════════════════════════════════════
//  MODAL: JOIN GROUP
// ════════════════════════════════════════════════════════
document.getElementById('btn-show-join').addEventListener('click', () => {
  document.getElementById('mj-code').value = '';
  document.getElementById('mj-error').textContent = '';
  openOverlay('modal-join');
  setTimeout(() => document.getElementById('mj-code').focus(), 350);
});
document.getElementById('mj-cancel').addEventListener('click', () => closeOverlay('modal-join'));
document.getElementById('modal-join').addEventListener('click', e => { if(e.target === e.currentTarget) closeOverlay('modal-join'); });

// Auto-uppercase
document.getElementById('mj-code').addEventListener('input', e => {
  const v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  e.target.value = v;
});

document.getElementById('mj-submit').addEventListener('click', async () => {
  const code = document.getElementById('mj-code').value.trim().toUpperCase();
  if (code.length < 6) { document.getElementById('mj-error').textContent = T.errShort; return; }
  document.getElementById('mj-submit').disabled = true;
  try {
    const g = await api.joinGroup(code);
    closeOverlay('modal-join');
    enterGroup(g);
  } catch(e) {
    document.getElementById('mj-error').textContent = e.status === 404 ? T.errNotFound : T.errServer;
  } finally {
    document.getElementById('mj-submit').disabled = false;
  }
});
document.getElementById('mj-code').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('mj-submit').click();
});

// ════════════════════════════════════════════════════════
//  MODAL: LOG LATE
// ════════════════════════════════════════════════════════
document.getElementById('fab').addEventListener('click', () => {
  if (!data?.people?.length) { showToast(T.noPeople); return; }
  const sel = document.getElementById('ml-person');
  sel.innerHTML = data.people.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
  document.getElementById('ml-date').value = todayStr();
  document.getElementById('ml-mins').value = '10';
  document.getElementById('ml-error').textContent = '';
  openOverlay('modal-late');
});
document.getElementById('ml-cancel').addEventListener('click', () => closeOverlay('modal-late'));
document.getElementById('modal-late').addEventListener('click', e => { if(e.target === e.currentTarget) closeOverlay('modal-late'); });

document.getElementById('ml-save').addEventListener('click', async () => {
  const person = document.getElementById('ml-person').value;
  const date   = document.getElementById('ml-date').value;
  const mins   = parseInt(document.getElementById('ml-mins').value);
  if (!person || !date || isNaN(mins) || mins < 1) {
    document.getElementById('ml-error').textContent = '⚠';
    return;
  }
  document.getElementById('ml-save').disabled = true;
  try {
    await api.addEntry(data.id, { person, date, mins });
    closeOverlay('modal-late');
    await refresh();
    showToast(T.toastSaved);
  } catch {
    document.getElementById('ml-error').textContent = T.errServer;
  } finally {
    document.getElementById('ml-save').disabled = false;
  }
});

// ════════════════════════════════════════════════════════
//  GROUP PILL: copy code
// ════════════════════════════════════════════════════════
document.getElementById('pill-code').addEventListener('click', () => {
  if (data?.code) copyToClipboard(data.code);
});

// ════════════════════════════════════════════════════════
//  LEAVE GROUP
// ════════════════════════════════════════════════════════
document.getElementById('leave-btn').addEventListener('click', () => {
  if (!confirm(T.confirmLeave())) return;
  stopPolling(); clearGroup(); showScreen('landing');
});

// ════════════════════════════════════════════════════════
//  ADD PERSON
// ════════════════════════════════════════════════════════
async function addPerson() {
  const input = document.getElementById('new-name');
  const name  = input.value.trim();
  if (!name || !data) return;
  try {
    await api.addMember(data.id, name);
    input.value = '';
    await refresh();
  } catch(e) {
    if (e.status === 409) showToast(`"${name}" gibt es schon`);
    else showToast(T.errServer);
  }
}
document.getElementById('add-person-btn').addEventListener('click', addPerson);
document.getElementById('new-name').addEventListener('keydown', e => { if(e.key === 'Enter') addPerson(); });

// ════════════════════════════════════════════════════════
//  DELETE HANDLERS (delegation)
// ════════════════════════════════════════════════════════
document.addEventListener('click', async e => {
  const entryBtn = e.target.closest('.del-entry-btn');
  if (entryBtn && data) {
    try {
      await api.delEntry(data.id, entryBtn.dataset.id);
      await refresh();
    } catch { showToast(T.errServer); }
    return;
  }

  const personBtn = e.target.closest('.del-person-btn');
  if (personBtn && data) {
    const name = personBtn.dataset.name;
    if (!confirm(T.confirmDel(name))) return;
    try {
      await api.delMember(data.id, name);
      await refresh();
    } catch { showToast(T.errServer); }
  }
});

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
applyI18n();

async function init() {
  showLoading(true);
  loadGroup();
  if (group) {
    try {
      data = await api.getGroup(group.id);
      applyI18n(); renderAll(); startPolling();
      showLoading(false);
      showScreen('app');
      return;
    } catch(e) {
      if (e.status === 404) clearGroup();
    }
  }
  showLoading(false);
  showScreen('landing');
}

init();
</script>
</body>
</html>
