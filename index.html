<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GymLate</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7c3aed" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#a78bfa" media="(prefers-color-scheme: dark)">

  <!-- iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GymLate">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Segoe UI', sans-serif;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      background: #e9e4f8;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #09060f; }
    }

    /* ── THEME ───────────────────────────────────────────────── */
    :root {
      --glass-bg:     rgba(255,255,255,0.36);
      --glass-border: rgba(255,255,255,0.68);
      --glass-top:    rgba(255,255,255,0.88);
      --glass-shadow: rgba(80,30,160,0.09);
      --glass-inner:  rgba(255,255,255,0.60);

      --input-bg:     rgba(255,255,255,0.45);
      --input-border: rgba(255,255,255,0.72);

      --text-1: rgba(0,0,0,0.85);
      --text-2: rgba(0,0,0,0.50);
      --text-3: rgba(0,0,0,0.28);

      --accent:       #7c3aed;
      --accent-2:     #a855f7;
      --accent-glow:  rgba(124,58,237,0.35);
      --accent-light: rgba(124,58,237,0.12);
      --red:          #ef4444;
      --red-light:    rgba(239,68,68,0.12);
      --green:        #22c55e;
      --gold:         #f59e0b;

      --divider:  rgba(0,0,0,0.07);
      --blur: 24px;
      --r-xl: 28px; --r-lg: 20px; --r-md: 14px; --r-sm: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --glass-bg:     rgba(255,255,255,0.07);
        --glass-border: rgba(255,255,255,0.12);
        --glass-top:    rgba(255,255,255,0.20);
        --glass-shadow: rgba(0,0,0,0.55);
        --glass-inner:  rgba(255,255,255,0.08);

        --input-bg:     rgba(255,255,255,0.09);
        --input-border: rgba(255,255,255,0.15);

        --text-1: rgba(255,255,255,0.93);
        --text-2: rgba(255,255,255,0.52);
        --text-3: rgba(255,255,255,0.28);

        --accent:       #a78bfa;
        --accent-2:     #c4b5fd;
        --accent-glow:  rgba(167,139,250,0.30);
        --accent-light: rgba(167,139,250,0.14);
        --red:          #f87171;
        --red-light:    rgba(248,113,113,0.14);
        --green:        #4ade80;
        --gold:         #fbbf24;

        --divider: rgba(255,255,255,0.08);
      }
    }

    /* ── GLASS ───────────────────────────────────────────────── */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur)) saturate(1.8);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(1.8);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-top);
      box-shadow: 0 4px 28px var(--glass-shadow), inset 0 1px 0 var(--glass-inner);
    }

    /* ── SCREENS ─────────────────────────────────────────────── */
    .screen {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center;
    }
    .hidden { display: none !important; }
    .screen.hidden { display: none; }

    /* ── LANDING ─────────────────────────────────────────────── */
    #screen-landing {
      justify-content: center;
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    }
    .landing-hero { text-align: center; margin-bottom: 32px; }
    .landing-icon { font-size: 60px; line-height: 1; margin-bottom: 12px; }
    .landing-title {
      font-size: 46px; font-weight: 900; letter-spacing: -1.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .landing-sub { font-size: 15px; color: var(--text-2); margin-top: 4px; }
    .landing-card { width: 100%; max-width: 420px; border-radius: var(--r-xl); padding: 24px 20px; }
    .landing-admin-tools { margin-top: 14px; display: grid; gap: 10px; }
    .landing-admin-note { font-size: 12px; color: var(--text-3); text-align: center; line-height: 1.35; }
    .btn-admin {
      background: rgba(239,68,68,.10);
      color: var(--red);
      border: 1.5px solid rgba(239,68,68,.24);
      box-shadow: none;
    }
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 14px 0; color: var(--text-3); font-size: 13px; font-weight: 500;
    }
    .or-divider::before,.or-divider::after { content:''; flex:1; height:1px; background:var(--divider); }

    /* ── APP ─────────────────────────────────────────────────── */
    #screen-app { justify-content: flex-start; }
    .app-inner { width: 100%; max-width: 500px; padding: 0 16px; display: flex; flex-direction: column; }

    /* ── HEADER ──────────────────────────────────────────────── */
    .header { padding: calc(env(safe-area-inset-top) + 46px) 0 10px; text-align: center; }
    .header-icon { font-size: 40px; line-height: 1; margin-bottom: 4px; cursor: pointer; user-select: none; display: inline-block; }
    .header-title {
      font-size: 34px; font-weight: 900; letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .admin-badge {
      display: inline-block;
      font-size: 11px; font-weight: 700; letter-spacing: .5px;
      background: rgba(239,68,68,.15); color: var(--red);
      border: 1px solid rgba(239,68,68,.3);
      padding: 2px 8px; border-radius: 20px; margin-top: 4px;
    }
    .admin-badge.hidden { display: none; }

    /* ── GROUP PILL ──────────────────────────────────────────── */
    .group-pill {
      display: flex; align-items: center; gap: 8px;
      border-radius: 40px; padding: 7px 14px;
      margin: 10px auto 16px; width: fit-content; max-width: 100%;
    }
    .pill-name { font-size: 13px; font-weight: 700; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
    .pill-dot  { font-size: 10px; color: var(--text-3); }
    .pill-code-btn {
      background: var(--accent-light); border: 1.5px solid var(--accent); color: var(--accent);
      font-size: 13px; font-weight: 800; letter-spacing: 2px;
      padding: 3px 10px; border-radius: 20px; cursor: pointer; font-family: inherit;
      transition: transform .15s, opacity .15s;
    }
    .pill-code-btn:active { transform: scale(.92); opacity: .7; }
    .pill-copy-hint { font-size: 11px; color: var(--text-3); }

    /* ── SECTION LABEL ───────────────────────────────────────── */
    .sec-label {
      font-size: 12px; font-weight: 600; letter-spacing: .6px;
      text-transform: uppercase; color: var(--text-3); margin: 16px 0 7px 4px;
    }

    /* ── STATS ───────────────────────────────────────────────── */
    .stat-row { display: flex; gap: 10px; }
    .stat-card { flex:1; border-radius: var(--r-lg); padding: 18px 14px 16px; text-align: center; }
    .stat-val { font-size: 34px; font-weight: 900; letter-spacing:-1px; color: var(--text-1); line-height:1; }
    .stat-val.red { color: var(--red); }
    .stat-lbl { font-size: 12px; color: var(--text-2); margin-top: 4px; font-weight: 500; }

    /* ── CARD ────────────────────────────────────────────────── */
    .card { border-radius: var(--r-xl); overflow: hidden; }

    /* ── ENTRIES ─────────────────────────────────────────────── */
    .entry { display: flex; align-items: center; gap: 12px; padding: 11px 18px; border-bottom: 1px solid var(--divider); }
    .entry:last-child { border-bottom: none; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent-light); display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--accent);
      flex-shrink: 0; border: 1.5px solid var(--glass-border);
    }
    .entry-info { flex:1; min-width:0; }
    .entry-name { font-size:15px; font-weight:600; color:var(--text-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .entry-meta { font-size:12px; color:var(--text-2); margin-top:1px; }
    .late-badge {
      font-size:13px; font-weight:700; color:var(--red);
      background:var(--red-light); padding:4px 10px; border-radius:20px;
      white-space:nowrap; border:1px solid rgba(239,68,68,.18);
    }
    .skip-badge {
      font-size:13px; font-weight:700; color:var(--gold);
      background:rgba(245,158,11,.12); padding:4px 10px; border-radius:20px;
      white-space:nowrap; border:1px solid rgba(245,158,11,.28);
    }
    .streak-badge {
      font-size:11px; font-weight:800; color:var(--gold); letter-spacing:.3px;
      background:rgba(245,158,11,.12); border:1px solid rgba(245,158,11,.28);
      padding:2px 9px; border-radius:20px; white-space:nowrap; flex-shrink:0;
      text-transform:uppercase;
    }
    .skip-chip {
      display:inline-flex; align-items:center; gap:5px;
      font-size:13px; font-weight:600; color:var(--gold);
      background:rgba(245,158,11,.10); border:1px solid rgba(245,158,11,.22);
      padding:3px 10px; border-radius:20px;
    }
    /* Mode toggle (Late / Skip) */
    .mode-toggle { display:flex; gap:4px; background:var(--glass-inner); border-radius:12px; padding:4px; margin-bottom:18px; }
    .mode-btn {
      flex:1; padding:9px; border-radius:9px; border:none; font-family:inherit;
      font-size:14px; font-weight:600; cursor:pointer; color:var(--text-2);
      background:transparent; transition:background .2s, color .2s;
    }
    .mode-btn.active { background:var(--glass-bg); color:var(--text-1); box-shadow:0 1px 4px var(--glass-shadow); }
    /* Reason chips */
    .reason-chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
    .reason-chip {
      padding:8px 14px; border-radius:20px; border:1.5px solid var(--glass-border);
      background:var(--glass-inner); font-size:14px; font-weight:500;
      color:var(--text-1); cursor:pointer; font-family:inherit;
      transition:border-color .15s, background .15s, transform .1s;
    }
    .reason-chip.sel { border-color:var(--accent); background:var(--accent-light); color:var(--accent); }
    .reason-chip:active { transform:scale(.94); }
    .icon-btn {
      width:30px; height:30px; border-radius:50%; border:none;
      background:var(--red-light); color:var(--red); cursor:pointer; font-size:16px;
      display:flex; align-items:center; justify-content:center;
      transition:transform .15s; flex-shrink:0; font-family:inherit;
    }
    .icon-btn:active { transform:scale(.88); }

    /* ── EMPTY ───────────────────────────────────────────────── */
    .empty { text-align:center; padding:36px 24px; }
    .empty-ico { font-size:40px; margin-bottom:8px; }
    .empty-txt { font-size:15px; color:var(--text-2); font-weight:500; }
    .empty-sub { font-size:13px; color:var(--text-3); margin-top:4px; }

    /* ── TAB PANE ────────────────────────────────────────────── */
    .tab-pane { display:none; padding-bottom:calc(110px + env(safe-area-inset-bottom)); }
    .tab-pane.active { display:block; }

    /* ── FAB ─────────────────────────────────────────────────── */
    #fab {
      position:fixed; bottom:calc(88px + env(safe-area-inset-bottom));
      right:max(16px, calc(50vw - 234px));
      width:58px; height:58px; border-radius:50%; border:none;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      color:white; font-size:28px; cursor:pointer;
      box-shadow:0 6px 24px var(--accent-glow), 0 2px 8px rgba(0,0,0,.2);
      transition:transform .2s cubic-bezier(.34,1.56,.64,1);
      z-index:20; display:flex; align-items:center; justify-content:center;
    }
    #fab:active { transform:scale(.88); }
    #fab.hidden { display:none; }

    /* ── BOTTOM NAV ──────────────────────────────────────────── */
    .bottom-nav {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:500px;
      padding:8px 16px calc(10px + env(safe-area-inset-bottom)); z-index:30;
    }
    .nav-bar { display:flex; border-radius:var(--r-xl); padding:6px; gap:2px; }
    .nav-btn {
      flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
      padding:8px 4px; border:none; background:transparent; border-radius:var(--r-md);
      cursor:pointer; font-family:inherit; transition:background .2s;
    }
    .nav-btn.active { background:var(--glass-inner); }
    .nav-ico { font-size:22px; transition:transform .2s; }
    .nav-btn.active .nav-ico { transform:scale(1.1); }
    .nav-lbl { font-size:11px; font-weight:500; color:var(--text-2); }
    .nav-btn.active .nav-lbl { color:var(--accent); font-weight:700; }

    /* ── HISTORY: LAYOUT ─────────────────────────────────────── */
    .week-block { margin-bottom: 22px; }

    .recap-hero {
      padding: 22px 18px 18px; text-align: center;
      border-bottom: 1px solid var(--divider);
      position: relative; overflow: hidden;
    }
    .recap-trophy-wrap { margin-bottom: 8px; }
    .recap-trophy { font-size: 44px; display: inline-block; }
    .recap-name  { font-size: 20px; font-weight: 800; color: var(--text-1); }
    .recap-role  { font-size: 13px; color: var(--text-2); margin-top: 3px; }

    .rank-row {
      display:flex; align-items:center; gap:12px;
      padding:12px 18px; border-bottom:1px solid var(--divider);
      position: relative;
    }
    .rank-row:last-child { border-bottom:none; }
    .rank-no { font-size:20px; width:30px; text-align:center; flex-shrink:0; }

    /* Gold shimmer strip */
    .rank-row.rank-gold::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(251,191,36,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── PEOPLE ──────────────────────────────────────────────── */
    .person-row {
      display:flex; align-items:center; gap:12px;
      padding:11px 18px; border-bottom:1px solid var(--divider);
    }
    .person-row:last-child { border-bottom:none; }
    .person-name { flex:1; font-size:15px; font-weight:600; color:var(--text-1); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    .add-person-card { border-radius:var(--r-xl); padding:16px 18px; margin-top:10px; }
    .add-row { display:flex; gap:10px; margin-top:12px; }
    .leave-section { margin-top: 12px; }
    .leave-btn {
      width:100%; padding:14px; border-radius:var(--r-md); border:none;
      font-family:inherit; font-size:15px; font-weight:600; cursor:pointer;
      color:var(--red); background:var(--red-light); border:1.5px solid rgba(239,68,68,.2);
      transition:transform .15s, opacity .15s;
    }
    .leave-btn:active { transform:scale(.96); opacity:.8; }

    /* ── ADMIN PANEL ─────────────────────────────────────────── */
    .admin-panel {
      border-radius: var(--r-xl); padding: 16px 18px; margin-top: 12px;
      border-color: rgba(239,68,68,0.28) !important;
      border-top-color: rgba(239,68,68,0.35) !important;
    }
    .admin-panel-title {
      font-size: 12px; font-weight: 700; letter-spacing: .6px;
      text-transform: uppercase; color: var(--red); margin-bottom: 12px;
    }
    .admin-btn {
      width: 100%; padding: 13px; border-radius: var(--r-md); border: none;
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; text-align: center; margin-bottom: 8px;
      transition: transform .15s, opacity .15s;
    }
    .admin-btn:last-child { margin-bottom: 0; }
    .admin-btn:active { transform: scale(.96); opacity: .8; }
    .admin-btn-add  { background: var(--accent-light); color: var(--accent); border: 1.5px solid var(--accent); }
    .admin-btn-week { background: rgba(251,191,36,.12); color: var(--gold);  border: 1.5px solid rgba(251,191,36,.4); }
    .admin-btn-week.active { background: rgba(251,191,36,.25); }
    .admin-btn-del  { background: var(--red-light);    color: var(--red);    border: 1.5px solid rgba(239,68,68,.3); }
    .admin-btn-exit { background: var(--glass-inner);  color: var(--text-2); border: 1px solid var(--glass-border); }

    /* ── MODALS ──────────────────────────────────────────────── */
    .overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.35);
      backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
      z-index:100; display:flex; align-items:flex-end; justify-content:center;
      padding:0 12px calc(12px + env(safe-area-inset-bottom));
      opacity:0; pointer-events:none; transition:opacity .25s ease;
    }
    .overlay.open { opacity:1; pointer-events:all; }
    .modal {
      width:100%; max-width:500px; border-radius:var(--r-xl); padding:28px 22px 22px;
      transform:translateY(50px) scale(.96);
      transition:transform .35s cubic-bezier(.34,1.56,.64,1);
    }
    .overlay.open .modal { transform:translateY(0) scale(1); }
    .modal-title { font-size:20px; font-weight:800; letter-spacing:-.4px; color:var(--text-1); margin-bottom:20px; }
    .modal-sub   { font-size:14px; color:var(--text-2); margin-top:-14px; margin-bottom:20px; }

    .form-grp { margin-bottom:14px; }
    .form-lbl {
      display:block; font-size:12px; font-weight:600;
      color:var(--text-2); text-transform:uppercase; letter-spacing:.4px; margin-bottom:6px;
    }
    .form-ctrl {
      width:100%; padding:13px 14px; border-radius:var(--r-md);
      border:1.5px solid var(--input-border); background:var(--input-bg);
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      font-size:16px; font-weight:500; color:var(--text-1);
      font-family:inherit; outline:none; -webkit-appearance:none; appearance:none;
      transition:border-color .2s, box-shadow .2s;
    }
    .form-ctrl:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }
    @media (prefers-color-scheme: dark) { .form-ctrl { color-scheme:dark; } }
    .select-wrap { position:relative; }
    .select-wrap::after { content:'▾'; position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--text-2); pointer-events:none; font-size:13px; }
    .modal-row { display:flex; gap:10px; margin-bottom:14px; }
    .modal-row .form-grp { flex:1; margin-bottom:0; }
    .modal-btns { display:flex; gap:10px; margin-top:20px; }

    /* ── BUTTONS ─────────────────────────────────────────────── */
    .btn {
      flex:1; padding:15px; border-radius:var(--r-md); border:none;
      font-family:inherit; font-size:16px; font-weight:700; cursor:pointer;
      transition:transform .15s, opacity .15s;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn:active { transform:scale(.94); opacity:.85; }
    .btn-xl  { padding:17px; font-size:17px; border-radius:var(--r-lg); }
    .btn-primary { background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:white; box-shadow:0 4px 16px var(--accent-glow); }
    .btn-ghost   { background:var(--glass-bg); color:var(--text-1); border:1.5px solid var(--glass-border); backdrop-filter:blur(8px); }
    .btn-full    { width:100%; flex:none; }

    /* ── SUCCESS MODAL ───────────────────────────────────────── */
    .success-check { font-size:48px; text-align:center; margin-bottom:8px; }
    .success-title { font-size:22px; font-weight:800; color:var(--text-1); text-align:center; }
    .success-sub   { font-size:14px; color:var(--text-2); text-align:center; margin-top:4px; }
    .code-boxes { display:flex; gap:8px; justify-content:center; margin:22px 0 10px; }
    .code-char {
      width:44px; height:52px; display:flex; align-items:center; justify-content:center;
      font-size:22px; font-weight:900;
      color:var(--accent); background:var(--accent-light); border:2px solid var(--accent); border-radius:12px;
    }
    .copy-code-btn {
      width:100%; padding:13px; border-radius:var(--r-md);
      border:1.5px solid var(--accent); background:var(--accent-light); color:var(--accent);
      font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;
      transition:transform .15s; margin-bottom:10px;
    }
    .copy-code-btn:active { transform:scale(.96); }

    /* ── JOIN CODE INPUT ─────────────────────────────────────── */
    .code-input { text-align:center; font-size:30px; font-weight:900; letter-spacing:8px; text-transform:uppercase; }

    /* ── TOAST ───────────────────────────────────────────────── */
    .toast {
      position:fixed; bottom:calc(100px + env(safe-area-inset-bottom));
      left:50%; transform:translateX(-50%) translateY(16px);
      background:rgba(0,0,0,0.82); color:white;
      padding:10px 20px; border-radius:20px;
      font-size:14px; font-weight:600; z-index:999; opacity:0; pointer-events:none;
      transition:opacity .22s, transform .22s; white-space:nowrap; backdrop-filter:blur(12px);
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── LOADING ─────────────────────────────────────────────── */
    .loading-screen {
      position:fixed; inset:0; z-index:200;
      display:flex; align-items:center; justify-content:center;
      background: #e9e4f8;
    }
    @media (prefers-color-scheme: dark) { .loading-screen { background: #09060f; } }
    .loading-screen.hidden { display:none; }
    .spinner {
      width:40px; height:40px;
      border:3px solid var(--accent-light); border-top-color:var(--accent);
      border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════════════════════ */
    /*  RECAP ANIMATIONS                                         */
    /* ══════════════════════════════════════════════════════════ */

    /* Card slides up */
    @keyframes week-card-in {
      from { opacity:0; transform:translateY(36px) scale(.97); }
      to   { opacity:1; transform:translateY(0)    scale(1);   }
    }
    .anim-week { animation: week-card-in .55s cubic-bezier(.34,1.4,.64,1) both; }

    /* Section label fades */
    @keyframes fade-up {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .anim-fade-up { animation: fade-up .35s ease-out both; }

    /* Trophy entrance — overshoot bounce */
    @keyframes trophy-pop {
      0%  { transform:scale(0) rotate(-25deg); opacity:0; }
      55% { transform:scale(1.30) rotate(8deg); opacity:1; }
      72% { transform:scale(0.85) rotate(-4deg); }
      86% { transform:scale(1.08) rotate(2deg); }
      100%{ transform:scale(1)    rotate(0deg); }
    }
    .anim-trophy { animation: trophy-pop .75s cubic-bezier(.34,1.4,.64,1) both; }

    /* Floating idle loop after entrance */
    @keyframes trophy-float {
      0%,100% { transform:translateY(0)    rotate(0deg); }
      30%     { transform:translateY(-5px) rotate(-3deg); }
      70%     { transform:translateY(-3px) rotate(3deg); }
    }
    .anim-trophy.done { animation: trophy-float 3.5s ease-in-out 1s infinite; }

    /* Name flies in from left */
    @keyframes name-in {
      from { opacity:0; transform:translateX(-28px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .anim-name { animation: name-in .45s cubic-bezier(.34,1.3,.64,1) both; }

    /* Rank rows slide in from left, staggered */
    @keyframes rank-in {
      from { opacity:0; transform:translateX(-30px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .anim-rank { animation: rank-in .4s cubic-bezier(.34,1.4,.64,1) both; }

    /* Gold row pulse */
    @keyframes gold-pulse {
      0%,100% { box-shadow: none; }
      50%     { box-shadow: inset 0 0 0 9999px rgba(251,191,36,0.08), 0 0 16px rgba(251,191,36,0.25); }
    }
    .rank-row.rank-gold { animation: gold-pulse 1.8s ease-in-out both; }

    /* ── CONFETTI ────────────────────────────────────────────── */
    @keyframes confetti-fall {
      0%   { transform:translateY(-6px) rotate(var(--cr)); opacity:1; }
      75%  { opacity: 1; }
      100% { transform:translateY(130px) rotate(calc(var(--cr) + var(--cr2))); opacity:0; }
    }
    .cbit {
      position:absolute; pointer-events:none; top:-6px;
      animation: confetti-fall var(--cd) ease-in var(--cdelay) forwards;
    }

    /* ── ENTRY SLIDE-IN ──────────────────────────────────────── */
    @keyframes entry-in {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .animate { animation: entry-in .3s cubic-bezier(.34,1.56,.64,1) both; }

    /* Error */
    .error-msg { font-size:13px; color:var(--red); margin-top:6px; font-weight:500; text-align:center; min-height:18px; }

    /* ── AVATAR CIRCLE ───────────────────────────────────────── */
    .avatar-circle {
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; border:1.5px solid rgba(255,255,255,0.22);
      font-size:20px; width:40px; height:40px;
    }
    .avatar-circle.lg  { width:72px;  height:72px;  font-size:36px; border-width:2px; }
    .avatar-circle.xl  { width:84px;  height:84px;  font-size:42px; border-width:2.5px; }

    /* ── AVATAR PICKER ───────────────────────────────────────── */
    .avatar-preview-wrap { text-align:center; margin-bottom:18px; }
    .emoji-grid {
      display:grid; grid-template-columns:repeat(6,1fr); gap:7px; margin-top:6px;
    }
    .emoji-cell {
      aspect-ratio:1; border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:20px; cursor:pointer; border:2px solid transparent;
      background:var(--glass-inner); transition:transform .15s, border-color .15s;
    }
    .emoji-cell.sel { border-color:var(--accent); transform:scale(1.18); }
    .emoji-cell:active { transform:scale(.92); }
    .avatar-upload-wrap { text-align:center; margin:0 0 8px; }
    .btn-upload-photo { background:none; border:1px solid var(--accent); color:var(--accent); font-size:13px; cursor:pointer; padding:5px 14px; border-radius:20px; transition:opacity .15s; }
    .btn-upload-photo:active { opacity:.6; }
    .btn-upload-photo:disabled { opacity:.45; cursor:not-allowed; }
    .avatar-upload-msg { font-size:12px; text-align:center; margin-bottom:6px; min-height:16px; }
    .avatar-circle img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; }

    .color-grid {
      display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-top:6px;
    }
    .color-dot {
      aspect-ratio:1; border-radius:50%; cursor:pointer;
      border:3px solid transparent; box-shadow:0 2px 6px rgba(0,0,0,.22);
      transition:transform .15s, border-color .15s;
    }
    .color-dot.sel  { border-color:white; transform:scale(1.2); }
    .color-dot:active { transform:scale(.9); }

    /* ── RECOVERY CODE BOXES ─────────────────────────────────── */
    .rc-row { display:flex; gap:8px; justify-content:center; margin:20px 0 10px; }
    .rc-box {
      padding:10px 14px; border-radius:12px;
      background:var(--accent-light); border:2px solid var(--accent);
      font-size:17px; font-weight:900; color:var(--accent);
      letter-spacing:4px; font-family:monospace;
    }

    /* ── PROFILE VIEW ────────────────────────────────────────── */
    .pv-avatar-wrap  { text-align:center; margin-bottom:12px; }
    .pv-name         { font-size:22px; font-weight:800; color:var(--text-1); text-align:center; }
    .pv-badge        {
      display:inline-block; margin-top:4px; margin-bottom:4px;
      font-size:11px; font-weight:700; letter-spacing:.4px;
      background:var(--accent-light); color:var(--accent);
      border:1px solid rgba(124,58,237,.25); padding:2px 8px; border-radius:20px;
    }
    .rc-blur-wrap { position:relative; margin-bottom:6px; }
    .rc-blur {
      font-family:monospace; font-size:16px; font-weight:700;
      padding:12px 14px; background:var(--input-bg);
      border:1.5px solid var(--input-border); border-radius:var(--r-md);
      letter-spacing:3px; filter:blur(5px); cursor:pointer; user-select:none;
      transition:filter .25s;
    }
    .rc-blur.revealed { filter:none; }
    .rc-reveal-btn {
      position:absolute; right:10px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; font-size:16px; opacity:.55;
      padding:4px; line-height:1;
    }

    /* ── TOGGLE LINK ─────────────────────────────────────────── */
    .toggle-link {
      background:none; border:none; color:var(--accent);
      font-size:13px; font-weight:600; cursor:pointer;
      font-family:inherit; text-decoration:underline; padding:4px; opacity:.8;
    }
    .toggle-link:active { opacity:1; }

    /* ── MY PROFILE BTN ──────────────────────────────────────── */
    .my-profile-btn {
      position:absolute; right:0; top:calc(env(safe-area-inset-top) + 50px);
      width:38px; height:38px; border-radius:50%;
      border:2.5px solid rgba(255,255,255,0.3);
      display:none; align-items:center; justify-content:center;
      font-size:20px; cursor:pointer; transition:transform .15s;
      font-family:inherit; background:transparent;
    }
    .my-profile-btn.visible { display:flex; }
    .my-profile-btn:active { transform:scale(.88); }

    /* ── INVITE SECTION ──────────────────────────────────────── */
    .invite-card { border-radius:var(--r-xl); padding:16px 18px; margin-top:10px; text-align:center; }
    .invite-hint { font-size:13px; color:var(--text-2); margin-bottom:12px; }

    /* ══════════════════════════════════════════════════════════ */
    /*  WRAPPED  — Spotify-style fullscreen weekly story         */
    /* ══════════════════════════════════════════════════════════ */
    .wrapped {
      position: fixed; inset: 0; z-index: 500;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      overscroll-behavior: none;
      -webkit-user-select: none; user-select: none;
    }
    .wrapped.hidden { display: none; }

    /* Progress segments (top) */
    .w-prog {
      position: absolute; left: 12px; right: 12px;
      top: calc(env(safe-area-inset-top) + 10px);
      display: flex; gap: 5px; z-index: 20; pointer-events: none;
    }
    .w-seg {
      flex: 1; height: 3px; border-radius: 3px;
      background: rgba(255,255,255,0.28); overflow: hidden;
    }
    .w-fill { height: 100%; width: 0%; background: rgba(255,255,255,0.9); }

    /* Skip / close button */
    .w-skip {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 16px);
      right: 16px; z-index: 30;
      background: rgba(255,255,255,0.18);
      border: none; color: white;
      width: 36px; height: 36px; border-radius: 50%;
      font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: background .15s;
    }
    .w-skip:active { background: rgba(255,255,255,0.32); }

    /* Tap zones */
    .w-tap-l,.w-tap-r { position: absolute; top: 0; bottom: 0; z-index: 10; }
    .w-tap-l { left:  0; width: 33%; }
    .w-tap-r { right: 0; width: 67%; }

    /* Stage — full screen, no overflow */
    .w-stage { position: absolute; inset: 0; }

    /* Individual slide */
    .w-slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: calc(env(safe-area-inset-top) + 68px) 32px calc(env(safe-area-inset-bottom) + 52px);
      overflow: hidden;
    }
    /* Specular highlight overlay */
    .w-slide::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 25% 15%, rgba(255,255,255,0.12) 0%, transparent 55%);
      pointer-events: none; z-index: 1;
    }
    .w-slide > * { position: relative; z-index: 2; }

    /* ── Slide transitions ── */
    @keyframes w-in  { from{opacity:0;transform:scale(1.06)} to{opacity:1;transform:scale(1)} }
    @keyframes w-out { from{opacity:1;transform:scale(1)}    to{opacity:0;transform:scale(.94)} }
    .w-in  { animation: w-in  .3s cubic-bezier(.25,.46,.45,.94) both; }
    .w-out { animation: w-out .22s ease-in both; }

    /* ── Element animations ── */
    @keyframes w-pop {
      0%  { opacity:0; transform:scale(0.3) rotate(-6deg); }
      60% { opacity:1; transform:scale(1.10) rotate(2deg); }
      80% { transform:scale(0.93); }
      100%{ opacity:1; transform:scale(1) rotate(0); }
    }
    @keyframes w-rise {
      from { opacity:0; transform:translateY(36px); filter:blur(6px); }
      to   { opacity:1; transform:translateY(0);    filter:blur(0); }
    }
    @keyframes w-fade { from{opacity:0} to{opacity:1} }
    @keyframes w-shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-14px)}
      40%{transform:translateX(10px)}  60%{transform:translateX(-8px)}
      80%{transform:translateX(5px)}
    }

    .w-pop  { animation: w-pop  .6s cubic-bezier(.34,1.56,.64,1) both; }
    .w-rise { animation: w-rise .5s cubic-bezier(.25,.46,.45,.94) both; }
    .w-fade { animation: w-fade .4s ease both; }

    /* ── Typography ── */
    .w-group {
      font-size: 13px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
      text-align: center; margin-bottom: 8px;
    }
    .w-label {
      font-size: clamp(14px,4.5vw,18px); font-weight: 600; letter-spacing: 1px;
      text-transform: uppercase; color: rgba(255,255,255,0.6);
      text-align: center;
    }
    .w-headline {
      font-size: clamp(60px,20vw,104px); font-weight: 900; line-height: .9;
      color: white; text-align: center; letter-spacing: -3px; font-style: italic;
    }
    .w-headline-md {
      font-size: clamp(42px,13vw,72px); font-weight: 900; line-height: .95;
      color: white; text-align: center; letter-spacing: -2px; font-style: italic;
    }
    .w-number {
      font-size: clamp(88px,30vw,172px); font-weight: 900; line-height: .85;
      color: white; text-align: center; letter-spacing: -5px;
      font-style: italic; font-variant-numeric: tabular-nums;
    }
    .w-sub {
      font-size: clamp(22px,7vw,34px); font-weight: 700; letter-spacing: -.5px;
      color: rgba(255,255,255,0.75); text-align: center;
    }
    .w-name {
      font-size: clamp(44px,14vw,80px); font-weight: 900; letter-spacing: -2px;
      color: white; text-align: center; line-height: 1; font-style: italic;
      word-break: break-word;
    }
    .w-emoji { font-size: clamp(52px,17vw,96px); text-align: center; line-height: 1.1; }
    .w-divider { width: 44px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.25); margin: 14px auto; }
    .w-gap-xs { height: 8px; }
    .w-gap-sm { height: 14px; }
    .w-gap    { height: 24px; }
    .w-gap-lg { height: 40px; }

    /* ── Ranking rows inside wrapped ── */
    .w-ranks { width: 100%; max-width: 360px; }
    .w-rank-row {
      display: flex; align-items: center; gap: 14px;
      padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .w-rank-row:last-child { border-bottom: none; }
    .w-medal { font-size: 22px; width: 28px; flex-shrink: 0; }
    .w-rank-name { flex: 1; font-size: 18px; font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .w-rank-mins { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.6); white-space: nowrap; }

    /* ── End-card close button ── */
    .w-btn-close {
      background: white; color: #1a0030;
      border: none; font-family: inherit;
      font-size: 17px; font-weight: 800; letter-spacing: -.3px;
      padding: 18px 52px; border-radius: 40px; cursor: pointer;
      transition: transform .18s, box-shadow .18s;
      box-shadow: 0 8px 28px rgba(0,0,0,.4);
    }
    .w-btn-close:active { transform: scale(.94); }
  </style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loading"><div class="spinner"></div></div>

<!-- ══════════════════════════════════════════════════════ -->
<!--  WRAPPED OVERLAY                                      -->
<!-- ══════════════════════════════════════════════════════ -->
<div id="wrapped" class="wrapped hidden">
  <div class="w-prog"   id="w-prog"></div>
  <div class="w-stage"  id="w-stage"></div>
  <button class="w-skip" id="w-skip">✕</button>
  <div class="w-tap-l"  id="w-tap-l"></div>
  <div class="w-tap-r"  id="w-tap-r"></div>
</div>

      <button class="btn btn-ghost btn-xl btn-full" id="btn-admin-login">
        <span id="ls-admin-lbl"></span>

      <button class="btn btn-admin btn-xl btn-full hidden" id="btn-create-test-group">

<!-- ══════════════════════════════════════════════════════ -->
<!--  APP SCREEN                                           -->
<!-- ══════════════════════════════════════════════════════ -->
<div class="screen hidden" id="screen-app">
  <div class="app-inner">

    <div class="header" style="position:relative">
      <div class="header-icon" id="header-icon">🏋️</div>
      <h1 class="header-title">GymLate</h1>
      <div class="admin-badge hidden" id="admin-badge">ADMIN</div>
      <button class="my-profile-btn" id="my-profile-btn" title="Mein Profil"></button>
    </div>

    <div class="group-pill glass" id="group-pill">
      <span class="pill-name" id="pill-name"></span>
      <span class="pill-dot">·</span>
      <button class="pill-code-btn" id="pill-code"></button>
      <span class="pill-copy-hint" id="pill-hint"></span>
    </div>

    <!-- ── WEEK TAB ── -->
    <div class="tab-pane active" id="pane-week">
      <div class="stat-row">
        <div class="card glass stat-card"><div class="stat-val" id="s-count">0</div><div class="stat-lbl" id="s-count-lbl"></div></div>
        <div class="card glass stat-card"><div class="stat-val" id="s-mins">0</div><div class="stat-lbl" id="s-mins-lbl"></div></div>
      </div>
      <div id="skip-stat-wrap" class="hidden" style="text-align:center;margin-top:8px">
        <span class="skip-chip" id="skip-stat-chip"></span>
      </div>
      <div class="sec-label" id="lbl-week"></div>
      <div class="card glass" id="week-card">
        <div class="empty" id="week-empty"><div class="empty-txt" id="empty-week-txt"></div></div>
        <div id="week-list"></div>
      </div>
    </div>

    <!-- ── HISTORY TAB ── -->
    <div class="tab-pane" id="pane-history">
      <div class="sec-label" id="lbl-history"></div>
      <div id="history-root"></div>
    </div>

    <!-- ── PEOPLE TAB ── -->
    <div class="tab-pane" id="pane-people">
      <div class="sec-label" id="lbl-people"></div>
      <div class="card glass" id="people-card">
        <div class="empty" id="people-empty">
          <div class="empty-txt" id="empty-people-txt"></div>
          <div class="empty-sub" id="empty-people-sub"></div>
        </div>

      </div>
      <div class="invite-card glass">
        <div class="invite-hint" id="invite-hint-txt"></div>

      <div class="leave-section"><button class="leave-btn" id="leave-btn"></button></div>

      <!-- Admin Panel (hidden by default) -->
      <div class="admin-panel glass hidden" id="admin-panel">
        <div class="admin-panel-title" id="adm-title"></div>
        <button class="admin-btn admin-btn-add"  id="adm-add-btn"></button>
        <button class="admin-btn admin-btn-week" id="adm-week-btn"></button>
        <button class="admin-btn admin-btn-del"  id="adm-del-btn"></button>
        <button class="admin-btn" style="background:rgba(167,139,250,.12);color:var(--accent-2);border:1.5px solid var(--accent)" id="adm-replay-btn"></button>
        <button class="admin-btn admin-btn-exit" id="adm-exit-btn"></button>
      </div>
    </div>

  </div>

  <button id="fab">+</button>

  <div class="bottom-nav">
    <div class="nav-bar glass">
      <button class="nav-btn active" data-tab="week">
        <span class="nav-ico"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><span class="nav-lbl" id="nav-week"></span>

      <button class="nav-btn" data-tab="history">
        <span class="nav-ico"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block"><rect x="3" y="3" width="4" height="18"/><rect x="10" y="8" width="4" height="13"/><rect x="17" y="13" width="4" height="8"/></svg></span><span class="nav-lbl" id="nav-history"></span>

      <button class="nav-btn" data-tab="people">
        <span class="nav-ico"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg></span><span class="nav-lbl" id="nav-people"></span>

<!-- ══════════════════════════════════════════════════════ -->

<!-- Create Group -->

// ════════════════════════════════════════════════════════
//  DATE HELPERS
// ════════════════════════════════════════════════════════
const pad = n => String(n).padStart(2,'0');
function todayStr() { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fmtShort(s){ return new Date(s+'T12:00').toLocaleDateString(navigator.language,{day:'numeric',month:'short'}); }
function fmtFull(s) { return new Date(s+'T12:00').toLocaleDateString(navigator.language,{weekday:'short',day:'numeric',month:'short'}); }
function addDays(dateStr, n) {
  const d = new Date(dateStr+'T12:00'); d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function mondayOf(s) {
  const d=new Date(s+'T12:00'), day=d.getDay()||7; d.setDate(d.getDate()-day+1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function sundayOf(m) {
  const d=new Date(m+'T12:00'); d.setDate(d.getDate()+6);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

// ════════════════════════════════════════════════════════
const api = {
  async req(method, path, body) {
    const opts = { method, headers:{'Content-Type':'application/json'} };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch('/api'+path, opts);
    const d   = await res.json();
    if (!res.ok) { const e=new Error(d.error||'error'); e.status=res.status; throw e; }
    return d;
  },

function resizeImageToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const c = document.createElement('canvas');
      c.width = 200; c.height = 200;
      const s = Math.min(img.width, img.height);
      c.getContext('2d').drawImage(img, (img.width-s)/2, (img.height-s)/2, s, s, 0, 0, 200, 200);
      resolve(c.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('load_failed')); };
    img.src = url;
  });
}

async function isImageSafe(dataUrl) {
  if (!_nsfwLoading) {
    _nsfwLoading = (async () => {
      const load = src => new Promise((res, rej) => {
        const s = document.createElement('script'); s.src = src;
        s.onload = res; s.onerror = rej; document.head.appendChild(s);
      });
      await load('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js');
      _nsfwModel = await tf.loadGraphModel('/nsfw-model/model.json');
    })();
  }
  try {
    await _nsfwLoading;
  } catch {
    _nsfwLoading = null;
    throw new Error('nsfw_unavailable');
  }
  const img = new Image();
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = reject;
    img.src = dataUrl;
    if (img.complete) resolve();
  });
  const tensor = tf.tidy(() =>
    tf.browser.fromPixels(img).resizeBilinear([224, 224]).expandDims(0).div(255.0)
  );
  let result = await _nsfwModel.executeAsync(tensor);
  tensor.dispose();
  if (Array.isArray(result)) result = result[0];
  const values = await result.data();
  result.dispose();
  // class order: Drawing(0), Hentai(1), Neutral(2), Porn(3), Sexy(4)
  const porn = values[3], hentai = values[1], sexy = values[4];
  return porn < 0.15 && hentai < 0.15 && sexy < 0.5;
}

function handleAvatarUpload(inputId, previewId, uploadBtnId, msgId, onImg) {
  const input   = document.getElementById(inputId);
  const preview = document.getElementById(previewId);
  const btn     = document.getElementById(uploadBtnId);
  const msg     = document.getElementById(msgId);

  btn.addEventListener('click', () => {
    if (btn.dataset.hasImg === '1') {
      onImg(null);
      btn.dataset.hasImg = '0';
      btn.textContent = T.uploadPhoto;
      preview.textContent = preview.dataset.emoji || '🏋️';
      preview.style.background = preview.dataset.color || '#7c3aed';
      msg.style.display = 'none';
    } else {
      input.click();
    }
  });

  input.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    msg.style.display = '';
    msg.style.color = 'var(--text-3)';
    msg.textContent = T.nsfwChecking;
    btn.disabled = true;
    try {
      const dataUrl = await resizeImageToDataUrl(file);
      const safe = await isImageSafe(dataUrl);
      if (!safe) {
        msg.style.color = '#ef4444';
        msg.textContent = T.nsfwError;
        onImg(null);
        btn.dataset.hasImg = '0';
        btn.textContent = T.uploadPhoto;
        preview.textContent = preview.dataset.emoji || '🏋️';
        preview.style.background = preview.dataset.color || '#7c3aed';
      } else {
        msg.style.display = 'none';
        onImg(dataUrl);
        btn.dataset.hasImg = '1';
        btn.textContent = T.removePhoto;
        preview.innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
        preview.style.background = 'transparent';
      }
    } catch {
      msg.style.color = '#ef4444';
      msg.textContent = T.errServer;
    } finally {
      btn.disabled = false;
      e.target.value = '';
    }
  });
}

// ════════════════════════════════════════════════════════
//  STREAK CALCULATION
// ════════════════════════════════════════════════════════
// Rule: a streak is consecutive completed past weeks (Mon–Sun, not the current week)
// where the person has ≥1 entry of any type ('late' or 'skip').
// A completed week with zero entries breaks the streak.
// The ongoing current week is never counted for or against.
function calcStreak(personName, entries) {
  const currentMon = mondayOf(todayStr());
  const weeksWithEntry = new Set(
    entries
      .filter(e => e.person === personName && mondayOf(e.date) < currentMon)
      .map(e => mondayOf(e.date))
  );
  if (!weeksWithEntry.size) return 0;
  let streak = 0;
  let weekMon = addDays(currentMon, -7);
  while (weeksWithEntry.has(weekMon)) {
    streak++;
    weekMon = addDays(weekMon, -7);
  }
  return streak;
}

// ════════════════════════════════════════════════════════
//  RENDER: HISTORY  (with full animation sequence)
// ════════════════════════════════════════════════════════
function renderHistory() {
  if (!data) return;
  const currentMon = mondayOf(todayStr());
  const weeks = {};
  data.entries.forEach(e => {
    const mon = mondayOf(e.date);
    if (mon === currentMon && !adminShowCurWeek) return;
    (weeks[mon] = weeks[mon] || []).push(e);
  });

  const root = document.getElementById('history-root');
  const sorted = Object.keys(weeks).sort().reverse();

  if (!sorted.length) {
    root.innerHTML = `<div class="card glass"><div class="empty"><div class="empty-txt">${esc(T.emptyHistory)}</div></div></div>`;
    return;
  }

  const medals = ['1.','2.','3.'];
  root.innerHTML = sorted.map((mon, wi) => {
    const sun  = sundayOf(mon);
    const late = weeks[mon].filter(e => (e.type || 'late') === 'late');
    const skip = weeks[mon].filter(e => e.type === 'skip');

    // Build per-person stats from late entries only (for ranking)
    const ps = {};
    late.forEach(e => {
      ps[e.person] = ps[e.person] || { count:0, mins:0, skips:0 };
      ps[e.person].count++; ps[e.person].mins += e.mins;
    });
    // Attach skip counts to persons (may add persons with no late entries)
    skip.forEach(e => {
      ps[e.person] = ps[e.person] || { count:0, mins:0, skips:0 };
      ps[e.person].skips++;
    });

    const byMins       = Object.entries(ps).filter(([,s]) => s.count > 0).sort((a,b) => b[1].mins-a[1].mins || b[1].count-a[1].count);
    const skipOnlyRows = Object.entries(ps).filter(([,s]) => s.count === 0 && s.skips > 0);
    const hasLate      = byMins.length > 0;
    const BASE         = wi * 60;

    const heroHtml = hasLate ? `
      <div class="recap-hero confetti-host">
        <div class="recap-trophy-wrap"><span class="recap-trophy anim-trophy" style="animation-delay:${BASE+100}ms">★</span></div>
        <div class="recap-name anim-name" style="animation-delay:${BASE+270}ms">${esc(byMins[0][0])}</div>
        <div class="recap-role anim-fade-up" style="animation-delay:${BASE+400}ms">${esc(T.lateKing)}</div>
      </div>` : `
      <div class="recap-hero" style="padding:18px 18px 14px;text-align:center">
        <div style="font-size:36px;margin-bottom:6px">⊘</div>
        <div class="recap-name">${esc(T.allSkippedTitle)}</div>
      </div>`;

    const lateRows = byMins.map(([name, st], i) => {
      const skipTag = st.skips > 0 ? ` <span class="skip-badge" style="font-size:11px;padding:1px 7px">⊘${st.skips}</span>` : '';
      return `
        <div class="rank-row ${i===0?'rank-gold':''} anim-rank" style="animation-delay:${BASE+520+i*130}ms">
          <div class="rank-no">${medals[i] || (i+1)+'.'}</div>
          <div class="avatar">${esc(initials(name))}</div>
          <div class="entry-info">
            <div class="entry-name">${esc(name)}${skipTag}</div>
            <div class="entry-meta">${T.timesLate(st.count)}</div>
          </div>
          <div class="late-badge">${st.mins} ${T.minsShort}</div>
        </div>`;
    }).join('');

    const skipRows = skipOnlyRows.map(([name, st], i) => `
      <div class="rank-row anim-rank" style="animation-delay:${BASE+520+(byMins.length+i)*130}ms">
        <div class="rank-no" style="color:var(--gold)">⊘</div>
        <div class="avatar">${esc(initials(name))}</div>
        <div class="entry-info">
          <div class="entry-name">${esc(name)}</div>
          <div class="entry-meta">${st.skips}× ${T.skipped}</div>
        </div>
        <div class="skip-badge">⊘ ${st.skips}</div>
      </div>`).join('');

    return `
      <div class="week-block anim-week" style="animation-delay:${BASE}ms">
        <div class="sec-label anim-fade-up" style="animation-delay:${BASE+30}ms">${T.weekRange(mon,sun)}</div>
        <div class="card glass">
          ${heroHtml}
          ${lateRows}
          ${skipRows}
        </div>
      </div>`;
  }).join('');

  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('.confetti-host').forEach(host => spawnConfetti(host));
      document.querySelectorAll('.anim-trophy').forEach(el => {
        el.addEventListener('animationend', () => { el.classList.add('done'); }, { once: true });
      });
    }, 380);
  });
}

document.getElementById('adm-add-btn').addEventListener('click', async () => {
  if (!data?.people?.length) { showToast(T.noMembersForTest); return; }
  const people   = data.people.map(p => p.name);
  const lastMon  = addDays(mondayOf(todayStr()), -7);
  const schedule = [
    { person: people[0 % people.length], date: addDays(lastMon, 0), mins: 12 },
    { person: people[1 % people.length], date: addDays(lastMon, 1), mins:  5 },
    { person: people[0 % people.length], date: addDays(lastMon, 2), mins: 22 },
    { person: people[2 % people.length], date: addDays(lastMon, 3), mins:  8 },
    { person: people[1 % people.length], date: addDays(lastMon, 4), mins: 17 },
    { person: people[2 % people.length], date: addDays(lastMon, 0), mins: 31 },
  ];
  const ids = [];
  for (const e of schedule) {
    try { const r = await api.addEntry(data.id, e); ids.push(r.id); } catch {}
  }
  testEntryIds = [...testEntryIds, ...ids];
  await refresh();
  showToast(T.toastAdded);
  // Jump to history tab so the user immediately sees the recap
  switchTab('history');
});

document.getElementById('adm-del-btn').addEventListener('click', async () => {
  if (!testEntryIds.length) { showToast(T.noTestData); return; }
  for (const id of testEntryIds) {
    try { await api.delEntry(data.id, id); } catch {}
  }
  testEntryIds = [];
  await refresh();
  showToast(T.toastCleared);
});

let viewingUserId = null;

function openProfileView(userId) {
  viewingUserId = userId;
  const user = data?.people?.find(p => p.id === userId);
  if (!user) return;

  const isOwnProfile   = userProfile && userProfile.userId === userId;
  const isCreatorView  = userProfile?.isCreator && !isOwnProfile;

  setAvatarEl(document.getElementById('pv-avatar'), user);
  document.getElementById('pv-name').textContent = user.name;

  const badge = document.getElementById('pv-creator-badge');
  badge.style.display = user.isCreator ? '' : 'none';

  const userLate = (data?.entries||[]).filter(e => e.person === user.name && (e.type||'late') === 'late');
  document.getElementById('pv-stat-count').textContent = userLate.length;
  document.getElementById('pv-stat-mins').textContent  = userLate.reduce((s,e)=>s+e.mins,0);

  const ownSection  = document.getElementById('pv-own-section');
  const kickSection = document.getElementById('pv-kick-section');
  ownSection.style.display  = isOwnProfile  ? '' : 'none';
  kickSection.style.display = isCreatorView ? '' : 'none';

  if (isOwnProfile && userProfile.recoveryCode) {
    const rc = userProfile.recoveryCode;
    const rcEl = document.getElementById('pv-rc-value');
    rcEl.textContent = rc;
    rcEl.classList.remove('revealed');
    document.getElementById('pv-rc-reveal').textContent = T.pvReveal;
    document.getElementById('pv-rc-reveal').onclick = () => {
      const revealed = rcEl.classList.toggle('revealed');
      document.getElementById('pv-rc-reveal').textContent = revealed ? T.pvHide : T.pvReveal;
    };
    rcEl.onclick = () => {
      const revealed = rcEl.classList.toggle('revealed');
      document.getElementById('pv-rc-reveal').textContent = revealed ? T.pvHide : T.pvReveal;
    };
  }

  openOv('modal-profile-view');
}

document.getElementById('pv-close').addEventListener('click', () => closeOv('modal-profile-view'));
document.getElementById('modal-profile-view').addEventListener('click', e => { if(e.target===e.currentTarget) closeOv('modal-profile-view'); });

document.getElementById('pv-edit-btn').addEventListener('click', () => {
  closeOv('modal-profile-view');
  openEditProfile();
});

document.getElementById('pv-kick-btn').addEventListener('click', async () => {
  const user = data?.people?.find(p => p.id === viewingUserId);
  if (!user) return;
  if (!confirm(T.pvKickConfirm(user.name))) return;
  try {
    await api.kickUser(group.id, viewingUserId, { actorUserId: userProfile.userId, actorRecoveryCode: userProfile.recoveryCode });
    closeOv('modal-profile-view');
    await refresh();
    showToast(T.toastKicked);
  } catch { showToast(T.errServer); }
});

document.getElementById('my-profile-btn').addEventListener('click', () => {
  if (userProfile) openProfileView(userProfile.userId);
});

// ════════════════════════════════════════════════════════
//  EDIT PROFILE MODAL
// ════════════════════════════════════════════════════════
function openEditProfile() {
  if (!userProfile) return;
  epSelEmoji = userProfile.avatarEmoji;
  epSelColor = userProfile.avatarColor;
  epSelImg = userProfile.avatarImg || null;

  const prev = document.getElementById('ep-preview');
  prev.dataset.emoji = epSelEmoji;
  prev.dataset.color = epSelColor;
  const epUploadBtn = document.getElementById('ep-upload-btn');
  document.getElementById('ep-upload-msg').style.display = 'none';
  if (epSelImg && epSelImg.startsWith('data:image/')) {
    prev.innerHTML = `<img src="${epSelImg}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    prev.style.background = 'transparent';
    epUploadBtn.textContent = T.removePhoto;
    epUploadBtn.dataset.hasImg = '1';
  } else {
    prev.textContent = epSelEmoji;
    prev.style.background = epSelColor;
    epUploadBtn.textContent = T.uploadPhoto;
    epUploadBtn.dataset.hasImg = '0';
  }
  document.getElementById('ep-name').value = userProfile.name;
  document.getElementById('ep-error').textContent = '';

  const eg = document.getElementById('ep-emoji-grid');
  eg.innerHTML = AVATAR_EMOJIS.map(em =>
    `<div class="emoji-cell${em===epSelEmoji?' sel':''}" data-emoji="${em}">${em}</div>`
  ).join('');
  eg.querySelectorAll('.emoji-cell').forEach(c => {
    c.addEventListener('click', () => {
      eg.querySelectorAll('.emoji-cell').forEach(x=>x.classList.remove('sel'));
      c.classList.add('sel');
      epSelEmoji = c.dataset.emoji;
      prev.dataset.emoji = epSelEmoji;
      if (!epSelImg) prev.textContent = epSelEmoji;
    });
  });

  const cg = document.getElementById('ep-color-grid');
  cg.innerHTML = AVATAR_COLORS.map(col =>
    `<div class="color-dot${col===epSelColor?' sel':''}" data-color="${col}" style="background:${col}"></div>`
  ).join('');
  cg.querySelectorAll('.color-dot').forEach(c => {
    c.addEventListener('click', () => {
      cg.querySelectorAll('.color-dot').forEach(x=>x.classList.remove('sel'));
      c.classList.add('sel');
      epSelColor = c.dataset.color;
      prev.dataset.color = epSelColor;
      if (!epSelImg) prev.style.background = epSelColor;
    });
  });

  openOv('modal-edit-profile');
  setTimeout(() => document.getElementById('ep-name').focus(), 350);
}

document.getElementById('ep-cancel').addEventListener('click', () => closeOv('modal-edit-profile'));
document.getElementById('modal-edit-profile').addEventListener('click', e => { if(e.target===e.currentTarget) closeOv('modal-edit-profile'); });

document.getElementById('ep-submit').addEventListener('click', async () => {
  const newName = document.getElementById('ep-name').value.trim();
  const errEl   = document.getElementById('ep-error');
  if (!newName) { errEl.textContent = T.psuErrName; return; }
  errEl.textContent = '';
  document.getElementById('ep-submit').disabled = true;
  try {
    await api.updateUser(group.id, userProfile.userId, {
      name: newName, avatarEmoji: epSelEmoji, avatarColor: epSelColor,
      avatarImg: epSelImg,
      recoveryCode: userProfile.recoveryCode
    });
    userProfile.name = newName; userProfile.avatarEmoji = epSelEmoji; userProfile.avatarColor = epSelColor; userProfile.avatarImg = epSelImg;
    saveUser(group.id, userProfile);
    closeOv('modal-edit-profile');
    await refresh();
    updateMyProfileBtn();
    showToast(T.toastProfileSaved);
  } catch(e) {
    errEl.textContent = e.status===409 ? T.errNameTaken : T.errServer;
  } finally { document.getElementById('ep-submit').disabled = false; }
});

// ════════════════════════════════════════════════════════
//  WRAPPED ENGINE
// ════════════════════════════════════════════════════════
let wSlides = [], wIdx = 0, wTimer = null;

function shouldShowWrapped() {
  const mon = mondayOf(todayStr());
  if (localStorage.getItem('gymWrappedSeen') === mon) return false;
  return (data?.entries || []).some(e => mondayOf(e.date) === mon && (e.type || 'late') === 'late');
}

function showWrapped(force = false) {
  const slides = buildWrappedSlides(force);
  if (!slides?.length) { showToast(T.noMembersForTest); return; }
  wSlides = slides;
  wIdx = 0;

  // Build progress bar
  const prog = document.getElementById('w-prog');
  prog.innerHTML = slides.map((_,i) =>
    `<div class="w-seg"><div class="w-fill" id="wf${i}"></div></div>`
  ).join('');

  document.getElementById('wrapped').classList.remove('hidden');
  wShowSlide(0);

  if (!force) localStorage.setItem('gymWrappedSeen', mondayOf(todayStr()));
}

function wShowSlide(idx) {
  clearTimeout(wTimer);
  wIdx = idx;
  const slide = wSlides[idx];

  // Fill past segments instantly
  wSlides.forEach((_, i) => {
    const f = document.getElementById(`wf${i}`);
    if (!f) return;
    f.style.transition = 'none';
    f.style.width = i < idx ? '100%' : '0%';
  });

  // Render
  const stage = document.getElementById('w-stage');
  stage.innerHTML = `<div class="w-slide w-in" style="background:${slide.bg}">${slide.html}</div>`;

  // Wire close button if present
  const cb = stage.querySelector('#w-close');
  if (cb) cb.addEventListener('click', wClose);

  // Count-up animation
  if (slide.countId && slide.countTarget != null) {
    setTimeout(() => {
      const el = document.getElementById(slide.countId);
      if (el) wCount(el, slide.countTarget);
    }, 280);
  }

  // Progress + auto-advance
  if (!slide.isLast) {
    setTimeout(() => {
      const f = document.getElementById(`wf${idx}`);
      if (f) { f.style.transition = `width ${slide.dur||4}s linear`; f.style.width = '100%'; }
      wTimer = setTimeout(() => wAdvance(1), (slide.dur||4) * 1000);
    }, 60);
  } else {
    const f = document.getElementById(`wf${idx}`);
    if (f) { f.style.transition = 'none'; f.style.width = '100%'; }
  }
}

function wAdvance(dir) {
  clearTimeout(wTimer);
  const next = wIdx + dir;
  if (next < 0) {
    // Shake on back-on-first
    const s = document.querySelector('.w-slide');
    if (s) { s.style.animation = 'w-shake .3s ease'; setTimeout(() => s.style.animation='', 350); }
    return;
  }
  if (next >= wSlides.length) { wClose(); return; }

  // Quick exit anim then enter next
  const cur = document.querySelector('.w-slide');
  if (cur) {
    cur.classList.remove('w-in');
    cur.classList.add('w-out');
    setTimeout(() => wShowSlide(next), 200);
  } else {
    wShowSlide(next);
  }
}

function wClose() {
  clearTimeout(wTimer);
  document.getElementById('wrapped').classList.add('hidden');
}

function wCount(el, target) {
  const dur = Math.min(1400, 500 + target * 25);
  const t0 = Date.now();
  const tick = () => {
    const p = Math.min((Date.now() - t0) / dur, 1);
    const e = 1 - Math.pow(1 - p, 3); // ease-out cubic
    el.textContent = Math.round(target * e);
    if (p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

// Build slides — anyWeek=true uses the most recent week with data (for admin replay)
function buildWrappedSlides(anyWeek = false) {
  const allEntries = data?.entries || [];
  let mon, sun;

  if (anyWeek) {
    const mons = [...new Set(allEntries.map(e => mondayOf(e.date)))].sort().reverse();
    if (!mons.length) return null;
    mon = mons[0];
  } else {
    mon = mondayOf(todayStr());
  }
  sun = sundayOf(mon);

  const weekEntries = allEntries.filter(e => e.date >= mon && e.date <= sun);
  const entries = weekEntries.filter(e => (e.type || 'late') === 'late');
  if (!entries.length) return null;

  const totalLate = entries.length;
  const totalMins = entries.reduce((s,e) => s + e.mins, 0);
  const hours = Math.floor(totalMins / 60), remMins = totalMins % 60;

  const ps = {};
  entries.forEach(e => { ps[e.person] = ps[e.person]||{count:0,mins:0}; ps[e.person].count++; ps[e.person].mins+=e.mins; });
  const ranking = Object.entries(ps).sort((a,b) => b[1].mins - a[1].mins);
  const [topName, topSt] = ranking[0];
  const medals = ['1.','2.','3.'];

  const slides = [];

  /* ── Slide 1: Intro ── */
  slides.push({ dur: 3, bg: 'linear-gradient(160deg,#12002a 0%,#2d0d5c 100%)', html: `
    <div class="w-group w-fade">${esc(data.name)}</div>
    <div class="w-gap-sm"></div>
    <div class="w-emoji w-pop">🏋️</div>
    <div class="w-gap-sm"></div>
    <div class="w-headline w-rise" style="animation-delay:.25s">${T.wS1a}</div>
    <div class="w-headline w-rise" style="animation-delay:.4s;color:rgba(255,255,255,.35)">${T.wS1b}</div>
    <div class="w-gap"></div>
    <div class="w-label w-fade" style="animation-delay:.65s">${T.weekRange(mon,sun)}</div>
  `});

  /* ── Slide 2: Late count ── */
  slides.push({ dur: 4, countId:'wn-late', countTarget: totalLate,
    bg: 'linear-gradient(160deg,#b5004f 0%,#e0106a 100%)', html: `
    <div class="w-label w-fade">${T.wS2label}</div>
    <div class="w-gap-xs"></div>
    <div class="w-number w-pop" id="wn-late" style="animation-delay:.1s">0</div>
    <div class="w-gap-xs"></div>
    <div class="w-sub w-rise" style="animation-delay:.3s">${T.wS2sub}</div>
    <div class="w-gap"></div>

  `});

  /* ── Slide 3: Minutes ── */
  slides.push({ dur: 4, countId:'wn-mins', countTarget: totalMins,
    bg: 'linear-gradient(160deg,#c44200 0%,#ff7a00 100%)', html: `
    <div class="w-label w-fade">${T.wS3label}</div>
    <div class="w-gap-xs"></div>
    <div class="w-number w-pop" id="wn-mins" style="animation-delay:.1s">0</div>
    <div class="w-sub w-rise" style="animation-delay:.3s">${T.wS3sub}</div>
    ${hours > 0 ? `<div class="w-gap-sm"></div><div class="w-label w-fade" style="animation-delay:.55s">${T.wS3hours(hours,remMins)}</div>` : ''}
  `});

  /* ── Slide 4: Top latecomer ── */
  slides.push({ dur: 4.5, bg: 'linear-gradient(160deg,#1d0082 0%,#5200d4 100%)', html: `

    <div class="w-gap-sm"></div>
    <div class="w-label w-rise" style="animation-delay:.2s">${T.wS4label}</div>
    <div class="w-gap-sm"></div>
    <div class="w-name w-pop" style="animation-delay:.38s">${esc(topName)}</div>
    <div class="w-gap"></div>
    <div class="w-sub w-fade" style="animation-delay:.6s">${topSt.count}× · ${topSt.mins} ${T.minsShort}</div>
  `});

  /* ── Slide 5: Ranking (only if >1 person) ── */
  if (ranking.length > 1) {
    slides.push({ dur: 5, bg: 'linear-gradient(160deg,#003040 0%,#005a6e 100%)', html: `
      <div class="w-headline-md w-rise">${T.wS5title}</div>
      <div class="w-divider"></div>
      <div class="w-ranks">
        ${ranking.slice(0,5).map(([name,st],i) => `
          <div class="w-rank-row w-rise" style="animation-delay:${.2+i*.13}s">
            <div class="w-medal">${medals[i]||(i+1)+'.'}</div>
            <div class="w-rank-name">${esc(name)}</div>
            <div class="w-rank-mins">${st.mins} ${T.minsShort}</div>
          </div>`).join('')}
      </div>
    `});
  }

  /* ── Slide 6: End card ── */
  slides.push({ isLast: true, bg: 'linear-gradient(160deg,#0c0118 0%,#1e0044 100%)', html: `
    <div class="w-emoji w-pop">🏋️</div>
    <div class="w-gap-sm"></div>
    <div class="w-headline w-rise" style="animation-delay:.2s;font-size:clamp(44px,14vw,78px)">${T.wS6a}</div>
    <div class="w-headline w-rise" style="animation-delay:.36s;font-size:clamp(44px,14vw,78px);color:rgba(255,255,255,.35)">${T.wS6b}</div>
    <div class="w-gap-lg"></div>
    <button class="w-btn-close w-pop" id="w-close" style="animation-delay:.6s">${T.wClose}</button>
  `});

  return slides;
}

// Tap zones
document.getElementById('w-tap-l').addEventListener('click', () => wAdvance(-1));
document.getElementById('w-tap-r').addEventListener('click', () => wAdvance(1));
document.getElementById('w-skip').addEventListener('click', wClose);

// Swipe support
let wTouchX = 0;
const wEl = document.getElementById('wrapped');
wEl.addEventListener('touchstart', e => { wTouchX = e.touches[0].clientX; }, { passive: true });
wEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - wTouchX;
  if (Math.abs(dx) > 48) wAdvance(dx < 0 ? 1 : -1);
});

// Keyboard
document.addEventListener('keydown', e => {
  if (document.getElementById('wrapped').classList.contains('hidden')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); wAdvance(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); wAdvance(-1); }
  if (e.key === 'Escape') wClose();
});

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
applyI18n();
async function init() {
  showLoading(true); loadGroup();
  if (group) {
    loadUser(group.id);
    try {
      data = await api.getGroup(group.id);
    } catch(e) {
      if (e.status===404) clearGroup();
      showLoading(false); showScreen('landing'); return;
    }
    if (!userProfile) {
      // Stored group but no user — show profile setup
      showLoading(false);
      pendingGroup = group;
      applyI18n(); showScreen('landing'); openProfileSetup();
      return;
    }
    // Check if user is still in the group (not kicked)
    const me = data.people.find(p => p.id === userProfile.userId);
    if (!me) {
      clearUser(group.id); userProfile = null;
      showLoading(false); showScreen('landing');
      setTimeout(() => showToast(T.kicked), 300); return;
    }
    userProfile.isCreator = me.isCreator;
    if ('avatarImg' in me) userProfile.avatarImg = me.avatarImg;
    saveUser(group.id, userProfile);
    updateMyProfileBtn();
    applyI18n(); renderAll(); startPolling(); showLoading(false); showScreen('app');
    setTimeout(() => { if (shouldShowWrapped()) showWrapped(); }, 700);
    return;
  }
  showLoading(false); showScreen('landing');
}
init();
</script>
