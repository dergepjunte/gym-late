<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GymLate</title>

  <!-- Leaflet (map picker for gym location) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f0e9da" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0e0903" media="(prefers-color-scheme: dark)">

  <!-- iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GymLate">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loading"><div class="spinner"></div></div>

<!-- ══════════════════════════════════════════════════════ -->
<!--  WRAPPED OVERLAY                                      -->
<!-- ══════════════════════════════════════════════════════ -->
<div id="wrapped" class="wrapped hidden">
  <div class="w-prog"   id="w-prog"></div>
  <div class="w-stage"  id="w-stage"></div>
  <button class="w-skip" id="w-skip">✕</button>
  <div class="w-tap-l"  id="w-tap-l"></div>
  <div class="w-tap-r"  id="w-tap-r"></div>
</div>

<!-- Daily Hype Overlay -->
<div class="notif-primer hidden" id="notif-primer">
  <div class="notif-primer-card">
    <div class="notif-primer-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><circle cx="19" cy="5" r="3" fill="var(--accent-2)" stroke="none"/></svg>
    </div>
    <div class="notif-primer-title" id="notif-primer-title"></div>
    <div class="notif-primer-body" id="notif-primer-body"></div>
    <button class="notif-primer-enable" id="notif-primer-enable"></button><br>
    <button class="notif-primer-later" id="notif-primer-later"></button>
  </div>
</div>

<div id="daily-hype" class="fullscreen-overlay hidden">
  <div class="overlay-icon">🏋️</div>
  <div class="overlay-title" id="dh-title"></div>
  <div class="overlay-sub"   id="dh-sub"></div>
  <div class="dh-time-picker hidden" id="dh-time-picker">
    <div class="dh-time-picker-lbl" id="dh-time-picker-lbl"></div>
    <input type="time" class="dh-time-input" id="dh-time-input" value="18:00">
    <button class="overlay-btn-primary" id="dh-time-save"></button>
  </div>
  <div class="dh-time-display hidden" id="dh-time-display">
    <div class="dh-time-display-lbl" id="dh-time-display-lbl"></div>
    <div class="dh-time-display-val" id="dh-time-display-val"></div>
  </div>
  <div class="overlay-btns">
    <button class="overlay-btn-primary" id="dh-close"></button>
  </div>
</div>

<!-- Geo Check-in Prompt Overlay -->
<div id="geo-prompt" class="fullscreen-overlay hidden">
  <div class="overlay-icon" id="gp-icon">📍</div>
  <div class="overlay-title" id="gp-title"></div>
  <div class="overlay-sub"   id="gp-sub"></div>
  <div class="overlay-btns" id="gp-btns-gymday">
    <button class="overlay-btn-primary" id="gp-checkin"></button>
    <button class="overlay-btn-ghost"   id="gp-later"></button>
  </div>
  <div class="overlay-btns hidden" id="gp-btns-nogymday">
    <button class="overlay-btn-primary" id="gp-log-checkin"></button>
    <button class="overlay-btn-ghost"   id="gp-later2"></button>
  </div>
</div>

<!-- Late Check-in Animation -->
<div id="late-anim" class="fullscreen-overlay hidden">
  <div class="la-icon-wrap">
    <div class="la-glow"></div>
    <div class="la-icon">⏰</div>
  </div>
  <div class="overlay-title" id="la-title"></div>
  <div class="overlay-sub"   id="la-sub"></div>
  <div class="overlay-btns">
    <button class="overlay-btn-primary" id="la-close"></button>
  </div>
</div>

<!-- Streak Extended Animation (Duolingo-style) -->
<div id="streak-anim" class="fullscreen-overlay hidden">
  <div class="sa-flame-wrap">
    <div class="sa-glow"></div>
    <svg class="sa-flame-grey" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67z"/>
    </svg>
    <svg class="sa-flame-lit" viewBox="0 0 24 24" aria-hidden="true">
      <defs>
        <linearGradient id="flameGradSA" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#fde047"/>
          <stop offset="45%" stop-color="#fb923c"/>
          <stop offset="100%" stop-color="#dc2626"/>
        </linearGradient>
      </defs>
      <path fill="url(#flameGradSA)" d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67z"/>
    </svg>
  </div>
  <div class="sa-num" id="sa-num">0</div>
  <div class="sa-lbl" id="sa-lbl"></div>
  <div class="sa-btn-wrap">
    <button class="overlay-btn-primary" id="sa-close"></button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Notification Bubble (prompts-first) -->
<div class="notif-bubble glass" id="notif-bubble" role="alert" aria-live="polite">
  <div class="notif-glyph" id="notif-glyph" aria-hidden="true">🏋️</div>
  <div class="notif-body">
    <div class="notif-t1" id="notif-t1"></div>
    <div class="notif-t2" id="notif-t2"></div>
  </div>
  <button class="notif-x" id="notif-x" aria-label="Dismiss">✕</button>
</div>
<!-- Replay Hint Chip -->
<button class="replay-hint-chip glass" id="replay-hint"></button>

<!-- ══════════════════════════════════════════════════════ -->
<!--  LANDING SCREEN                                       -->
<!-- ══════════════════════════════════════════════════════ -->
<div class="screen hidden" id="screen-landing">
  <div class="landing-hero">
    <div class="landing-icon">🏋️</div>
    <h1 class="landing-title">GymLate</h1>
    <p class="landing-sub" id="ls-sub"></p>
  </div>
  <div class="landing-features">
    <div class="landing-feature">
      <span class="landing-feature-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67z"/></svg></span>
      <span class="landing-feature-txt" id="ls-feat-streak"></span>
    </div>
    <div class="landing-feature">
      <span class="landing-feature-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg></span>
      <span class="landing-feature-txt" id="ls-feat-checkin"></span>
    </div>
    <div class="landing-feature">
      <span class="landing-feature-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg></span>
      <span class="landing-feature-txt" id="ls-feat-group"></span>
    </div>
  </div>
  <div class="landing-card glass">
    <button class="btn btn-primary btn-xl btn-full" id="btn-show-create">
      <span>✦</span><span id="ls-create-lbl"></span>
    </button>
    <div class="landing-btn-hint" id="ls-create-hint"></div>
    <div class="or-divider"><span id="ls-or"></span></div>
    <button class="btn btn-ghost btn-xl btn-full" id="btn-show-join">
      <span id="ls-join-lbl"></span>
    </button>
    <div class="landing-btn-hint" id="ls-join-hint"></div>
    <div class="landing-admin-tools">
      <button class="btn btn-ghost btn-xl btn-full" id="btn-admin-login">
        <span id="ls-admin-lbl"></span>
      </button>
      <button class="btn btn-admin btn-xl btn-full hidden" id="btn-create-test-group">
        <span id="ls-test-lbl"></span>
      </button>
      <div class="landing-admin-note hidden" id="ls-admin-note"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════ -->
<!--  APP SCREEN                                           -->
<!-- ══════════════════════════════════════════════════════ -->
<div class="screen hidden" id="screen-app">
  <div class="app-inner">

    <div class="header" style="position:relative">
      <h1 class="header-title" id="header-icon">GYMLATE</h1>
      <button class="admin-badge hidden" id="admin-badge" style="cursor:pointer">ADMIN</button>
      <button class="my-profile-btn" id="my-profile-btn" title="Mein Profil"></button>
    </div>


    <div class="nav-top">
      <div class="nav-bar glass">
        <button class="nav-btn active" data-tab="week">
          <span class="nav-ico"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block"><path d="M3 9.5L12 3l9 6.5V21a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span class="nav-lbl"></span>
        </button>
        <button class="nav-btn" data-tab="history">
          <span class="nav-ico"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="8" cy="15" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="15" r="1.2" fill="currentColor" stroke="none"/><circle cx="16" cy="15" r="1.2" fill="currentColor" stroke="none"/><circle cx="8" cy="19" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.2" fill="currentColor" stroke="none"/></svg></span><span class="nav-lbl"></span>
        </button>
        <button class="nav-btn" data-tab="recap">
          <span class="nav-ico"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block"><rect x="3" y="3" width="4" height="18"/><rect x="10" y="8" width="4" height="13"/><rect x="17" y="13" width="4" height="8"/></svg></span><span class="nav-lbl"></span>
        </button>
        <button class="nav-btn" data-tab="people">
          <span class="nav-ico"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg></span><span class="nav-lbl"></span>
        </button>
      </div>
    </div>

    <!-- ── WEEK TAB ── -->
    <div class="tab-pane active" id="pane-week">
      <!-- Streak hero: grey flame = not extended today, glowing = extended -->
      <div class="streak-hero glass hidden" id="streak-hero">
        <svg class="streak-flame" viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <linearGradient id="flameGradHero" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#fde047"/>
              <stop offset="45%" stop-color="#fb923c"/>
              <stop offset="100%" stop-color="#dc2626"/>
            </linearGradient>
          </defs>
          <path class="flame-grey" d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67z"/>
          <path class="flame-lit" fill="url(#flameGradHero)" d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67z"/>
        </svg>
        <div class="streak-hero-info">
          <div class="streak-hero-num" id="streak-hero-num">0</div>
          <div class="streak-hero-lbl" id="streak-hero-lbl"></div>
        </div>
        <div class="streak-hero-hint" id="streak-hero-hint"></div>
      </div>
      <div class="streak-hero glass checkin-time-hero hidden" id="checkin-time-hero">
        <div class="checkin-time-icon" aria-hidden="true">⏰</div>
        <div class="streak-hero-info" id="checkin-time-view">
          <div class="streak-hero-lbl" id="checkin-time-chip-lbl"></div>
          <div class="streak-hero-num checkin-time-num" id="checkin-time-chip-val">0</div>
        </div>
        <div class="checkin-time-editor hidden" id="checkin-time-editor">
          <input type="time" class="checkin-time-input" id="checkin-time-edit-input">
          <button class="checkin-time-save-btn" id="checkin-time-save-btn"></button>
        </div>
        <div class="streak-hero-hint" id="checkin-time-hint"></div>
      </div>
      <div class="sec-label" id="lbl-week"></div>
      <div class="card glass stat-strip">
        <div class="stat-cell"><div class="stat-val" id="s-count">0</div><div class="stat-lbl" id="s-count-lbl"></div></div>
        <div class="stat-cell"><div class="stat-val" id="s-mins">0</div><div class="stat-lbl" id="s-mins-lbl"></div></div>
      </div>
      <div id="skip-stat-wrap" class="hidden" style="text-align:center;margin-top:8px">
        <span class="skip-chip" id="skip-stat-chip"></span>
      </div>
      <div class="card glass" id="week-card" style="margin-top:14px">
        <div class="empty" id="week-empty"><div class="empty-txt" id="empty-week-txt"></div></div>
        <div id="week-list"></div>
      </div>
    </div>

    <!-- ── HISTORY / CALENDAR TAB ── -->
    <div class="tab-pane" id="pane-history">
      <div class="cal-nav">
        <button class="cal-nav-btn" id="cal-prev">&#x2039;</button>
        <div class="cal-month-label" id="cal-month-label"></div>
        <button class="cal-nav-btn" id="cal-next">&#x203a;</button>
      </div>
      <div class="cal-weekdays" id="cal-weekdays"></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- ── RECAP TAB ── -->
    <div class="tab-pane" id="pane-recap">
      <div class="sec-label" id="lbl-history"></div>
      <button class="btn btn-ghost btn-full" id="recap-replay-btn" style="margin-bottom:16px"></button>
      <div id="week-recap"></div>
    </div>

    <!-- ── PEOPLE TAB ── -->
    <div class="tab-pane" id="pane-people">
      <div class="sec-label" id="lbl-people"></div>
      <div class="card glass" id="people-card">
        <div class="empty" id="people-empty">
          <div class="empty-txt" id="empty-people-txt"></div>
          <div class="empty-sub" id="empty-people-sub"></div>
        </div>
        <div id="people-list"></div>
      </div>
      <div class="invite-card glass">
        <div class="invite-hint" id="invite-hint-txt"></div>
        <button class="btn btn-primary btn-full" id="invite-btn"></button>
      </div>

      <!-- My groups: switch inline -->
      <div class="sec-label" id="lbl-groups" style="margin-top:24px"></div>
      <div class="card glass" id="groups-card">
        <div id="groups-list"></div>
      </div>
      <div class="groups-inline-actions">
        <button class="btn btn-ghost" id="pp-join-btn"></button>
        <button class="btn btn-ghost" id="pp-create-btn"></button>
      </div>

      <div class="leave-section"><button class="leave-btn" id="leave-btn"></button></div>

    </div>

  </div>

  <button id="fab">+</button>

  <div class="bottom-nav">
    <div class="nav-bar glass">
      <div class="nav-indicator"></div>
      <button class="nav-btn active" data-tab="week">
        <span class="nav-ico"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block"><path d="M3 9.5L12 3l9 6.5V21a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span class="nav-lbl" id="nav-week"></span>
      </button>
      <button class="nav-btn" data-tab="history">
        <span class="nav-ico"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="8" cy="15" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="15" r="1.2" fill="currentColor" stroke="none"/><circle cx="16" cy="15" r="1.2" fill="currentColor" stroke="none"/><circle cx="8" cy="19" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.2" fill="currentColor" stroke="none"/></svg></span><span class="nav-lbl" id="nav-history"></span>
      </button>
      <button class="nav-btn" data-tab="recap">
        <span class="nav-ico"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block"><rect x="3" y="3" width="4" height="18"/><rect x="10" y="8" width="4" height="13"/><rect x="17" y="13" width="4" height="8"/></svg></span><span class="nav-lbl" id="nav-recap"></span>
      </button>
      <button class="nav-btn" data-tab="people">
        <span class="nav-ico"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg></span><span class="nav-lbl" id="nav-people"></span>
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════ -->
<!--  MODALS                                               -->
<!-- ══════════════════════════════════════════════════════ -->

<!-- Create Group -->
<div class="fullpage" id="modal-create">
  <div class="fullpage-bar">
    <button class="fullpage-back" id="mc-cancel">‹</button>
    <div class="fullpage-bar-title" id="mc-title"></div>
  </div>
  <div class="fullpage-inner">
    <div class="form-grp">
      <label class="form-lbl" id="mc-lbl-name"></label>
      <input type="text" class="form-ctrl" id="mc-name" maxlength="50" autocomplete="off">
    </div>
    <div class="form-grp" style="margin-top:14px">
      <label class="form-lbl" id="mc-lbl-days"></label>
      <div class="day-picker" id="mc-day-picker"></div>
    </div>
    <div class="error-msg" id="mc-error"></div>
    <button class="btn btn-primary btn-full btn-xl" id="mc-submit" style="margin-top:8px"></button>
  </div>
</div>

<!-- Success (code display) -->
<div class="overlay" id="modal-success">
  <div class="modal glass">
    <div class="success-check">✓</div>
    <div class="success-title" id="ms-title"></div>
    <div class="success-sub"   id="ms-sub"></div>
    <div class="code-boxes"    id="ms-code-boxes"></div>
    <button class="copy-code-btn" id="ms-copy"></button>
    <button class="btn btn-primary btn-full" id="ms-continue"></button>
  </div>
</div>

<!-- Join Group -->
<div class="fullpage" id="modal-join">
  <div class="fullpage-bar">
    <button class="fullpage-back" id="mj-cancel">‹</button>
    <div class="fullpage-bar-title" id="mj-title"></div>
  </div>
  <div class="fullpage-inner">
    <p class="modal-sub" id="mj-sub"></p>
    <div class="form-grp">
      <label class="form-lbl" id="mj-lbl"></label>
      <input type="text" class="form-ctrl code-input" id="mj-code"
             maxlength="6" autocomplete="off" autocapitalize="characters" spellcheck="false" inputmode="text">
    </div>
    <div class="error-msg" id="mj-error"></div>

const pad = n => String(n).padStart(2,'0');
function todayStr() { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fmtShort(s){ return new Date(s+'T12:00').toLocaleDateString(navigator.language,{day:'numeric',month:'short'}); }
function fmtFull(s) { return new Date(s+'T12:00').toLocaleDateString(navigator.language,{weekday:'short',day:'numeric',month:'short'}); }
function addDays(dateStr, n) {
  const d = new Date(dateStr+'T12:00'); d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function mondayOf(s) {
  const d=new Date(s+'T12:00'), day=d.getDay()||7; d.setDate(d.getDate()-day+1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function sundayOf(m) {
  const d=new Date(m+'T12:00'); d.setDate(d.getDate()+6);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

const api = {
  async req(method, path, body) {
    const opts = { method, headers:{'Content-Type':'application/json'} };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch('/api'+path, opts);
    const d   = await res.json();
    if (!res.ok) { const e=new Error(d.error||'error'); e.status=res.status; throw e; }
    return d;
  },
  verifyAdmin:   (pw)      => api.req('POST', '/admin/verify', {password:pw}),
  createGroup:   (n,gd)   => api.req('POST', '/groups', {name:n, gym_days:gd}),
  patchGroup:    (id,d)   => api.req('PATCH', `/groups/${id}`, d),
  createTestGroup:p       => api.req('POST', '/test-group', {password:p}),
  joinGroup:      c       => api.req('POST', '/groups/join', {code:c}),
  getGroup:       id      => api.req('GET',  `/groups/${id}`),
  addMember:     (g,n)    => api.req('POST',   `/groups/${g}/members`, {name:n}),
  delMember:     (g,n)    => api.req('DELETE', `/groups/${g}/members/${encodeURIComponent(n)}`),
  addEntry:      (g,d)    => api.req('POST',   `/groups/${g}/entries`, d),
  delEntry:      (g,e,pw) => api.req('DELETE', `/groups/${g}/entries/${e}`, pw ? {adminPassword:pw} : undefined),
  patchEntry:    (g,e,d,pw) => api.req('PATCH',  `/groups/${g}/entries/${e}`, {...d, adminPassword:pw}),
  registerUser:  (g,d)    => api.req('POST',   `/groups/${g}/users`, d),
  loginUser:     (g,d)    => api.req('POST',   `/groups/${g}/users/login`, d),
  updateUser:    (g,u,d)  => api.req('PATCH',  `/groups/${g}/users/${u}`, d),
  kickUser:      (g,u,d)  => api.req('DELETE', `/groups/${g}/users/${u}`, d),
  testPush:      (type)   => api.req('POST', '/admin/test-push', { userId: userProfile?.userId, groupId: group?.id, adminPassword, type }),
  setCheckinTime:(g,d)    => api.req('POST',   `/groups/${g}/checkin-time`, d),
};

function resizeImageToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const c = document.createElement('canvas');
      c.width = 200; c.height = 200;
      const s = Math.min(img.width, img.height);
      c.getContext('2d').drawImage(img, (img.width-s)/2, (img.height-s)/2, s, s, 0, 0, 200, 200);
      resolve(c.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('load_failed')); };
    img.src = url;
  });
}

async function isImageSafe(dataUrl) {
  if (!_nsfwLoading) {
    _nsfwLoading = (async () => {
      const load = src => new Promise((res, rej) => {
        const s = document.createElement('script'); s.src = src;
        s.onload = res; s.onerror = rej; document.head.appendChild(s);
      });
      await load('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js');
      _nsfwModel = await tf.loadGraphModel('/nsfw-model/model.json');
    })();
  }
  try {
    await _nsfwLoading;
  } catch {
    _nsfwLoading = null;
    throw new Error('nsfw_unavailable');
  }
  const img = new Image();
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = reject;
    img.src = dataUrl;
    if (img.complete) resolve();
  });
  const tensor = tf.tidy(() =>
    tf.browser.fromPixels(img).resizeBilinear([224, 224]).expandDims(0).div(255.0)
  );
  let result = await _nsfwModel.executeAsync(tensor);
  tensor.dispose();
  if (Array.isArray(result)) result = result[0];
  const values = await result.data();
  result.dispose();
  // class order: Drawing(0), Hentai(1), Neutral(2), Porn(3), Sexy(4)
  const porn = values[3], hentai = values[1], sexy = values[4];
  return porn < 0.15 && hentai < 0.15 && sexy < 0.5;
}

function handleAvatarUpload(inputId, previewId, uploadBtnId, msgId, onImg) {
  const input   = document.getElementById(inputId);
  const preview = document.getElementById(previewId);
  const btn     = document.getElementById(uploadBtnId);
  const msg     = document.getElementById(msgId);

  btn.addEventListener('click', () => {
    if (btn.dataset.hasImg === '1') {
      onImg(null);
      btn.dataset.hasImg = '0';
      btn.textContent = T.uploadPhoto;
      preview.textContent = preview.dataset.emoji || '🏋️';
      preview.style.background = preview.dataset.color || '#7c3aed';
      msg.style.display = 'none';
    } else {
      input.click();
    }
  });

  input.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    msg.style.display = '';
    msg.style.color = 'var(--text-3)';
    msg.textContent = T.nsfwChecking;
    btn.disabled = true;
    try {
      const dataUrl = await resizeImageToDataUrl(file);
      const safe = await isImageSafe(dataUrl);
      if (!safe) {
        msg.style.color = '#ef4444';
        msg.textContent = T.nsfwError;
        onImg(null);
        btn.dataset.hasImg = '0';
        btn.textContent = T.uploadPhoto;
        preview.textContent = preview.dataset.emoji || '🏋️';
        preview.style.background = preview.dataset.color || '#7c3aed';
      } else {
        msg.style.display = 'none';
        onImg(dataUrl);
        btn.dataset.hasImg = '1';
        btn.textContent = T.removePhoto;
        preview.innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
        preview.style.background = 'transparent';
      }
    } catch {
      msg.style.color = '#ef4444';
      msg.textContent = T.errServer;
    } finally {
      btn.disabled = false;
      e.target.value = '';
    }
  });
}

// ════════════════════════════════════════════════════════
//  STREAK CALCULATION
// ════════════════════════════════════════════════════════
// Rule: a streak is consecutive completed past weeks (Mon–Sun, not the current week)
// where the person has ≥1 entry of any type ('late' or 'skip').
// A completed week with zero entries breaks the streak.
// The ongoing current week is never counted for or against.
function calcStreak(personName, entries) {
  const currentMon = mondayOf(todayStr());
  const weeksWithEntry = new Set(
    entries
      .filter(e => e.person === personName && mondayOf(e.date) < currentMon)
      .map(e => mondayOf(e.date))
  );
  if (!weeksWithEntry.size) return 0;
  let streak = 0;
  let weekMon = addDays(currentMon, -7);
  while (weeksWithEntry.has(weekMon)) {
    streak++;
    weekMon = addDays(weekMon, -7);
  }
  return streak;
}

function getMyEffectiveMask() {
  const gymDays = data?.gymDays || '0000000';
  if (!userProfile || !data || gymDays.length !== 7) return gymDays;
  const me = data.people.find(p => p.id === userProfile.userId);
  const avail = me?.availDays;
  if (!avail || avail.length !== 7) return gymDays;
  let r = '';
  for (let i = 0; i < 7; i++) r += (gymDays[i] === '1' && avail[i] === '1') ? '1' : '0';
  return r;
}

function renderWeek() {
  if (!data) return;
  const mon = mondayOf(todayStr()), sun = sundayOf(mon);
  const allWeek   = data.entries.filter(e => e.date >= mon && e.date <= sun);
  const lateWeek  = allWeek.filter(e => (e.type || 'late') === 'late');
  const skipWeek  = allWeek.filter(e => e.type === 'skip');
  const totalMins = lateWeek.reduce((s, e) => s + e.mins, 0);

  const cEl = document.getElementById('s-count'), mEl = document.getElementById('s-mins');
  cEl.textContent = lateWeek.length; mEl.textContent = totalMins;
  cEl.classList.toggle('red', lateWeek.length > 0);

  const skipWrap = document.getElementById('skip-stat-wrap');
  skipWrap.classList.toggle('hidden', skipWeek.length === 0);
  if (skipWeek.length) document.getElementById('skip-stat-chip').textContent = `⊘ ${skipWeek.length} ${T.skipped}`;

  const emEl = document.getElementById('week-empty'), lEl = document.getElementById('week-list');
  const weekCard = document.getElementById('week-card');

  // Group entries by date
  const byDate = {};
  allWeek.forEach(e => { (byDate[e.date] = byDate[e.date] || []).push(e); });

  // All 7 week dates newest-first (Sun → Mon)
  const weekDates = [];
  for (let i = 6; i >= 0; i--) weekDates.push(addDays(mon, i));

  const mask = getMyEffectiveMask();
  // Visible: days with entries OR rest days (bit=0 in effective mask)
  const visibleDates = weekDates.filter(d => byDate[d] || !calDayScheduled(d, mask));

  if (!visibleDates.length) {
    emEl.style.display = '';
    lEl.innerHTML = '';
    weekCard.classList.add('card', 'glass');
    return;
  }
  emEl.style.display = 'none';
  weekCard.classList.remove('card', 'glass');

  let animIdx = 0;
  lEl.innerHTML = visibleDates.map(date => {
    const dayEntries = byDate[date];
    if (!dayEntries) {
      // Rest day — no entries for anyone on this day
      return `<div class="day-group glass day-rest"><div class="day-group-label">🌙 ${fmtFull(date)}</div><div class="rest-day-row">${T.restDay}</div></div>`;
    }
    const rows = dayEntries.map(e => {
      const isSkip   = e.type === 'skip';
      const isAttend = e.type === 'attend';
      const skipLabel = e.auto ? T.noShow : (T.reasonLabel(e.reason) || T.skipped);
      const badge  = isSkip
        ? `<div class="skip-badge">⊘ ${esc(skipLabel)}</div>`
        : isAttend
          ? `<div class="attend-badge">✓</div>`
          : `<div class="late-badge">${e.mins} ${T.minsShort}</div>`;
      const delay = animIdx++ * 45;
      return `
        <div class="entry animate" style="animation-delay:${delay}ms">
          ${personAvatar(e.person)}
          <div class="entry-info"><div class="entry-name">${esc(e.person)}</div></div>
          ${badge}
          ${adminMode ? `
          <button class="icon-btn edit-entry-btn" data-id="${esc(e.id)}" title="Edit">✎</button>
          <button class="icon-btn del-entry-btn" data-id="${esc(e.id)}">×</button>` : ''}
        </div>`;
    }).join('');
    return `<div class="day-group glass"><div class="day-group-label">${fmtFull(date)}</div>${rows}</div>`;
  }).join('');
}

function personAvatar(name, size) {
  size = size || 38;
  var p = (data.people || []).find(function(p) { return p.name.toLowerCase() === name.toLowerCase(); });
  if (!p) return '<div class="avatar">' + esc(initials(name)) + '</div>';
  if (p.avatarImg) return '<img src="' + esc(p.avatarImg) + '" style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;object-fit:cover;flex-shrink:0" alt="">';
  return '<div class="avatar" style="background:' + esc(p.avatarColor) + '22;font-size:' + Math.round(size * 0.54) + 'px;width:' + size + 'px;height:' + size + 'px">' + esc(p.avatarEmoji) + '</div>';
}

function renderHistory() {
  if (!data) return;
  const currentMon = mondayOf(todayStr());
  const weeks = {};
  data.entries.forEach(e => {
    const mon = mondayOf(e.date);
    if (mon === currentMon && !adminShowCurWeek) return;
    (weeks[mon] = weeks[mon] || []).push(e);
  });

  const root = document.getElementById('week-recap');
  const sorted = Object.keys(weeks).sort().reverse();

  if (!sorted.length) {
    root.innerHTML = `<div class="card glass"><div class="empty"><div class="empty-txt">${esc(T.emptyHistory)}</div></div></div>`;
    return;
  }

  const medals = ['1.','2.','3.'];

  // Pre-build per-week stats for comparison lookups
  const weekStats = sorted.map(mon => {
    const entries = weeks[mon];
    const late    = entries.filter(e => (e.type || 'late') === 'late');
    const skip    = entries.filter(e => e.type === 'skip');
    const attend  = entries.filter(e => e.type === 'attend');
    const ps = {};
    late.forEach(e => { ps[e.person] = ps[e.person] || {count:0,mins:0,skips:0,attends:0}; ps[e.person].count++; ps[e.person].mins += e.mins; });
    skip.forEach(e => { ps[e.person] = ps[e.person] || {count:0,mins:0,skips:0,attends:0}; ps[e.person].skips++; });
    attend.forEach(e => { ps[e.person] = ps[e.person] || {count:0,mins:0,skips:0,attends:0}; ps[e.person].attends++; });
    const byMins   = Object.entries(ps).filter(([,s]) => s.count > 0).sort((a,b) => b[1].mins-a[1].mins || b[1].count-a[1].count);
    const skipOnly = Object.entries(ps).filter(([,s]) => s.count === 0 && s.skips > 0);
    const totalLateMins = Object.values(ps).reduce((acc, s) => acc + s.mins, 0);
    const minsPerDay = [0,0,0,0,0,0,0];
    late.forEach(e => { const dow = new Date(e.date+'T12:00:00Z').getUTCDay(); minsPerDay[dow===0?6:dow-1] += e.mins; });
    const mostPunctual = Object.entries(ps).filter(([,s]) => s.attends > 0).sort((a,b) => b[1].attends-a[1].attends)[0] || null;
    return { mon, ps, byMins, skipOnly, totalLateMins, minsPerDay, mostPunctual };
  });

  const dayLabels = T.dayNames;

  root.innerHTML = weekStats.map(({ mon, ps, byMins, skipOnly, totalLateMins, minsPerDay, mostPunctual }, wi) => {
    const sun      = sundayOf(mon);
    const prevSt   = wi + 1 < weekStats.length ? weekStats[wi + 1] : null;
    const BASE     = wi * 60;

    // Hero
    const heroHtml = byMins.length ? `
      <div class="recap-hero confetti-host">
        <div class="recap-trophy-wrap"><span class="recap-trophy anim-trophy" style="animation-delay:${BASE+100}ms">★</span></div>
        <div class="recap-name anim-name" style="animation-delay:${BASE+270}ms">${esc(byMins[0][0])}</div>
        <div class="recap-role anim-fade-up" style="animation-delay:${BASE+400}ms">${esc(T.lateKing)}</div>
      </div>` : `
      <div class="recap-hero" style="padding:18px 18px 14px;text-align:center">
        <div style="font-size:36px;margin-bottom:6px">⊘</div>
        <div class="recap-name">${esc(T.allSkippedTitle)}</div>
      </div>`;

    // Ranked rows — use AvatarView equivalent
    const lateRows = byMins.map(([name, st], i) => {
      const skipTag = st.skips > 0 ? ` <span class="skip-badge" style="font-size:11px;padding:1px 7px">⊘${st.skips}</span>` : '';
      return `
        <div class="rank-row ${i===0?'rank-gold':''} anim-rank" style="animation-delay:${BASE+520+i*130}ms">
          <div class="rank-no">${medals[i] || (i+1)+'.'}</div>
          ${personAvatar(name)}
          <div class="entry-info">
            <div class="entry-name">${esc(name)}${skipTag}</div>
            <div class="entry-meta">${T.timesLate(st.count)}</div>
          </div>
          <div class="late-badge">${st.mins} ${T.minsShort}</div>
        </div>`;
    }).join('');

    const skipRows = skipOnly.map(([name, st], i) => `
      <div class="rank-row anim-rank" style="animation-delay:${BASE+520+(byMins.length+i)*130}ms">
        <div class="rank-no" style="color:var(--gold)">⊘</div>
        ${personAvatar(name)}
        <div class="entry-info">
          <div class="entry-name">${esc(name)}</div>
          <div class="entry-meta">${st.skips}× ${T.skipped}</div>
        </div>
        <div class="skip-badge">⊘ ${st.skips}</div>
      </div>`).join('');

    // Card A: trend chart (pure CSS bars, no external lib)
    const maxMins = Math.max(1, ...minsPerDay);
    const trendBars = minsPerDay.map((mins, i) => {
      const h = mins === 0 ? 2 : Math.max(4, Math.round(mins / maxMins * 72));
      return `<div class="trend-col">
        <div class="trend-bar ${mins===0?'trend-ghost':'trend-real'}" style="height:${h}px"></div>
        <div class="trend-day-lbl">${esc(dayLabels[i].charAt(0))}</div>
      </div>`;
    }).join('');
    const trendHtml = `<hr class="recap-divider">
      <div class="recap-trend">
        <div class="recap-trend-lbl">${esc(T.recapTrendTitle)}</div>
        <div class="trend-bars">${trendBars}</div>
      </div>`;

    // Card B: week comparison
    let compareHtml;
    if (prevSt) {
      const delta = totalLateMins - prevSt.totalLateMins;
      const arrow  = delta < 0 ? '↓' : delta === 0 ? '→' : '↑';
      const color  = delta < 0 ? 'var(--green)' : delta === 0 ? 'var(--gold)' : '#ef4444';
      const verdict = delta < 0 ? T.recapBetterWeek : delta === 0 ? T.recapSameWeek : T.recapWorseWeek;
      const deltaStr = delta < 0 ? `−${Math.abs(delta)} ${T.minsShort}` : delta === 0 ? `±0 ${T.minsShort}` : `+${delta} ${T.minsShort}`;
      compareHtml = `<hr class="recap-divider">
        <div class="recap-compare">
          <span class="recap-compare-arrow" style="color:${color}">${arrow}</span>
          <div>
            <div class="recap-compare-delta" style="color:${color}">${esc(deltaStr)}</div>
            <div class="recap-compare-verdict">${esc(verdict)}</div>
          </div>
        </div>`;
    } else {
      compareHtml = `<hr class="recap-divider">
        <div class="recap-compare">
          <span class="recap-compare-arrow" style="color:var(--text-3)">—</span>
          <div class="recap-compare-verdict">${esc(T.recapFirstWeek)}</div>
        </div>`;
    }

    // Card C: positive cards
    const improved = prevSt ? Object.entries(ps)
      .filter(([,s]) => s.count > 0)
      .map(([name, s]) => ({ name, delta: ((prevSt.ps[name]||{}).mins||0) - s.mins }))
      .filter(x => x.delta > 0)
      .sort((a,b) => b.delta - a.delta)[0] || null : null;

    let positiveHtml = '';
    if (mostPunctual || improved) {
      const rows = [];
      if (mostPunctual) {
        rows.push(`<div class="recap-pos-row">
          <span class="recap-pos-icon">🏅</span>
          ${personAvatar(mostPunctual[0], 32)}
          <div class="recap-pos-info">
            <div class="recap-pos-label">${esc(T.recapMostPunctual)}</div>
            <div class="recap-pos-name">${esc(mostPunctual[0])}</div>
          </div>
          <div class="recap-pos-meta">${esc(T.recapOnTime(mostPunctual[1].attends))}</div>
        </div>`);
      }
      if (improved) {
        rows.push(`<div class="recap-pos-row">
          <span class="recap-pos-icon">📈</span>
          ${personAvatar(improved.name, 32)}
          <div class="recap-pos-info">
            <div class="recap-pos-label">${esc(T.recapMostImproved)}</div>
            <div class="recap-pos-name">${esc(improved.name)}</div>
          </div>
          <div class="recap-pos-meta">${esc(T.recapImprovedBy(improved.delta))}</div>
        </div>`);
      }
      positiveHtml = `<hr class="recap-divider"><div class="recap-positive">${rows.join('')}</div>`;
    }

    return `
      <div class="week-block anim-week" style="animation-delay:${BASE}ms">
        <div class="sec-label anim-fade-up" style="animation-delay:${BASE+30}ms">${T.weekRange(mon,sun)}</div>
        <div class="card glass">
          ${heroHtml}
          ${lateRows}
          ${skipRows}
          ${trendHtml}
          ${compareHtml}
          ${positiveHtml}
        </div>
      </div>`;
  }).join('');

  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('.confetti-host').forEach(host => spawnConfetti(host));
      document.querySelectorAll('.anim-trophy').forEach(el => {
        el.addEventListener('animationend', () => { el.classList.add('done'); }, { once: true });
      });
    }, 380);
  });
}

// ════════════════════════════════════════════════════════
//  CALENDAR STATE + RENDER
// ════════════════════════════════════════════════════════
let calYear = new Date().getFullYear(), calMonthIdx = new Date().getMonth();

function calDayScheduled(dateStr, mask) {
  if (!mask || mask === '0000000') return false;
  const dow = new Date(dateStr + 'T12:00:00Z').getUTCDay();
  const idx = dow === 0 ? 6 : dow - 1;
  return mask[idx] === '1';
}

function renderCalendar() {
  if (!data) return;
  const calEl = document.getElementById('cal-grid');
  if (!calEl) return;

  // Day map: date -> {late, skip, attend, mins}
  const dayMap = {};
  (data.entries || []).forEach(e => {
    if (!dayMap[e.date]) dayMap[e.date] = { late:0, skip:0, attend:0, mins:0 };
    const t = e.type || 'late';
    if (t === 'late') { dayMap[e.date].late++; dayMap[e.date].attend++; dayMap[e.date].mins += e.mins; }
    else if (t === 'skip') dayMap[e.date].skip++;
    else if (t === 'attend') dayMap[e.date].attend++;
  });

  // Month label
  const firstOfMonth = new Date(calYear, calMonthIdx, 1);
  const labelEl = document.getElementById('cal-month-label');
  if (labelEl) labelEl.textContent = firstOfMonth.toLocaleDateString(navigator.language, { month:'long', year:'numeric' });

  // Weekday headers (Mon-first)
  const wdEl = document.getElementById('cal-weekdays');
  if (wdEl) {
    // Jan 1 2024 is a Monday — iterate 0-6 for Mon-Sun
    wdEl.innerHTML = Array.from({length:7}, (_,i) =>
      `<div class="cal-wd">${esc(new Date(2024,0,1+i).toLocaleDateString(navigator.language,{weekday:'narrow'}))}</div>`
    ).join('');
  }

  // Grid cells
  const daysInMonth = new Date(calYear, calMonthIdx + 1, 0).getDate();
  const firstWeekday = (firstOfMonth.getDay() + 6) % 7; // Mon=0
  const today = todayStr();

  const gymMask = data.gymDays || '0000000';

  let cells = Array.from({length:firstWeekday}, () => '<div class="cal-cell"></div>').join('');
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${pad(calMonthIdx+1)}-${pad(d)}`;
    const info = dayMap[dateStr];
    const isToday = dateStr === today;
    const isPast = dateStr < today;
    const isScheduled = calDayScheduled(dateStr, gymMask);
    let cls = 'cal-cell' + (isToday ? ' cal-today' : '');
    let style = '', marker = '';
    if (info) {
      cls += ' cal-has-entries';
      if (info.late > 0) {
        const alpha = Math.min(0.48, 0.12 + info.late * 0.09 + info.mins * 0.002).toFixed(2);
        style = `background:rgba(239,68,68,${alpha})`;
        marker = `<span class="cal-dot cal-dot-late">${info.late}</span>`;
        cls += ' cal-late';
      } else if (info.attend > 0) {
        style = `background:rgba(34,197,94,.18)`;
        marker = `<span class="cal-dot cal-dot-attend">&#x2713;</span>`;
        cls += ' cal-attend-only';
      } else if (info.skip > 0) {
        style = `background:rgba(245,158,11,.18)`;
        marker = `<span class="cal-dot cal-dot-skip">&#x2298;</span>`;
      }
    } else if (isScheduled && isPast) {
      marker = `<span class="cal-dot cal-dot-miss">&middot;</span>`;
    } else if (!isScheduled) {
      // Rest day (not a gym day and no entry logged)
      if (isPast || isToday) {
        cls += ' cal-rest-past';
      } else {
        marker = `<span class="cal-dot cal-dot-rest">&ndash;</span>`;
      }
    }
    cells += `<div class="${cls}" data-date="${dateStr}"${style ? ` style="${style}"` : ''}>` +
      `<span class="cal-day-num">${d}</span>${marker}</div>`;
  }
  calEl.innerHTML = cells;
}

// Nav indicator — slides behind the active tab button
function updateNavIndicator() {
  const bar = document.querySelector('.bottom-nav .nav-bar');
  if (!bar) return;
  const indicator = bar.querySelector('.nav-indicator');
  if (!indicator) return;
  const activeBtn = bar.querySelector('.nav-btn.active');
  if (!activeBtn) return;
  const barRect = bar.getBoundingClientRect();
  const btnRect = activeBtn.getBoundingClientRect();
  indicator.style.width  = btnRect.width  + 'px';
  indicator.style.transform = `translateX(${btnRect.left - barRect.left}px)`;
}

async function refresh() {
  if (!group) return;
  try {
    data = await api.getGroup(group.id);
    renderAll();
  } catch(e) {
    if (e.status===404) { clearGroup(); stopPolling(); showScreen('landing'); }
  }
}
function startPolling() { stopPolling(); pollTimer = setInterval(refresh, 8000); }
function stopPolling()  { if (pollTimer) { clearInterval(pollTimer); pollTimer=null; } }

async function enterGroup(g) {
  saveGroup(g);
  showLoading(true);
  try {
    data = await api.getGroup(g.id);
  } catch {
    clearGroup(); showLoading(false); showScreen('landing'); return;
  }
  // Sync isCreator from server (may have changed)
  if (userProfile) {
    const me = data.people.find(p => p.id === userProfile.userId);
    if (!me) {
      clearUser(g.id); userProfile = null;
      showLoading(false); showScreen('landing');
      setTimeout(() => showToast(T.kicked), 300);
      return;
    }
    userProfile.isCreator = me.isCreator;
    if ('avatarImg' in me) userProfile.avatarImg = me.avatarImg;
    saveUser(g.id, userProfile);
  }
  showLoading(false);
  updateMyProfileBtn();
  applyI18n(); renderAll(); startPolling(); showScreen('app');
  runOpeningSequence();
  maybeShowNotifPrimer();
}

function updateMyProfileBtn() {
  const btn = document.getElementById('my-profile-btn');
  if (!userProfile) { btn.classList.remove('visible'); return; }
  btn.classList.add('visible');
  if (userProfile.avatarImg && userProfile.avatarImg.startsWith('data:image/')) {
    btn.textContent = '';
    btn.style.backgroundImage = `url(${userProfile.avatarImg})`;
    btn.style.backgroundSize = 'cover';
    btn.style.backgroundPosition = 'center';
    btn.style.color = 'transparent';
  } else {
    btn.textContent = userProfile.avatarEmoji;
    btn.style.backgroundImage = '';
    btn.style.background = userProfile.avatarColor;
    btn.style.color = '';
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+name).classList.add('active');
  document.querySelectorAll(`.nav-btn[data-tab="${name}"]`).forEach(b=>b.classList.add('active'));
  document.getElementById('fab').classList.toggle('hidden', name==='people' || name==='recap');

  if (name === 'recap') renderHistory();
}

let _calDayDate = null; // currently viewed date in cal-day panel
let _calAddType = 'attend'; // selected type in admin add form

function openCalDay(date) {
  _calDayDate = date;
  const entries = (data.entries || []).filter(e => e.date === date);
  const titleEl = document.getElementById('cal-day-title');
  const listEl  = document.getElementById('cal-day-list');
  if (titleEl) titleEl.textContent = fmtFull(date);
  if (listEl) {
    listEl.innerHTML = entries.map(e => {
      const isSkip = e.type === 'skip';
      const isAttendCal = e.type === 'attend';
      const badge = isSkip
        ? `<span class="skip-badge">&#x2298; ${esc(T.reasonLabel(e.reason)||T.skipped)}</span>`
        : isAttendCal
          ? `<span class="attend-badge">✓</span>`
          : `<span class="late-badge">${e.mins} ${T.minsShort}</span>`;
      const adminControls = adminMode ? `
        <button class="admin-del-entry-btn" data-id="${esc(e.id)}" style="background:none;border:none;color:var(--red,#ef4444);cursor:pointer;padding:4px 6px;font-size:15px;" title="${esc(T.admCalAddEntry)}">✕</button>` : '';
      return `<div class="entry" style="margin-bottom:8px">
        <div class="avatar">${esc(initials(e.person))}</div>
        <div class="entry-info"><div class="entry-name">${esc(e.person)}</div></div>
        ${badge}${adminControls}
      </div>`;
    }).join('') || (adminMode ? '' : `<div style="color:var(--text-2);text-align:center;padding:16px 0"></div>`);
  }

  // Admin add-entry form
  const addSection = document.getElementById('cal-day-admin-add');
  if (addSection) {
    addSection.style.display = adminMode ? '' : 'none';
    if (adminMode) {
      // Populate person select
      const sel = document.getElementById('cal-add-person');
      sel.innerHTML = (data.people || []).map(p => `<option value="${esc(p.name)}">${esc(p.name)}</option>`).join('');
      // Reset add type
      _calAddType = 'attend';
      document.getElementById('cal-add-mins-wrap').style.display = 'none';
      document.querySelectorAll('#cal-day-admin-add .mode-btn').forEach(b => {

//  DAY PICKER HELPER
// ════════════════════════════════════════════════════════
function buildDayPicker(containerId, initialMask, disabledMask) {
  const el = document.getElementById(containerId);
  el.innerHTML = T.dayNames.map((name, i) => {
    const isActive = initialMask ? initialMask[i] === '1' : true;
    const isDisabled = disabledMask ? disabledMask[i] !== '1' : false;
    return `<button type="button" class="day-btn${isActive ? ' active' : ''}" data-idx="${i}"${isDisabled ? ' disabled style="opacity:.3"' : ''}>${esc(name)}</button>`;
  }).join('');
  el.querySelectorAll('.day-btn:not([disabled])').forEach(btn => {
    btn.addEventListener('click', () => btn.classList.toggle('active'));
  });
}

function getDayMask(containerId) {
  const el = document.getElementById(containerId);
  return Array.from(el.querySelectorAll('.day-btn')).map(b => b.classList.contains('active') ? '1' : '0').join('');
}

  const person   = document.getElementById('ml-person').value;

  errEl.textContent = '';
  document.getElementById('ml-save').disabled = true;
  try {
    if (mlMode === 'attend') {
      const date = document.getElementById('ml-attend-date').value;
      if (!person || !date) { errEl.textContent = '⚠'; return; }
      const isSelfToday = person === userProfile?.name && date === todayStr();
      const lateness = isSelfToday ? computeCheckinLateness() : null;
      const wasExtended = myStreakInfo()?.extendedToday;
      const res = await api.addEntry(data.id, lateness?.isLate
        ? { person, date, type: 'late', mins: lateness.minsOff }
        : { person, date, type: 'attend' });
      closePage('modal-late');
      await refresh();
      const info = myStreakInfo();
      const finish = () => {
        if (info && isSelfToday && !wasExtended) {
          if (res.chest) window._saNext = () => showChest(res.chest);
          showStreakAnim(info.streak);
        } else {
          showToast(lateness ? (lateness.isLate ? T.toastLate : T.toastOnTime) : T.toastAttendSaved);
          if (res.chest) showChest(res.chest);
        }
      };
      if (lateness?.isLate) {
        window._laNext = finish;
        showLateAnim(lateness.minsOff);
      } else {
        finish();
      }
    } else if (mlMode === 'late') {
      const date = document.getElementById('ml-date').value;
      const mins = parseInt(document.getElementById('ml-mins').value);
      if (!person || !date || isNaN(mins) || mins < 1) { errEl.textContent = '⚠'; return; }
      const wasExtended = myStreakInfo()?.extendedToday;
      await api.addEntry(data.id, { person, date, mins, type: 'late' });
      closePage('modal-late');
      await refresh();
      const info = myStreakInfo();
      if (info && person === userProfile?.name && date === todayStr() && !wasExtended) {
        showStreakAnim(info.streak);
      } else {
        showToast(T.toastSaved);
      }
    } else {
      const date = document.getElementById('ml-skip-date').value;
      if (!person || !date) { errEl.textContent = '⚠'; return; }
      await api.addEntry(data.id, { person, date, type: 'skip', reason: mlSelReason });
      closePage('modal-late');
      await refresh();
      showToast(T.toastSkipSaved);
    }
  } catch { errEl.textContent = T.errServer; }
  finally  { document.getElementById('ml-save').disabled = false; }
});

function openEditEntry(entryId) {
  if (!adminMode || !adminPassword || !data) return;
  const e = data.entries.find(x => x.id === entryId);
  if (!e) return;
  eeEditingId = entryId;
  document.getElementById('ee-title').textContent = `${T.eeTitle} — ${e.person}`;
  document.getElementById('ee-error').textContent = '';
  document.getElementById('ee-attend-date').value = e.date;
  document.getElementById('ee-date').value        = e.date;
  document.getElementById('ee-skip-date').value    = e.date;
  document.getElementById('ee-mins').value         = e.type === 'late' ? e.mins : 10;
  eeSelReason = e.type === 'skip' ? (e.reason || null) : null;
  const chips = document.getElementById('ee-reason-chips');
  chips.innerHTML = SKIP_REASONS.map(r =>
    `<button class="reason-chip${r === eeSelReason ? ' sel' : ''}" data-reason="${r}">${esc(T.reasons[r])}</button>`
  ).join('');
  chips.querySelectorAll('.reason-chip').forEach(c => {
    c.addEventListener('click', () => {
      const already = c.classList.contains('sel');
      chips.querySelectorAll('.reason-chip').forEach(x => x.classList.remove('sel'));
      if (!already) { c.classList.add('sel'); eeSelReason = c.dataset.reason; }
      else eeSelReason = null;
    });

    let body;

      const date = document.getElementById('ee-attend-date').value;
      if (!date) { errEl.textContent = '⚠'; return; }

async function switchToGroup(g) {
  if (group && g.id === group.id) return;
  // Save current group's user profile separately, then switch
  stopPolling();
  loadUser(g.id);
  try {
    showLoading(true);
    const newData = await api.getGroup(g.id);
    group = g;
    localStorage.setItem('gymGroup', JSON.stringify(g));
    data = newData;
    // If no user profile for this group, open profile setup
    if (!userProfile) {
      pendingGroup = g;
      showLoading(false); applyI18n(); showScreen('landing'); openProfileSetup();
      return;
    }
    const me = data.people.find(p => p.id === userProfile.userId);
    if (!me) {
      clearUser(g.id); userProfile = null;
      showLoading(false); showScreen('landing');
      setTimeout(() => showToast(T.kicked), 300); return;
    }
    userProfile.isCreator = me.isCreator;
    saveUser(g.id, userProfile);
    showLoading(false);
    updateMyProfileBtn(); applyI18n(); renderAll(); startPolling(); showScreen('app');
    showToast(g.name);
  } catch { showLoading(false); showToast(T.errServer); }
}

function buildGroupListHTML(all) {
  return all.map(g => {
    const isActive = group && g.id === group.id;
    return `<div class="group-list-item" data-gid="${esc(g.id)}">
      <div class="group-list-icon">🏋️</div>
      <div style="flex:1;min-width:0">
        <div class="group-list-name">${esc(g.name)}</div>
        <div class="group-list-code">${esc(g.code)}</div>
      </div>
      ${isActive ? `<span class="group-list-active">${T.mgsActive}</span>` : `<span class="group-list-active" style="color:var(--text-3)">${T.mgsSwitch}</span>`}
    </div>`;
  }).join('');
}

let viewingUserId = null;

function openProfileView(userId) {
  viewingUserId = userId;
  const user = data?.people?.find(p => p.id === userId);
  if (!user) return;

  const isOwnProfile   = userProfile && userProfile.userId === userId;
  const isCreatorView  = userProfile?.isCreator && !isOwnProfile;
  const isAdminView    = adminMode && !isOwnProfile;

  setAvatarEl(document.getElementById('pv-avatar'), user);
  document.getElementById('pv-name').textContent = user.name;

  const badge = document.getElementById('pv-creator-badge');
  badge.style.display = user.isCreator ? '' : 'none';

  const userLate = (data?.entries||[]).filter(e => e.person === user.name && (e.type||'late') === 'late');
  document.getElementById('pv-stat-count').textContent = userLate.length;
  document.getElementById('pv-stat-mins').textContent  = userLate.reduce((s,e)=>s+e.mins,0);

  // Gym days chips
  const gymDaysMask = user.availDays || data?.gymDays || '1111100';
  const chipsEl = document.getElementById('pv-day-chips');
  chipsEl.innerHTML = T.dayNames.map((name, i) =>
    gymDaysMask[i] === '1' ? `<span class="pv-day-chip">${name}</span>` : ''
  ).join('');

  const ownSection  = document.getElementById('pv-own-section');
  const kickSection = document.getElementById('pv-kick-section');
  ownSection.style.display  = isOwnProfile  ? '' : 'none';
  kickSection.style.display = (isCreatorView || isAdminView) ? '' : 'none';

  if (isOwnProfile && userProfile.recoveryCode) {
    const rc = userProfile.recoveryCode;
    const rcEl = document.getElementById('pv-rc-value');
    rcEl.textContent = rc;
    rcEl.classList.remove('revealed');
    document.getElementById('pv-rc-reveal').textContent = T.pvReveal;
    document.getElementById('pv-rc-reveal').onclick = () => {
      const revealed = rcEl.classList.toggle('revealed');
      document.getElementById('pv-rc-reveal').textContent = revealed ? T.pvHide : T.pvReveal;
    };
    rcEl.onclick = () => {
      if (rcEl.classList.contains('revealed')) {
        copyToClipboard(rc);
        showToast(T.pvRcCopied);
      } else {
        rcEl.classList.add('revealed');
        document.getElementById('pv-rc-reveal').textContent = T.pvHide;
      }
    };
  }

  openPage('modal-profile-view');
}

function formatDuration(ms) {
  const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000), d = Math.floor(ms / 86400000);
  if (d >= 1) return `${d}d ${h % 24}h`;
  return `${h}h ${m}m`;
}

function openSettings() {
  if (!data) return;

  const availDays = me?.availDays || gymDays;
  const availEditedAt = me?.availEditedAt || null;
  const isCreator = userProfile?.isCreator;
  const canEditGroup = isCreator || adminMode;

  // Gym days section (creator or admin)

  if (canEditGroup) {
    buildDayPicker('mset-gym-picker', gymDays);

  }

  // Fixed check-in time (Beta, creator or admin)
  const fixedSection = document.getElementById('mset-fixedtime-section');
  fixedSection.classList.toggle('hidden', !canEditGroup);
  if (canEditGroup) {
    document.getElementById('mset-fixedtime-toggle').checked = !!data?.fixedCheckinEnabled;
    document.getElementById('mset-fixedtime-hint').textContent = '';
  }

  // Gym location section (creator or admin)
  const mapSection = document.getElementById('mset-map-section');
  mapSection.classList.toggle('hidden', !canEditGroup);
  if (canEditGroup) {
    // Initialize Leaflet map lazily after modal is visible
    setTimeout(() => { initLeafletMap(); setTimeout(() => _leafletMap && _leafletMap.invalidateSize(), 80); }, 400);
  }

  // Avail days (current user, within gym days mask)
  buildDayPicker('mset-avail-picker', availDays, gymDays);

  // Lock check
  const lockEl = document.getElementById('mset-avail-lock');
  const saveBtn = document.getElementById('mset-avail-save');
  const LOCK_OPEN_MS = 3600000, LOCK_DURATION_MS = 30 * 86400000;
  if (availEditedAt) {
    const elapsed = Date.now() - availEditedAt;
    if (elapsed > LOCK_OPEN_MS && elapsed < LOCK_DURATION_MS) {
      const remaining = LOCK_DURATION_MS - elapsed;
      lockEl.textContent = T.availLocked(formatDuration(remaining));
      lockEl.classList.remove('hidden');
      saveBtn.disabled = true;
    } else {
      lockEl.classList.add('hidden');
      saveBtn.disabled = false;
    }
  } else {
    lockEl.classList.add('hidden');
    saveBtn.disabled = false;
  }
  document.getElementById('mset-avail-error').textContent = '';

  // Geo toggle — visible to all users
  const geoEnabled = localStorage.getItem('gymGeoEnabled') !== '0';
  document.getElementById('mset-geo-toggle').checked = geoEnabled;
  document.getElementById('mset-geo-hint').textContent = '';
  // Show geo section only if gym location is set
  document.getElementById('mset-geo-section').style.display = data?.gymLat ? '' : 'none';
  document.getElementById('mset-leave-btn').textContent = T.leaveGroup;

  // Notification preferences
  const prefs = loadNotifPrefs();
  document.getElementById('mset-notif-reminders').checked = prefs.notifReminders !== false;
  document.getElementById('mset-reminder-time').value = prefs.reminderTime || '09:00';
  document.getElementById('mset-notif-streak').checked = prefs.notifStreak !== false;
  document.getElementById('mset-notif-activity').checked = prefs.notifActivity !== false;
  document.getElementById('mset-quiet-start').value = prefs.quietStart || '22:00';
  document.getElementById('mset-quiet-end').value = prefs.quietEnd || '08:00';
  // Member filter list
  const membersList = document.getElementById('mset-notif-members-list');
  membersList.innerHTML = '';
  const notifMembers = prefs.notifMembers || null; // null = everyone
  if (data?.people) {
    for (const p of data.people) {
      if (userProfile && p.id === userProfile.userId) continue;
      const row = document.createElement('label');
      row.className = 'notif-member-row';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = p.id;
      cb.checked = !notifMembers || notifMembers.includes(p.id);
      const name = document.createElement('span');
      name.className = 'notif-member-name';
      name.textContent = p.name;
      row.appendChild(cb); row.appendChild(name);
      membersList.appendChild(row);
    }
  }
  // Show/hide notif section based on push support
  document.getElementById('mset-notif-section').style.display =
    ('Notification' in window) ? '' : 'none';

  openPage('modal-settings');
}

// ════════════════════════════════════════════════════════
function initLeafletMap() {
  if (typeof L === 'undefined') return; // Leaflet not loaded
  const container = document.getElementById('mset-map-container');
  if (!container) return;

  const defaultLat = data?.gymLat ?? 48.137;
  const defaultLng = data?.gymLng ?? 11.576;
  const defaultRadius = data?.gymRadius ?? 150;

  document.getElementById('mset-radius-slider').value = defaultRadius;
  document.getElementById('mset-radius-val').textContent = defaultRadius + 'm';

  if (_leafletMap) {
    _leafletMap.setView([defaultLat, defaultLng], 15);
    _leafletMarker.setLatLng([defaultLat, defaultLng]);
    _leafletCircle.setLatLng([defaultLat, defaultLng]).setRadius(defaultRadius);
    _leafletMap.invalidateSize();
    return;
  }

  _leafletMap = L.map(container, { zoomControl: true }).setView([defaultLat, defaultLng], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(_leafletMap);

  _leafletMarker = L.marker([defaultLat, defaultLng], { draggable: true }).addTo(_leafletMap);
  _leafletCircle = L.circle([defaultLat, defaultLng], { radius: defaultRadius, color: '#7c3aed', fillOpacity: 0.15 }).addTo(_leafletMap);

  _leafletMarker.on('dragend', () => {
    const ll = _leafletMarker.getLatLng();
    _leafletCircle.setLatLng(ll);
  });

  const slider = document.getElementById('mset-radius-slider');
  const valEl  = document.getElementById('mset-radius-val');
  slider.addEventListener('input', () => {
    valEl.textContent = slider.value + 'm';
    _leafletCircle.setRadius(Number(slider.value));
  });

  setTimeout(() => _leafletMap && _leafletMap.invalidateSize(), 100);
}

}

// ════════════════════════════════════════════════════════
//  FIXED CHECK-IN TIME WINDOW (Beta)
// ════════════════════════════════════════════════════════
// Returns null if the beta feature isn't active for today, else { isLate, minsOff }.
// On-time = within ±10 minutes of the group's fixed check-in time for today.
function computeCheckinLateness() {
  if (!data?.fixedCheckinEnabled) return null;
  const today = todayStr();
  if (data.checkinTimeDate !== today || !data.checkinTime) return null;
  const [h, m] = data.checkinTime.split(':').map(Number);
  const now = new Date();
  const targetMins = h * 60 + m;
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const diff = nowMins - targetMins;
  return { isLate: Math.abs(diff) > 10, minsOff: Math.abs(diff) };
}

function showLateAnim(minsOff) {
  document.getElementById('la-sub').textContent = T.laSub(minsOff);
  document.getElementById('late-anim').classList.remove('hidden');

// Shared submit path for a self/today attendance check-in (geo-prompt buttons).
// Applies the fixed-checkin-time window (if active) and plays the late-checkin
// animation before continuing into the normal streak-anim/chest/toast flow.
async function submitSelfAttendEntry() {
  if (!userProfile || !group || !data) return;
  try {
    const lateness = computeCheckinLateness();
    const wasExtended = myStreakInfo()?.extendedToday;
    const res = await api.addEntry(data.id, lateness?.isLate
      ? { type: 'late', date: todayStr(), person: userProfile.name, mins: lateness.minsOff }
      : { type: 'attend', date: todayStr(), person: userProfile.name });
    await refresh();
    const info = myStreakInfo();
    const finish = () => {
      if (info && !wasExtended) {
        if (res.chest) window._saNext = () => showChest(res.chest);
        showStreakAnim(info.streak);
      } else {
        if (res.chest) showChest(res.chest);
        showToast(lateness ? (lateness.isLate ? T.toastLate : T.toastOnTime) : T.toastAttendSaved);
      }
    };
    if (lateness?.isLate) {
      window._laNext = finish;
      showLateAnim(lateness.minsOff);
    } else {
      finish();
    }
  } catch { showToast(T.errServer); }
}

// ════════════════════════════════════════════════════════
//  GEO CHECK-IN PROMPT
// ════════════════════════════════════════════════════════
function haversineMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000; // Earth radius in meters
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180;
  const Δλ = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function showGeoPrompt() {
  const isGymDay = calDayScheduled(todayStr(), data?.gymDays || '0000000');
  document.getElementById('gp-icon').textContent = isGymDay ? '📍' : '🚫';
  document.getElementById('gp-title').textContent = isGymDay ? T.gpTitle : T.gpNoGymDayTitle;
  document.getElementById('gp-sub').textContent = isGymDay ? T.gpSub : T.gpNoGymDaySub;
  document.getElementById('gp-btns-gymday').classList.toggle('hidden', !isGymDay);
  document.getElementById('gp-btns-nogymday').classList.toggle('hidden', isGymDay);
  document.getElementById('geo-prompt').classList.remove('hidden');
  localStorage.setItem('gymGeoPromptSeen_' + todayStr(), '1');
}

function checkGeoAndPrompt(force = false) {
  if (!data?.gymLat || !data?.gymLng) return; // no location set
  if (!force && localStorage.getItem('gymGeoEnabled') === '0') return; // user disabled
  if (!force) {
    const today = todayStr();
    if (localStorage.getItem('gymGeoPromptSeen_' + today)) return;
    // Don't prompt if already checked in today
    const alreadyIn = (data?.entries||[]).some(e => {
      const me = userProfile?.name;
      return me && e.person === me && e.date === today && (e.type === 'attend' || e.type === 'late');
    });
    if (alreadyIn) return;
  }
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const dist = haversineMeters(pos.coords.latitude, pos.coords.longitude, data.gymLat, data.gymLng);
    const radius = data.gymRadius ?? 150;
    if (dist <= radius || force) {
      showGeoPrompt();
    }
  }, () => { /* permission denied or error — silently skip */ }, { timeout: 6000, maximumAge: 30000 });
}

// ════════════════════════════════════════════════════════
//  NOTIFICATION BUBBLE SYSTEM
// ════════════════════════════════════════════════════════
let _bubbleQueue = [];
let _pendingBubbleKind = null;
let _replayHintTimer = null;

function _showNotifBubble({ glyph, t1, t2, kind }) {
  _pendingBubbleKind = kind;
  document.getElementById('notif-glyph').textContent = glyph;
  document.getElementById('notif-t1').textContent = t1;
  document.getElementById('notif-t2').textContent = t2;
  const el = document.getElementById('notif-bubble');
  el.classList.add('show');
}

function _dismissNotifBubble() {
  document.getElementById('notif-bubble').classList.remove('show');
  _pendingBubbleKind = null;
}

function _advanceBubbleQueue() {
  if (_bubbleQueue.length === 0) {
    checkGeoAndPrompt();
    return;
  }
  const b = _bubbleQueue.shift();
  setTimeout(() => _showNotifBubble(b), 120);
}

function _showReplayHint(kind) {
  const el = document.getElementById('replay-hint');
  const isRecap = kind === 'wrapped';
  el.textContent = isRecap ? T.replayHintRecap : T.replayHintCheckin;
  el.style.display = '';
  el.onclick = isRecap ? () => {
    el.classList.remove('show');
    setTimeout(() => { el.style.display = 'none'; }, 250);
    switchTab('recap');
  } : null;
  requestAnimationFrame(() => el.classList.add('show'));
  clearTimeout(_replayHintTimer);
  _replayHintTimer = setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => { el.style.display = 'none'; }, 250);
  }, 6000);
}

// Bubble tap/dismiss wiring
document.getElementById('notif-bubble').addEventListener('click', e => {
  if (!_pendingBubbleKind) return;
  if (e.target.id === 'notif-x' || e.target.closest('#notif-x')) {
    // Dismiss → show hint, advance queue
    const kind = _pendingBubbleKind;
    _dismissNotifBubble();
    _showReplayHint(kind);
    _advanceBubbleQueue();
  } else {
    // Tap → play full animation
    const kind = _pendingBubbleKind;
    _dismissNotifBubble();
    if (kind === 'wrapped') showWrapped();
    else if (kind === 'hype') showDailyHype();
    else if (kind === 'geo') showGeoPrompt();
    _advanceBubbleQueue();
  }
});

// ════════════════════════════════════════════════════════
//  OPENING SEQUENCE (Wrapped → Daily Hype → Geo Prompt)
// ════════════════════════════════════════════════════════
function runOpeningSequence() {
  _bubbleQueue = [];
  if (shouldShowWrapped()) {
    _bubbleQueue.push({ glyph: '🎉', t1: T.bubbleWrappedTitle, t2: T.bubbleWrappedSub, kind: 'wrapped' });
  }
  if (shouldShowDailyHype()) {
    _bubbleQueue.push({ glyph: '💪', t1: T.bubbleHypeTitle, t2: T.bubbleHypeSub, kind: 'hype' });
  }
  if (!_bubbleQueue.length) { checkGeoAndPrompt(); return; }
  setTimeout(_advanceBubbleQueue, 600);
}

// ════════════════════════════════════════════════════════
//  WRAPPED ENGINE
// ════════════════════════════════════════════════════════
let wSlides = [], wIdx = 0, wTimer = null;

function shouldShowWrapped() {
  const mon = mondayOf(todayStr());
  if (localStorage.getItem('gymWrappedSeen') === mon) return false;
  return (data?.entries || []).some(e => mondayOf(e.date) === mon && (e.type || 'late') === 'late');
}

function showWrapped(force = false) {
  const slides = buildWrappedSlides(force);
  if (!slides?.length) { showToast(T.noMembersForTest); return; }
  wSlides = slides;
  wIdx = 0;

  // Build progress bar
  const prog = document.getElementById('w-prog');
  prog.innerHTML = slides.map((_,i) =>
    `<div class="w-seg"><div class="w-fill" id="wf${i}"></div></div>`
  ).join('');

  document.getElementById('wrapped').classList.remove('hidden');
  wShowSlide(0);

  if (!force) localStorage.setItem('gymWrappedSeen', mondayOf(todayStr()));
}

function wShowSlide(idx) {
  clearTimeout(wTimer);
  wIdx = idx;
  const slide = wSlides[idx];

  // Fill past segments instantly
  wSlides.forEach((_, i) => {
    const f = document.getElementById(`wf${i}`);
    if (!f) return;
    f.style.transition = 'none';
    f.style.width = i < idx ? '100%' : '0%';
  });

  // Render
  const stage = document.getElementById('w-stage');
  stage.innerHTML = `<div class="w-slide w-in" style="background:${slide.bg}">${slide.html}</div>`;

  // Wire close button if present
  const cb = stage.querySelector('#w-close');
  if (cb) cb.addEventListener('click', wClose);

  // Count-up animation
  if (slide.countId && slide.countTarget != null) {
    setTimeout(() => {
      const el = document.getElementById(slide.countId);
      if (el) wCount(el, slide.countTarget);
    }, 280);
  }

  // Progress + auto-advance
  if (!slide.isLast) {
    setTimeout(() => {
      const f = document.getElementById(`wf${idx}`);
      if (f) { f.style.transition = `width ${slide.dur||4}s linear`; f.style.width = '100%'; }
      wTimer = setTimeout(() => wAdvance(1), (slide.dur||4) * 1000);
    }, 60);
  } else {
    const f = document.getElementById(`wf${idx}`);
    if (f) { f.style.transition = 'none'; f.style.width = '100%'; }
  }
}

function wAdvance(dir) {
  clearTimeout(wTimer);
  const next = wIdx + dir;
  if (next < 0) {
    // Shake on back-on-first
    const s = document.querySelector('.w-slide');
    if (s) { s.style.animation = 'w-shake .3s ease'; setTimeout(() => s.style.animation='', 350); }
    return;
  }
  if (next >= wSlides.length) { wClose(); return; }

  // Quick exit anim then enter next
  const cur = document.querySelector('.w-slide');
  if (cur) {
    cur.classList.remove('w-in');
    cur.classList.add('w-out');
    setTimeout(() => wShowSlide(next), 200);
  } else {
    wShowSlide(next);
  }
}

function wClose() {
  clearTimeout(wTimer);
  document.getElementById('wrapped').classList.add('hidden');
  // Advance opening sequence if running
  if (window._seqWrappedNext) {
    const fn = window._seqWrappedNext;
    window._seqWrappedNext = null;
    fn();
  }
}

function wCount(el, target) {
  const dur = Math.min(1400, 500 + target * 25);
  const t0 = Date.now();
  const tick = () => {
    const p = Math.min((Date.now() - t0) / dur, 1);
    const e = 1 - Math.pow(1 - p, 3); // ease-out cubic
    el.textContent = Math.round(target * e);
    if (p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

// Build slides — anyWeek=true uses the most recent week with data (for admin replay)
function buildWrappedSlides(anyWeek = false) {
  const allEntries = data?.entries || [];
  let mon, sun;

  if (anyWeek) {
    const mons = [...new Set(allEntries.map(e => mondayOf(e.date)))].sort().reverse();
    if (!mons.length) return null;
    mon = mons[0];
  } else {
    mon = mondayOf(todayStr());
  }
  sun = sundayOf(mon);

  const weekEntries = allEntries.filter(e => e.date >= mon && e.date <= sun);
  const entries = weekEntries.filter(e => (e.type || 'late') === 'late');
  if (!entries.length) return null;

  const totalLate = entries.length;
  const totalMins = entries.reduce((s,e) => s + e.mins, 0);
  const hours = Math.floor(totalMins / 60), remMins = totalMins % 60;

  const ps = {};
  entries.forEach(e => { ps[e.person] = ps[e.person]||{count:0,mins:0}; ps[e.person].count++; ps[e.person].mins+=e.mins; });
  const ranking = Object.entries(ps).sort((a,b) => b[1].mins - a[1].mins);
  const [topName, topSt] = ranking[0];
  const medals = ['🥇','🥈','🥉'];

  const slides = [];

  /* ── Slide 1: Intro ── */
  slides.push({ dur: 3, bg: 'linear-gradient(160deg,#f59e0b 0%,#ea580c 100%)', html: `
    <div class="w-group w-fade">${esc(data.name)}</div>
    <div class="w-gap-sm"></div>
    <div class="w-emoji w-pop">🏋️</div>
    <div class="w-gap-sm"></div>
    <div class="w-headline w-rise" style="animation-delay:.25s">${T.wS1a}</div>
    <div class="w-headline w-rise" style="animation-delay:.4s;color:rgba(255,255,255,.35)">${T.wS1b}</div>
    <div class="w-gap"></div>
    <div class="w-label w-fade" style="animation-delay:.65s">${T.weekRange(mon,sun)}</div>
  `});

  /* ── Slide 2: Late count ── */
  slides.push({ dur: 4, countId:'wn-late', countTarget: totalLate,
    bg: 'linear-gradient(160deg,#db2777 0%,#ea580c 100%)', html: `
    <div class="w-label w-fade">${T.wS2label}</div>
    <div class="w-gap-xs"></div>
    <div class="w-number w-pop" id="wn-late" style="animation-delay:.1s">0</div>
    <div class="w-gap-xs"></div>
    <div class="w-sub w-rise" style="animation-delay:.3s">${T.wS2sub}</div>
    <div class="w-gap"></div>
    <div class="w-emoji w-pop" style="animation-delay:.5s;font-size:clamp(36px,12vw,58px)">🚨</div>
  `});

  /* ── Slide 3: Minutes ── */
  slides.push({ dur: 4, countId:'wn-mins', countTarget: totalMins,
    bg: 'linear-gradient(160deg,#059669 0%,#0891b2 100%)', html: `
    <div class="w-label w-fade">${T.wS3label}</div>
    <div class="w-gap-xs"></div>
    <div class="w-number w-pop" id="wn-mins" style="animation-delay:.1s">0</div>
    <div class="w-sub w-rise" style="animation-delay:.3s">${T.wS3sub}</div>
    ${hours > 0 ? `<div class="w-gap-sm"></div><div class="w-label w-fade" style="animation-delay:.55s">${T.wS3hours(hours,remMins)}</div>` : ''}
  `});

  /* ── Slide 4: Top latecomer ── */
  slides.push({ dur: 4.5, bg: 'linear-gradient(160deg,#ca8a04 0%,#dc2626 100%)', html: `
    <div class="w-emoji w-pop">👑</div>
    <div class="w-gap-sm"></div>
    <div class="w-label w-rise" style="animation-delay:.2s">${T.wS4label}</div>
    <div class="w-gap-sm"></div>
    <div class="w-name w-pop" style="animation-delay:.38s">${esc(topName)}</div>
    <div class="w-gap"></div>
    <div class="w-sub w-fade" style="animation-delay:.6s">${topSt.count}× · ${topSt.mins} ${T.minsShort}</div>
  `});

  /* ── Slide 5: Ranking (only if >1 person) ── */
  if (ranking.length > 1) {
    slides.push({ dur: 5, bg: 'linear-gradient(160deg,#b45309 0%,#78350f 100%)', html: `
      <div class="w-headline-md w-rise">${T.wS5title}</div>
      <div class="w-divider"></div>
      <div class="w-ranks">
        ${ranking.slice(0,5).map(([name,st],i) => `
          <div class="w-rank-row w-rise" style="animation-delay:${.2+i*.13}s">
            <div class="w-medal">${medals[i]||(i+1)+'.'}</div>
            <div class="w-rank-name">${esc(name)}</div>
            <div class="w-rank-mins">${st.mins} ${T.minsShort}</div>
          </div>`).join('')}
      </div>
    `});
  }

  /* ── Slide 6: End card ── */
  slides.push({ isLast: true, bg: 'linear-gradient(160deg,#78350f 0%,#b45309 100%)', html: `
    <div class="w-emoji w-pop">💪</div>
    <div class="w-gap-sm"></div>
    <div class="w-headline w-rise" style="animation-delay:.2s;font-size:clamp(44px,14vw,78px)">${T.wS6a}</div>
    <div class="w-headline w-rise" style="animation-delay:.36s;font-size:clamp(44px,14vw,78px);color:rgba(255,255,255,.35)">${T.wS6b}</div>
    <div class="w-gap-lg"></div>
    <button class="w-btn-close w-pop" id="w-close" style="animation-delay:.6s">${T.wClose}</button>
  `});

  return slides;
}

// Tap zones
document.getElementById('w-tap-l').addEventListener('click', () => wAdvance(-1));
document.getElementById('w-tap-r').addEventListener('click', () => wAdvance(1));
document.getElementById('w-skip').addEventListener('click', wClose);

// Swipe support
let wTouchX = 0;
const wEl = document.getElementById('wrapped');
wEl.addEventListener('touchstart', e => { wTouchX = e.touches[0].clientX; }, { passive: true });
wEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - wTouchX;
  if (Math.abs(dx) > 48) wAdvance(dx < 0 ? 1 : -1);
});

// Keyboard
document.addEventListener('keydown', e => {
  if (document.getElementById('wrapped').classList.contains('hidden')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); wAdvance(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); wAdvance(-1); }
  if (e.key === 'Escape') wClose();
});

// Show the primer once; if already seen, call initPush() directly.
function maybeShowNotifPrimer() {
  if (localStorage.getItem('gymNotifPrimerSeen')) {
    initPush().catch(() => {});
    return;
  }
  const el = document.getElementById('notif-primer');
  if (el) el.classList.remove('hidden');
}

document.getElementById('notif-primer-enable').addEventListener('click', async () => {
  localStorage.setItem('gymNotifPrimerSeen', '1');

async function initPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if (!userProfile || !group) return;
  const reg = await navigator.serviceWorker.register('/sw.js');
  await navigator.serviceWorker.ready;

  let keyRes;
  try { keyRes = await fetch('/api/push/vapid-public-key'); } catch { return; }
  if (!keyRes.ok) return;
  const { key } = await keyRes.json();

  const permission = await Notification.requestPermission();
  if (permission !== 'granted') return;

  const existing = await reg.pushManager.getSubscription();
  const sub = existing || await reg.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(key),
  });

  await fetch('/api/push/subscribe', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      userId: userProfile.userId,
      groupId: group.id,
      recoveryCode: userProfile.recoveryCode,
      subscription: sub.toJSON(),
    }),
  });

  // Sync stored notification preferences to server
  const prefs = loadNotifPrefs();
  await saveNotifPrefsToServer(prefs).catch(() => {});
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from(raw, c => c.charCodeAt(0));
}

function loadNotifPrefs() {
  try { return JSON.parse(localStorage.getItem('gymNotifPrefs') || '{}'); } catch { return {}; }
}

function saveNotifPrefs(prefs) {
  localStorage.setItem('gymNotifPrefs', JSON.stringify(prefs));
}

async function saveNotifPrefsToServer(prefs) {
  if (!userProfile || !group) return;
  await fetch(`/api/groups/${group.id}/users/${userProfile.userId}/notif`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ recoveryCode: userProfile.recoveryCode, ...prefs }),
  });
}

async function init() {
  showLoading(true); loadGroup();
  if (group) {
    loadUser(group.id);
    try {
      data = await api.getGroup(group.id);
    } catch(e) {
      if (e.status===404) clearGroup();
      showLoading(false); showScreen('landing'); return;
    }
    if (!userProfile) {
      // Stored group but no user — show profile setup
      showLoading(false);
      pendingGroup = group;
      applyI18n(); showScreen('landing'); openProfileSetup();
      return;
    }
    // Check if user is still in the group (not kicked)
    const me = data.people.find(p => p.id === userProfile.userId);
    if (!me) {
      clearUser(group.id); userProfile = null;
      showLoading(false); showScreen('landing');
      setTimeout(() => showToast(T.kicked), 300); return;
    }
    userProfile.isCreator = me.isCreator;
    if ('avatarImg' in me) userProfile.avatarImg = me.avatarImg;
    saveUser(group.id, userProfile);
    updateMyProfileBtn();
    applyI18n(); renderAll(); startPolling(); showLoading(false); showScreen('app');
    runOpeningSequence();
    maybeShowNotifPrimer();
    return;
  }
  showLoading(false); showScreen('landing');
}
init();
