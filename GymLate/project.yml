name: GymLate
options:
  bundleIdPrefix: com.gymlate
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""  # ← trage hier deine Apple-Team-ID ein (Xcode → Signing)

packages:
  GoogleSignIn-iOS:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.0.0

targets:
  GymLate:
    type: application
    platform: iOS
    sources:
      - path: GymLate
    dependencies:
      - package: GoogleSignIn-iOS
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gymlate.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: GymLate
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        # Location-Berechtigung für den Geo-Check-in:
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "GymLate nutzt deinen Standort für den automatischen Check-in im Gym."
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
